<svg viewBox="0 0 880 490" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh7a" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule7a" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
    <marker id="axEnd7a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#1B2A33"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="878" height="488" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <text x="44" y="48" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 7.1 · INVARIANTE 9 — OPERADOR</text>
  <text x="44" y="78" font-size="23" font-weight="700" fill="#1B2A33">Persona versus modo: dois eixos independentes</text>
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule7a)"/>

  <!-- axes -->
  <line x1="160" y1="430" x2="820" y2="430" stroke="#1B2A33" stroke-width="2" marker-end="url(#axEnd7a)"/>
  <line x1="160" y1="430" x2="160" y2="120" stroke="#1B2A33" stroke-width="2" marker-end="url(#axEnd7a)"/>

  <!-- axis labels -->
  <text x="490" y="458" font-size="13" fill="#1B2A33" text-anchor="middle" font-weight="700">MODO (como você emprega) →</text>
  <text x="490" y="473" font-size="11.5" fill="#7C7768" text-anchor="middle">exploração ←———— chat · análise · redação · par técnico ————→ entrega</text>

  <text x="148" y="275" font-size="13" fill="#1B2A33" font-weight="700" text-anchor="middle" transform="rotate(-90 148 275)">PERSONA (quem o modelo é) →</text>
  <text x="136" y="275" font-size="11" fill="#7C7768" text-anchor="middle" transform="rotate(-90 136 275)">genérico ←————→ especializado</text>

  <!-- dividers -->
  <line x1="490" y1="130" x2="490" y2="430" stroke="#CFC8B6" stroke-width="1.2" stroke-dasharray="4 4"/>
  <line x1="160" y1="275" x2="820" y2="275" stroke="#CFC8B6" stroke-width="1.2" stroke-dasharray="4 4"/>

  <!-- Q1 top-left: especializada + exploração -->
  <g filter="url(#sh7a)">
    <rect x="174" y="136" width="300" height="128" rx="12" fill="#FBF6EA" stroke="#E2D4AC"/>
  </g>
  <text x="324" y="162" font-size="13.5" font-weight="700" fill="#9A7A2E" text-anchor="middle">ESPECIALISTA EXPLORANDO</text>
  <text x="324" y="180" font-size="11.5" fill="#7C7768" text-anchor="middle">persona definida · modo aberto</text>
  <text x="324" y="200" font-size="12" fill="#7C7768" text-anchor="middle">"analista de sexta" em brainstorm</text>
  <text x="324" y="218" font-size="12" fill="#7C7768" text-anchor="middle">ótimo para mapear o problema</text>
  <text x="324" y="246" font-size="11.5" fill="#9A7A2E" font-style="italic" text-anchor="middle">identidade constante, abertura ao inesperado</text>

  <!-- Q2 top-right: especializada + entrega -->
  <g filter="url(#sh7a)">
    <rect x="504" y="136" width="300" height="128" rx="12" fill="#F1ECE0" stroke="#D8D0BD"/>
  </g>
  <text x="654" y="162" font-size="13.5" font-weight="700" fill="#44525C" text-anchor="middle">ESPECIALISTA ENTREGANDO</text>
  <text x="654" y="180" font-size="11.5" fill="#7C7768" text-anchor="middle">persona definida · modo de produção</text>
  <text x="654" y="200" font-size="12" fill="#7C7768" text-anchor="middle">analista redigindo o parecer final</text>
  <text x="654" y="218" font-size="12" fill="#7C7768" text-anchor="middle">consistência e qualidade máximas</text>
  <text x="654" y="246" font-size="11.5" fill="#44525C" font-style="italic" text-anchor="middle">perfil de máxima alavancagem</text>

  <!-- Q3 bottom-left: genérica + exploração -->
  <g filter="url(#sh7a)">
    <rect x="174" y="290" width="300" height="128" rx="12" fill="#EFF6F7" stroke="#BBD7DB"/>
  </g>
  <text x="324" y="316" font-size="13.5" font-weight="700" fill="#256A75" text-anchor="middle">SEM PERSONA, EXPLORANDO</text>
  <text x="324" y="334" font-size="11.5" fill="#7C7768" text-anchor="middle">sem configuração · modo aberto</text>
  <text x="324" y="354" font-size="12" fill="#7C7768" text-anchor="middle">Claude padrão em chat livre</text>
  <text x="324" y="372" font-size="12" fill="#7C7768" text-anchor="middle">útil quando variação é o objetivo</text>
  <text x="324" y="400" font-size="11.5" fill="#256A75" font-style="italic" text-anchor="middle">ponto de partida para qualquer uso</text>

  <!-- Q4 bottom-right: genérica + entrega -->
  <g filter="url(#sh7a)">
    <rect x="504" y="290" width="300" height="128" rx="12" fill="#F0DDD2" stroke="#E7CDBE"/>
  </g>
  <text x="654" y="316" font-size="13.5" font-weight="700" fill="#B5532F" text-anchor="middle">SEM PERSONA, ENTREGANDO</text>
  <text x="654" y="334" font-size="11.5" fill="#7C7768" text-anchor="middle">sem configuração · tarefa definida</text>
  <text x="654" y="354" font-size="12" fill="#7C7768" text-anchor="middle">resultado razoável, mas genérico</text>
  <text x="654" y="372" font-size="12" fill="#7C7768" text-anchor="middle">variação entre sessões: alta</text>
  <text x="654" y="400" font-size="11.5" fill="#B5532F" font-style="italic" text-anchor="middle">custo: inconsistência e retrabalho</text>

  <text x="44" y="482" font-size="12.5" fill="#7C7768" font-style="italic">Eixo vertical: persona (quem o modelo é). Eixo horizontal: modo (como você o emprega). Nenhum quadrante é errado — cada um é adequado para uma situação diferente.</text>
</svg>
