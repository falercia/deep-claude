<svg viewBox="0 0 880 470" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
    <marker id="arrInk" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#44525C"/>
    </marker>
    <marker id="arrGold" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#C2912C"/>
    </marker>
    <marker id="arrRisk" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#B5532F"/>
    </marker>
  </defs>

  <!-- Frame -->
  <rect x="1" y="1" width="878" height="468" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <!-- Kicker + Title -->
  <text x="44" y="48" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 35.3 · INVARIANTE 7 — TERMÔMETRO</text>
  <text x="44" y="78" font-size="23" font-weight="700" fill="#1B2A33">Anatomia da governança operacional</text>
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule)"/>

  <!-- CENTER: Dono Nominal -->
  <g filter="url(#sh)">
    <rect x="326" y="172" width="228" height="110" rx="14" fill="#1B2A33"/>
  </g>
  <text x="440" y="215" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">Dono Nominal</text>
  <text x="440" y="237" font-size="12" fill="#C2912C" text-anchor="middle">uma pessoa, não um time</text>
  <text x="440" y="256" font-size="11.5" fill="#44525C" text-anchor="middle">aprova exceções · escala incidentes</text>
  <text x="440" y="272" font-size="11.5" fill="#44525C" text-anchor="middle">gates de deploy · ponto de contato</text>

  <!-- RIGHT: Runbook -->
  <g filter="url(#sh)">
    <rect x="622" y="150" width="216" height="110" rx="13" fill="#FFFFFF" stroke="#E2D4AC"/>
  </g>
  <path d="M622,163 a13,13 0 0 1 13,-13 h190 a13,13 0 0 1 13,13 v18 h-216 z" fill="#C2912C"/>
  <text x="730" y="178" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">Runbook</text>
  <text x="730" y="204" font-size="12" fill="#1B2A33" text-anchor="middle">como detectar o problema</text>
  <text x="730" y="220" font-size="12" fill="#1B2A33" text-anchor="middle">checklist das primeiras horas</text>
  <text x="730" y="236" font-size="12" fill="#1B2A33" text-anchor="middle">quem chamar + template</text>

  <!-- Arrow center → right (Dono → Runbook) -->
  <path d="M554,227 H620" fill="none" stroke="#C2912C" stroke-width="2.2" marker-end="url(#arrGold)"/>

  <!-- BOTTOM: Processo de incidente -->
  <g filter="url(#sh)">
    <rect x="290" y="340" width="300" height="100" rx="13" fill="#FFFFFF" stroke="#E7CDBE"/>
  </g>
  <path d="M290,353 a13,13 0 0 1 13,-13 h274 a13,13 0 0 1 13,13 v18 h-300 z" fill="#B5532F"/>
  <text x="440" y="368" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">Processo de incidente</text>
  <text x="440" y="392" font-size="12" fill="#1B2A33" text-anchor="middle">1 · mitigar — rollback imediato</text>
  <text x="440" y="408" font-size="12" fill="#1B2A33" text-anchor="middle">2 · diagnosticar — causa raiz</text>
  <text x="440" y="424" font-size="12" fill="#1B2A33" text-anchor="middle">3 · documentar → golden set</text>

  <!-- Arrow center → bottom (Dono → Incidente) -->
  <path d="M440,282 V338" fill="none" stroke="#B5532F" stroke-width="2.2" marker-end="url(#arrRisk)"/>

  <!-- LEFT: Política de rollback automático -->
  <g filter="url(#sh)">
    <rect x="42" y="150" width="220" height="110" rx="13" fill="#FFFFFF" stroke="#BBD7DB"/>
  </g>
  <path d="M42,163 a13,13 0 0 1 13,-13 h194 a13,13 0 0 1 13,13 v18 h-220 z" fill="#2E7D8A"/>
  <text x="152" y="178" font-size="13.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">Rollback automático</text>
  <text x="152" y="204" font-size="11.5" fill="#1B2A33" text-anchor="middle">score de eval abaixo de X%</text>
  <text x="152" y="220" font-size="11.5" fill="#1B2A33" text-anchor="middle">por Y minutos consecutivos</text>
  <text x="152" y="236" font-size="11.5" fill="#1B2A33" text-anchor="middle">ou custo K× a média</text>

  <!-- Arrow left → center (Rollback → Dono) -->
  <path d="M262,227 H324" fill="none" stroke="#2E7D8A" stroke-width="2.2" marker-end="url(#arrInk)"/>

  <!-- Arrow: Incidente feedback to golden set (curved, to left side) -->
  <path d="M290,400 C180,400 152,320 152,262" fill="none" stroke="#C2912C" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#arrGold)"/>
  <rect x="84" y="340" width="152" height="18" rx="9" fill="#FBF6EA" stroke="#E2D4AC"/>
  <text x="160" y="353" font-size="10.5" fill="#9A7A2E" text-anchor="middle">→ alimenta golden set cap. 34</text>

  <!-- Warning note at bottom -->
  <g filter="url(#sh)">
    <rect x="44" y="418" width="620" height="28" rx="8" fill="#F0DDD2" stroke="#E7CDBE"/>
  </g>
  <text x="354" y="436" font-size="12" fill="#B5532F" text-anchor="middle" font-weight="600">Sem dono nominal, os outros três são intenção — não processo.</text>

  <!-- Caption -->
  <text x="44" y="460" font-size="12.5" fill="#7C7768" font-style="italic">A governança operacional falha primeiro no dono, não na ferramenta. Um runbook sem dono não é seguido; uma política de rollback sem dono não é ativada.</text>
</svg>
