<svg viewBox="0 0 880 490" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh15b" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule15b" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="878" height="488" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <!-- Kicker + título -->
  <text x="44" y="48" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 15.2 · INVARIANTE 1 — PLAUSIBILIDADE</text>
  <text x="44" y="78" font-size="23" font-weight="700" fill="#1B2A33">Research · Web Search · Chat — o modo certo para cada tarefa</text>
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule15b)"/>

  <!-- Três painéis lado a lado -->

  <!-- PAINEL 1: Chat Normal -->
  <g filter="url(#sh15b)">
    <rect x="44" y="114" width="248" height="296" rx="13" fill="#FFFFFF" stroke="#CFC8B6"/>
  </g>
  <path d="M44,127 a13,13 0 0 1 13,-13 h222 a13,13 0 0 1 13,13 v22 h-248 z" fill="#44525C"/>
  <text x="168" y="143" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">CHAT NORMAL</text>

  <rect x="64" y="160" width="208" height="30" rx="7" fill="#F1ECE0" stroke="#CFC8B6"/>
  <text x="168" y="180" font-size="12" fill="#1B2A33" text-anchor="middle" font-weight="600">Fontes</text>

  <text x="168" y="205" font-size="12" fill="#7C7768" text-anchor="middle">conhecimento do treino</text>

  <rect x="64" y="218" width="208" height="30" rx="7" fill="#F1ECE0" stroke="#CFC8B6"/>
  <text x="168" y="238" font-size="12" fill="#1B2A33" text-anchor="middle" font-weight="600">Tempo de resposta</text>
  <text x="168" y="261" font-size="12" fill="#7C7768" text-anchor="middle">segundos</text>

  <rect x="64" y="274" width="208" height="30" rx="7" fill="#F1ECE0" stroke="#CFC8B6"/>
  <text x="168" y="294" font-size="12" fill="#1B2A33" text-anchor="middle" font-weight="600">Custo (tokens)</text>
  <text x="168" y="317" font-size="12" fill="#7C7768" text-anchor="middle">baixo</text>

  <rect x="64" y="330" width="208" height="30" rx="7" fill="#F1ECE0" stroke="#CFC8B6"/>
  <text x="168" y="350" font-size="12" fill="#1B2A33" text-anchor="middle" font-weight="600">Atualidade</text>
  <text x="168" y="373" font-size="12" fill="#7C7768" text-anchor="middle">datada (corte do treino)</text>

  <rect x="64" y="382" width="208" height="22" rx="6" fill="#F1ECE0" stroke="#CFC8B6"/>
  <text x="168" y="397" font-size="11.5" fill="#44525C" text-anchor="middle" font-weight="700">USE PARA: conversa, raciocínio, brainstorm</text>

  <!-- PAINEL 2: Web Search -->
  <g filter="url(#sh15b)">
    <rect x="316" y="114" width="248" height="296" rx="13" fill="#FFFFFF" stroke="#BBD7DB"/>
  </g>
  <path d="M316,127 a13,13 0 0 1 13,-13 h222 a13,13 0 0 1 13,13 v22 h-248 z" fill="#2E7D8A"/>
  <text x="440" y="143" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">WEB SEARCH</text>

  <rect x="336" y="160" width="208" height="30" rx="7" fill="#EFF6F7" stroke="#CFE3E6"/>
  <text x="440" y="180" font-size="12" fill="#1B2A33" text-anchor="middle" font-weight="600">Fontes</text>
  <text x="440" y="205" font-size="12" fill="#7C7768" text-anchor="middle">3–10 páginas web atuais</text>

  <rect x="336" y="218" width="208" height="30" rx="7" fill="#EFF6F7" stroke="#CFE3E6"/>
  <text x="440" y="238" font-size="12" fill="#1B2A33" text-anchor="middle" font-weight="600">Tempo de resposta</text>
  <text x="440" y="261" font-size="12" fill="#7C7768" text-anchor="middle">poucos segundos</text>

  <rect x="336" y="274" width="208" height="30" rx="7" fill="#EFF6F7" stroke="#CFE3E6"/>
  <text x="440" y="294" font-size="12" fill="#1B2A33" text-anchor="middle" font-weight="600">Custo (tokens)</text>
  <text x="440" y="317" font-size="12" fill="#7C7768" text-anchor="middle">médio</text>

  <rect x="336" y="330" width="208" height="30" rx="7" fill="#EFF6F7" stroke="#CFE3E6"/>
  <text x="440" y="350" font-size="12" fill="#1B2A33" text-anchor="middle" font-weight="600">Atualidade</text>
  <text x="440" y="373" font-size="12" fill="#7C7768" text-anchor="middle">presente, pontual</text>

  <rect x="336" y="382" width="208" height="22" rx="6" fill="#EFF6F7" stroke="#CFE3E6"/>
  <text x="440" y="397" font-size="11.5" fill="#256A75" text-anchor="middle" font-weight="700">USE PARA: fato atual, verificação rápida</text>

  <!-- PAINEL 3: Research -->
  <g filter="url(#sh15b)">
    <rect x="588" y="114" width="248" height="296" rx="13" fill="#FFFFFF" stroke="#E2D4AC"/>
  </g>
  <path d="M588,127 a13,13 0 0 1 13,-13 h222 a13,13 0 0 1 13,13 v22 h-248 z" fill="#C2912C"/>
  <text x="712" y="143" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">RESEARCH</text>

  <rect x="608" y="160" width="208" height="30" rx="7" fill="#FBF6EA" stroke="#EADfBF"/>
  <text x="712" y="180" font-size="12" fill="#1B2A33" text-anchor="middle" font-weight="600">Fontes</text>
  <text x="712" y="205" font-size="12" fill="#7C7768" text-anchor="middle">dezenas a centenas</text>

  <rect x="608" y="218" width="208" height="30" rx="7" fill="#FBF6EA" stroke="#EADfBF"/>
  <text x="712" y="238" font-size="12" fill="#1B2A33" text-anchor="middle" font-weight="600">Tempo de resposta</text>
  <text x="712" y="261" font-size="12" fill="#7C7768" text-anchor="middle">5 a 30 minutos</text>

  <rect x="608" y="274" width="208" height="30" rx="7" fill="#FBF6EA" stroke="#EADfBF"/>
  <text x="712" y="294" font-size="12" fill="#1B2A33" text-anchor="middle" font-weight="600">Custo (tokens)</text>
  <text x="712" y="317" font-size="12" fill="#7C7768" text-anchor="middle">alto — calcule o ROI</text>

  <rect x="608" y="330" width="208" height="30" rx="7" fill="#FBF6EA" stroke="#EADfBF"/>
  <text x="712" y="350" font-size="12" fill="#1B2A33" text-anchor="middle" font-weight="600">Atualidade</text>
  <text x="712" y="373" font-size="12" fill="#7C7768" text-anchor="middle">presente, multi-fonte</text>

  <rect x="608" y="382" width="208" height="22" rx="6" fill="#FBF6EA" stroke="#EADfBF"/>
  <text x="712" y="397" font-size="11.5" fill="#9A7A2E" text-anchor="middle" font-weight="700">USE PARA: análise profunda, briefing estratégico</text>

  <!-- Regra prática -->
  <text x="44" y="434" font-size="12.5" fill="#7C7768" font-style="italic">Regra prática: Research quando pesquisaria mais de 30 min · Web Search quando menos de 10 min · Chat para todo o resto.</text>

  <!-- Legenda rodapé -->
  <text x="44" y="474" font-size="12.5" fill="#7C7768" font-style="italic">Usar Research para pergunta simples é desperdício. Usar chat para dado atual é risco de alucinação.</text>
</svg>
