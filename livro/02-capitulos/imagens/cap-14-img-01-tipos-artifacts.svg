<svg viewBox="0 0 880 510" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh14a" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule14a" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="878" height="508" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <text x="44" y="48" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 14.1 · INVARIANTE 9 — OPERADOR</text>
  <text x="44" y="78" font-size="23" font-weight="700" fill="#1B2A33">Os seis tipos de Artifacts</text>
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule14a)"/>

  <!-- Row 1: 3 types -->
  <!-- 1 Código -->
  <g filter="url(#sh14a)"><rect x="44" y="114" width="254" height="154" rx="12" fill="#FFFFFF" stroke="#E2D4AC"/></g>
  <path d="M44,127 a12,12 0 0 1 12,-12 h230 a12,12 0 0 1 12,12 v18 h-254 z" fill="#C2912C"/>
  <text x="64" y="140" font-size="13" font-weight="700" fill="#FFFFFF">1 · CÓDIGO</text>
  <text x="64" y="163" font-size="12.5" fill="#1B2A33">Python, TypeScript, SQL, Rust...</text>
  <rect x="64" y="173" width="214" height="54" rx="7" fill="#1B2A33"/>
  <text x="76" y="193" font-size="11" fill="#E2C879" font-family="'Courier New',monospace">def payback(custo, retorno):</text>
  <text x="76" y="209" font-size="11" fill="#FFFFFF" font-family="'Courier New',monospace">  return custo / retorno</text>
  <text x="76" y="225" font-size="11" fill="#C2912C" font-family="'Courier New',monospace">→ sandbox execution</text>
  <text x="64" y="250" font-size="11.5" fill="#9A7A2E" font-weight="600">syntax highlight · executável · testável</text>

  <!-- 2 HTML interativo -->
  <g filter="url(#sh14a)"><rect x="314" y="114" width="254" height="154" rx="12" fill="#FFFFFF" stroke="#BBD7DB"/></g>
  <path d="M314,127 a12,12 0 0 1 12,-12 h230 a12,12 0 0 1 12,12 v18 h-254 z" fill="#2E7D8A"/>
  <text x="334" y="140" font-size="13" font-weight="700" fill="#FFFFFF">2 · HTML INTERATIVO</text>
  <text x="334" y="163" font-size="12.5" fill="#1B2A33">Calculadora, dashboard, formulário</text>
  <rect x="334" y="173" width="214" height="54" rx="7" fill="#EFF6F7" stroke="#CFE3E6"/>
  <text x="366" y="196" font-size="12" font-weight="700" fill="#1B2A33" text-anchor="middle">Calculadora ROI</text>
  <rect x="344" y="202" width="90" height="16" rx="4" fill="#2E7D8A"/>
  <text x="389" y="214" font-size="10" fill="#FFFFFF" text-anchor="middle">Custo: R$ 50k</text>
  <text x="442" y="214" font-size="11" fill="#9A7A2E" font-weight="700">Payback 3m</text>
  <text x="334" y="250" font-size="11.5" fill="#256A75" font-weight="600">roda ao vivo no painel · inputs reais</text>

  <!-- 3 Markdown -->
  <g filter="url(#sh14a)"><rect x="584" y="114" width="254" height="154" rx="12" fill="#FFFFFF" stroke="#CFC8B6"/></g>
  <path d="M584,127 a12,12 0 0 1 12,-12 h230 a12,12 0 0 1 12,12 v18 h-254 z" fill="#44525C"/>
  <text x="604" y="140" font-size="13" font-weight="700" fill="#FFFFFF">3 · DOCUMENTO MARKDOWN</text>
  <text x="604" y="163" font-size="12.5" fill="#1B2A33">Relatório, proposta, artigo</text>
  <rect x="604" y="173" width="214" height="54" rx="7" fill="#F1ECE0" stroke="#D8D0BD"/>
  <text x="616" y="193" font-size="12" font-weight="700" fill="#1B2A33"># Análise Estratégica</text>
  <text x="616" y="209" font-size="11" fill="#44525C">## Contexto</text>
  <text x="616" y="223" font-size="11" fill="#7C7768">A empresa enfrenta...</text>
  <text x="604" y="250" font-size="11.5" fill="#44525C" font-weight="600">formatação rica · exportável PDF/DOCX</text>

  <!-- Row 2: 3 types -->
  <!-- 4 Mermaid -->
  <g filter="url(#sh14a)"><rect x="44" y="286" width="254" height="154" rx="12" fill="#FFFFFF" stroke="#E2D4AC"/></g>
  <path d="M44,299 a12,12 0 0 1 12,-12 h230 a12,12 0 0 1 12,12 v18 h-254 z" fill="#C2912C"/>
  <text x="64" y="312" font-size="13" font-weight="700" fill="#FFFFFF">4 · DIAGRAMA MERMAID</text>
  <text x="64" y="335" font-size="12.5" fill="#1B2A33">Fluxograma, ER, Gantt, sequência</text>
  <rect x="64" y="345" width="214" height="54" rx="7" fill="#FBF6EA" stroke="#EADfBF"/>
  <circle cx="171" cy="363" r="11" fill="#C2912C"/>
  <text x="171" y="367" font-size="9" fill="#FFFFFF" text-anchor="middle">Início</text>
  <rect x="140" y="377" width="62" height="14" rx="4" fill="#1B2A33"/>
  <text x="171" y="388" font-size="9" fill="#C2912C" text-anchor="middle">Processar</text>
  <text x="64" y="422" font-size="11.5" fill="#9A7A2E" font-weight="600">texto vira diagrama · pede refinamento</text>

  <!-- 5 SVG -->
  <g filter="url(#sh14a)"><rect x="314" y="286" width="254" height="154" rx="12" fill="#FFFFFF" stroke="#E2D4AC"/></g>
  <path d="M314,299 a12,12 0 0 1 12,-12 h230 a12,12 0 0 1 12,12 v18 h-254 z" fill="#C2912C"/>
  <text x="334" y="312" font-size="13" font-weight="700" fill="#FFFFFF">5 · SVG VETORIAL</text>
  <text x="334" y="335" font-size="12.5" fill="#1B2A33">Ilustração, infográfico, ícone</text>
  <rect x="334" y="345" width="214" height="54" rx="7" fill="#FBF6EA" stroke="#EADfBF"/>
  <circle cx="441" cy="372" r="22" fill="none" stroke="#C2912C" stroke-width="2.5"/>
  <path d="M428,372 L438,382 L458,360" stroke="#2E7D8A" stroke-width="2.5" fill="none"/>
  <text x="334" y="422" font-size="11.5" fill="#9A7A2E" font-weight="600">vetorial, escalável, deck-ready</text>

  <!-- 6 React -->
  <g filter="url(#sh14a)"><rect x="584" y="286" width="254" height="154" rx="12" fill="#FFFFFF" stroke="#E7CDBE"/></g>
  <path d="M584,299 a12,12 0 0 1 12,-12 h230 a12,12 0 0 1 12,12 v18 h-254 z" fill="#B5532F"/>
  <text x="604" y="312" font-size="13" font-weight="700" fill="#FFFFFF">6 · COMPONENTE REACT</text>
  <text x="604" y="335" font-size="12.5" fill="#1B2A33">App completo, dashboard reativo</text>
  <rect x="604" y="345" width="214" height="54" rx="7" fill="#F0DDD2" stroke="#E7CDBE"/>
  <text x="616" y="363" font-size="11" fill="#B5532F" font-family="'Courier New',monospace">function Dashboard() {</text>
  <text x="616" y="379" font-size="11" fill="#7C7768" font-family="'Courier New',monospace">  const [data, setData]</text>
  <text x="616" y="395" font-size="11" fill="#7C7768" font-family="'Courier New',monospace">  return &lt;Chart .../&gt;</text>
  <text x="604" y="422" font-size="11.5" fill="#B5532F" font-weight="600">app reativo ao vivo · protótipo funcional</text>

  <text x="44" y="470" font-size="12.5" fill="#7C7768" font-style="italic">Cada tipo é renderizado no painel lateral em formato próprio, editável em versões e exportável. Artifact faz sentido quando o resultado vai além do chat.</text>
</svg>
