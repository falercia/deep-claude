<svg viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh15b" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule15b" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
    <marker id="arrInk15b" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#44525C"/>
    </marker>
    <marker id="arrTer15b" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#B5532F"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="878" height="458" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <text x="44" y="48" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 15.2 · INVARIANTE 7 — TERMÔMETRO (PILAR)</text>
  <text x="44" y="78" font-size="23" font-weight="700" fill="#1B2A33">O design system como filtro de validação</text>
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule15b)"/>

  <!-- banda superior: marca embutida -->
  <g filter="url(#sh15b)"><rect x="246" y="120" width="388" height="52" rx="12" fill="#1B2A33"/></g>
  <text x="440" y="142" font-size="13.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">Marca embutida</text>
  <text x="440" y="160" font-size="11.5" fill="#C2912C" text-anchor="middle">Claude lê codebase + arquivos → constrói o design system</text>
  <!-- seta da banda para o gate -->
  <path d="M440,172 L440,214" fill="none" stroke="#C2912C" stroke-width="2.2" stroke-dasharray="4 4" marker-end="url(#arrInk15b)"/>

  <!-- pipeline -->
  <!-- Intenção -->
  <g filter="url(#sh15b)"><rect x="44" y="232" width="150" height="58" rx="12" fill="#FFFFFF" stroke="#CFC8B6"/></g>
  <text x="119" y="258" font-size="14" font-weight="700" fill="#1B2A33" text-anchor="middle">Intenção</text>
  <text x="119" y="276" font-size="11.5" fill="#7C7768" text-anchor="middle">o que você pede</text>

  <path d="M194,261 L232,261" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk15b)"/>

  <!-- Geração -->
  <g filter="url(#sh15b)"><rect x="234" y="232" width="150" height="58" rx="12" fill="#FFFFFF" stroke="#CFC8B6"/></g>
  <text x="309" y="258" font-size="14" font-weight="700" fill="#1B2A33" text-anchor="middle">Claude gera</text>
  <text x="309" y="276" font-size="11.5" fill="#7C7768" text-anchor="middle">versão candidata</text>

  <path d="M384,261 L424,261" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk15b)"/>

  <!-- GATE: validação -->
  <g filter="url(#sh15b)"><rect x="426" y="224" width="168" height="74" rx="12" fill="#F0DDD2" stroke="#B5532F" stroke-width="1.6"/></g>
  <text x="510" y="250" font-size="13.5" font-weight="700" fill="#B5532F" text-anchor="middle">VALIDA contra</text>
  <text x="510" y="268" font-size="13.5" font-weight="700" fill="#B5532F" text-anchor="middle">as diretrizes</text>
  <text x="510" y="286" font-size="11" fill="#8A4326" text-anchor="middle">antes de revelar</text>

  <path d="M594,261 L634,261" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk15b)"/>

  <!-- Revela on-brand -->
  <g filter="url(#sh15b)"><rect x="636" y="232" width="178" height="58" rx="12" fill="#EFF6F7" stroke="#2E7D8A"/></g>
  <text x="725" y="258" font-size="14" font-weight="700" fill="#2E7D8A" text-anchor="middle">Revela on-brand</text>
  <text x="725" y="276" font-size="11.5" fill="#7C7768" text-anchor="middle">consistente por padrão</text>

  <!-- callout: validação ≠ aprovação -->
  <path d="M510,298 L510,338" fill="none" stroke="#B5532F" stroke-width="2.2" marker-end="url(#arrTer15b)"/>
  <g filter="url(#sh15b)"><rect x="232" y="344" width="556" height="52" rx="12" fill="#FFFFFF" stroke="#E7CDBE"/></g>
  <text x="510" y="366" font-size="13" font-weight="700" fill="#B5532F" text-anchor="middle">Validação ≠ aprovação</text>
  <text x="510" y="384" font-size="11.5" fill="#7C7768" text-anchor="middle">o termômetro mede a marca; claim factual, jurídico e uso de terceiros exigem sign-off humano (Inv. 8)</text>

  <text x="44" y="430" font-size="12.5" fill="#7C7768" font-style="italic">O design system deixa de ser PDF e vira critério executável: cada saída é checada contra a marca — a mesma lógica de uma avaliação automatizada.</text>
</svg>
