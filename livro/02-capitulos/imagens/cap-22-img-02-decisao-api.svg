<svg viewBox="0 0 880 490" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh21b" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule21b" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
    <marker id="arrInk21b" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#44525C"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="878" height="488" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <!-- Kicker -->
  <text x="44" y="46" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 21.2 · INVARIANTE 9 — OPERADOR</text>
  <text x="44" y="76" font-size="23" font-weight="700" fill="#1B2A33">Quando usar API, produto ou Managed Agents?</text>
  <rect x="44" y="88" width="86" height="3.5" rx="1.75" fill="url(#goldRule21b)"/>

  <!-- ROOT question -->
  <g filter="url(#sh21b)">
    <rect x="264" y="114" width="352" height="60" rx="13" fill="#1B2A33"/>
  </g>
  <text x="440" y="140" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">Precisa de controle programático</text>
  <text x="440" y="161" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">e integração com sistemas externos?</text>

  <!-- Root -> NÃO (left) -->
  <path d="M264,144 H154 V218" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk21b)"/>
  <text x="200" y="137" font-size="12" font-weight="700" fill="#2E7D8A">NÃO</text>

  <!-- Root -> SIM (down) -->
  <path d="M440,174 V218" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk21b)"/>
  <text x="452" y="202" font-size="12" font-weight="700" fill="#B5532F">SIM</text>

  <!-- PRODUTO node (left leaf) -->
  <g filter="url(#sh21b)">
    <rect x="44" y="222" width="220" height="80" rx="13" fill="#FFFFFF" stroke="#BBD7DB"/>
  </g>
  <rect x="44" y="222" width="220" height="30" rx="13" fill="#2E7D8A"/>
  <rect x="44" y="238" width="220" height="14" fill="#2E7D8A"/>
  <text x="154" y="242" font-size="13.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">SUPERFÍCIE DE PRODUTO</text>
  <text x="154" y="272" font-size="12" fill="#7C7768" text-anchor="middle">Web · Cowork · Desktop</text>
  <text x="154" y="289" font-size="12" fill="#7C7768" text-anchor="middle">Mobile · Claude Code</text>

  <!-- 2nd question: long-running async? -->
  <g filter="url(#sh21b)">
    <rect x="264" y="218" width="352" height="60" rx="13" fill="#243B47"/>
  </g>
  <text x="440" y="244" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">Trabalho longo, assíncrono,</text>
  <text x="440" y="264" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">com loop agêntico gerenciado?</text>

  <!-- Q2 -> SIM (right, Managed Agents) -->
  <path d="M616,248 H712 V330" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk21b)"/>
  <text x="660" y="241" font-size="12" font-weight="700" fill="#2E7D8A">SIM</text>

  <!-- Q2 -> NÃO (down, Messages API) -->
  <path d="M440,278 V330" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk21b)"/>
  <text x="452" y="312" font-size="12" font-weight="700" fill="#B5532F">NÃO</text>

  <!-- MANAGED AGENTS node -->
  <g filter="url(#sh21b)">
    <rect x="622" y="334" width="214" height="80" rx="13" fill="#FFFFFF" stroke="#E2D4AC"/>
  </g>
  <rect x="622" y="334" width="214" height="30" rx="13" fill="#C2912C"/>
  <rect x="622" y="350" width="214" height="14" fill="#C2912C"/>
  <text x="729" y="354" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">MANAGED AGENTS</text>
  <text x="729" y="383" font-size="12" fill="#7C7768" text-anchor="middle">execução serverless</text>
  <text x="729" y="399" font-size="12" fill="#7C7768" text-anchor="middle">com checkpointing nativo</text>

  <!-- MESSAGES API node (center leaf) -->
  <g filter="url(#sh21b)">
    <rect x="330" y="334" width="220" height="80" rx="13" fill="#FFFFFF" stroke="#CFC8B6"/>
  </g>
  <rect x="330" y="334" width="220" height="30" rx="13" fill="#44525C"/>
  <rect x="330" y="350" width="220" height="14" fill="#44525C"/>
  <text x="440" y="354" font-size="13.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">MESSAGES API + SDK</text>
  <text x="440" y="383" font-size="12" fill="#7C7768" text-anchor="middle">controle programático total</text>
  <text x="440" y="399" font-size="12" fill="#7C7768" text-anchor="middle">integração em sistemas</text>

  <!-- Subtext: Batch API pill -->
  <g filter="url(#sh21b)">
    <rect x="44" y="334" width="220" height="38" rx="11" fill="#F1ECE0" stroke="#CFC8B6"/>
  </g>
  <text x="154" y="350" font-size="12" font-weight="700" fill="#44525C" text-anchor="middle">Batches + alto volume?</text>
  <text x="154" y="365" font-size="11.5" fill="#7C7768" text-anchor="middle">→ Message Batches API</text>

  <!-- Footer -->
  <text x="44" y="462" font-size="12.5" fill="#7C7768" font-style="italic">Escolha errada é engenharia sem retorno. A API é a ferramenta certa para integração programática — não "o Claude avançado".</text>
</svg>
