<svg viewBox="0 0 880 510" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh18b" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule18b" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="878" height="508" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <!-- Kicker + título -->
  <text x="44" y="48" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 18.2 · INVARIANTE 6 — AUTONOMIA PROPORCIONAL</text>
  <text x="44" y="78" font-size="23" font-weight="700" fill="#1B2A33">Seis padrões profissionais de tasks agendadas</text>
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule18b)"/>

  <!-- Grade 3 × 2: Linha 1 -->

  <!-- P1: Briefing matinal -->
  <g filter="url(#sh18b)">
    <rect x="44" y="114" width="254" height="136" rx="12" fill="#FFFFFF" stroke="#E2D4AC"/>
  </g>
  <path d="M44,127 a12,12 0 0 1 12,-12 h230 a12,12 0 0 1 12,12 v18 h-254 z" fill="#C2912C"/>
  <circle cx="74" cy="136" r="11" fill="#9A7A2E"/>
  <text x="74" y="141" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="180" y="140" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">BRIEFING MATINAL</text>
  <text x="64" y="164" font-size="12" fill="#1B2A33" font-weight="600">Quando: todo dia às 6h45</text>
  <text x="64" y="182" font-size="11.5" fill="#7C7768">agenda + e-mails críticos +</text>
  <text x="64" y="198" font-size="11.5" fill="#7C7768">notícias do setor + alertas do dia</text>
  <rect x="64" y="212" width="214" height="28" rx="7" fill="#FBF6EA" stroke="#E2D4AC"/>
  <text x="171" y="230" font-size="11.5" fill="#9A7A2E" text-anchor="middle" font-weight="700">5 min substituem 20 min de busca</text>

  <!-- P2: Monitoramento -->
  <g filter="url(#sh18b)">
    <rect x="314" y="114" width="254" height="136" rx="12" fill="#FFFFFF" stroke="#BBD7DB"/>
  </g>
  <path d="M314,127 a12,12 0 0 1 12,-12 h230 a12,12 0 0 1 12,12 v18 h-254 z" fill="#2E7D8A"/>
  <circle cx="344" cy="136" r="11" fill="#256A75"/>
  <text x="344" y="141" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="450" y="140" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">MONITORAMENTO</text>
  <text x="334" y="164" font-size="12" fill="#1B2A33" font-weight="600">Quando: a cada 4 horas</text>
  <text x="334" y="182" font-size="11.5" fill="#7C7768">varre fontes específicas · alerta</text>
  <text x="334" y="198" font-size="11.5" fill="#7C7768">menções, mudanças, riscos</text>
  <rect x="334" y="212" width="214" height="28" rx="7" fill="#EFF6F7" stroke="#CFE3E6"/>
  <text x="441" y="230" font-size="11.5" fill="#256A75" text-anchor="middle" font-weight="700">vigilância sem você precisar olhar</text>

  <!-- P3: Relatório semanal -->
  <g filter="url(#sh18b)">
    <rect x="584" y="114" width="254" height="136" rx="12" fill="#FFFFFF" stroke="#E2D4AC"/>
  </g>
  <path d="M584,127 a12,12 0 0 1 12,-12 h230 a12,12 0 0 1 12,12 v18 h-254 z" fill="#1B2A33"/>
  <circle cx="614" cy="136" r="11" fill="#44525C"/>
  <text x="614" y="141" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="720" y="140" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">RELATÓRIO SEMANAL</text>
  <text x="604" y="164" font-size="12" fill="#1B2A33" font-weight="600">Quando: sexta às 17h</text>
  <text x="604" y="182" font-size="11.5" fill="#7C7768">consolida dados da semana</text>
  <text x="604" y="198" font-size="11.5" fill="#7C7768">relatório estruturado para liderança</text>
  <rect x="604" y="212" width="214" height="28" rx="7" fill="#F1ECE0" stroke="#CFC8B6"/>
  <text x="711" y="230" font-size="11.5" fill="#44525C" text-anchor="middle" font-weight="700">reuniões de revisão sem esforço de prep</text>

  <!-- Linha 2 -->

  <!-- P4: Limpeza de inbox -->
  <g filter="url(#sh18b)">
    <rect x="44" y="266" width="254" height="136" rx="12" fill="#FFFFFF" stroke="#BBD7DB"/>
  </g>
  <path d="M44,279 a12,12 0 0 1 12,-12 h230 a12,12 0 0 1 12,12 v18 h-254 z" fill="#2E7D8A"/>
  <circle cx="74" cy="288" r="11" fill="#256A75"/>
  <text x="74" y="293" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>
  <text x="180" y="292" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">LIMPEZA DE INBOX</text>
  <text x="64" y="316" font-size="12" fill="#1B2A33" font-weight="600">Quando: toda noite às 22h</text>
  <text x="64" y="334" font-size="11.5" fill="#7C7768">classifica e-mails · arquiva marketing</text>
  <text x="64" y="350" font-size="11.5" fill="#7C7768">rascunha respostas simples para revisão</text>
  <rect x="64" y="364" width="214" height="28" rx="7" fill="#EFF6F7" stroke="#CFE3E6"/>
  <text x="171" y="382" font-size="11.5" fill="#256A75" text-anchor="middle" font-weight="700">inbox controlado pela manhã</text>

  <!-- P5: Conteúdo programado -->
  <g filter="url(#sh18b)">
    <rect x="314" y="266" width="254" height="136" rx="12" fill="#FFFFFF" stroke="#E2D4AC"/>
  </g>
  <path d="M314,279 a12,12 0 0 1 12,-12 h230 a12,12 0 0 1 12,12 v18 h-254 z" fill="#C2912C"/>
  <circle cx="344" cy="288" r="11" fill="#9A7A2E"/>
  <text x="344" y="293" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">5</text>
  <text x="450" y="292" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">CONTEÚDO PROGRAMADO</text>
  <text x="334" y="316" font-size="12" fill="#1B2A33" font-weight="600">Quando: a cada 3 dias</text>
  <text x="334" y="334" font-size="11.5" fill="#7C7768">identifica temas em alta no setor</text>
  <text x="334" y="350" font-size="11.5" fill="#7C7768">draft de post LinkedIn na sua voz</text>
  <rect x="334" y="364" width="214" height="28" rx="7" fill="#FBF6EA" stroke="#E2D4AC"/>
  <text x="441" y="382" font-size="11.5" fill="#9A7A2E" text-anchor="middle" font-weight="700">cadência de presença sem esforço diário</text>

  <!-- P6: Lembrete inteligente -->
  <g filter="url(#sh18b)">
    <rect x="584" y="266" width="254" height="136" rx="12" fill="#FFFFFF" stroke="#E7CDBE"/>
  </g>
  <path d="M584,279 a12,12 0 0 1 12,-12 h230 a12,12 0 0 1 12,12 v18 h-254 z" fill="#B5532F"/>
  <circle cx="614" cy="288" r="11" fill="#9A4025"/>
  <text x="614" y="293" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">6</text>
  <text x="720" y="292" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">LEMBRETE INTELIGENTE</text>
  <text x="604" y="316" font-size="12" fill="#1B2A33" font-weight="600">Quando: 2h antes de reunião</text>
  <text x="604" y="334" font-size="11.5" fill="#7C7768">briefing com último contato,</text>
  <text x="604" y="350" font-size="11.5" fill="#7C7768">pontos em aberto, contexto recente</text>
  <rect x="604" y="364" width="214" height="28" rx="7" fill="#F0DDD2" stroke="#E7CDBE"/>
  <text x="711" y="382" font-size="11.5" fill="#B5532F" text-anchor="middle" font-weight="700">chegada preparada em toda reunião</text>

  <!-- Nota de governança -->
  <g filter="url(#sh18b)">
    <rect x="44" y="418" width="810" height="48" rx="11" fill="#FBF6EA" stroke="#E2D4AC"/>
  </g>
  <text x="64" y="438" font-size="12.5" font-weight="700" fill="#9A7A2E">Boas práticas de operador:</text>
  <text x="64" y="456" font-size="12" fill="#7C7768">comece com 2–3 tasks críticas · calibre periodicidade com utilidade real · revise mensalmente · configure alerta de falha · aposente tasks que ninguém lê</text>

  <!-- Legenda rodapé -->
  <text x="44" y="494" font-size="12.5" fill="#7C7768" font-style="italic">Cada padrão é alavanca recorrente. Trabalho estruturado em background libera atenção para o que só você consegue fazer.</text>
</svg>
