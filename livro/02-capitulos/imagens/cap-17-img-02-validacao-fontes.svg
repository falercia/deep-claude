<svg viewBox="0 0 880 500" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh16b" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule16b" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
    <linearGradient id="riskBar16b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2E7D8A"/><stop offset="1" stop-color="#B5532F"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="878" height="498" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <!-- Kicker + título -->
  <text x="44" y="48" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 16.2 · INVARIANTE 1 — PLAUSIBILIDADE</text>
  <text x="44" y="78" font-size="23" font-weight="700" fill="#1B2A33">Hierarquia de confiabilidade de fontes</text>
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule16b)"/>

  <!-- Eixo de confiabilidade à esquerda -->
  <rect x="44" y="118" width="10" height="300" rx="5" fill="url(#riskBar16b)"/>
  <text x="54" y="116" font-size="11" fill="#256A75" font-weight="600">+ confiável</text>
  <text x="54" y="432" font-size="11" fill="#B5532F" font-weight="600">descarte</text>

  <!-- TIER 1: Altíssima -->
  <g filter="url(#sh16b)">
    <rect x="72" y="118" width="782" height="52" rx="10" fill="#FFFFFF" stroke="#BBD7DB"/>
  </g>
  <circle cx="102" cy="144" r="14" fill="#2E7D8A"/>
  <text x="102" y="149" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">T1</text>
  <text x="128" y="138" font-size="15" font-weight="700" fill="#1B2A33">Tier 1 — Altíssima confiabilidade</text>
  <text x="128" y="157" font-size="12" fill="#7C7768">Bancos centrais, órgãos reguladores, IBGE, jornais oficiais</text>
  <text x="834" y="148" font-size="11.5" fill="#256A75" font-weight="600" text-anchor="end">use sem hesitar</text>

  <!-- TIER 2: Alta -->
  <g filter="url(#sh16b)">
    <rect x="72" y="182" width="782" height="52" rx="10" fill="#FFFFFF" stroke="#BBD7DB"/>
  </g>
  <circle cx="102" cy="208" r="14" fill="#2E7D8A" opacity="0.7"/>
  <text x="102" y="213" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">T2</text>
  <text x="128" y="202" font-size="15" font-weight="700" fill="#1B2A33">Tier 2 — Alta confiabilidade</text>
  <text x="128" y="221" font-size="12" fill="#7C7768">Consultorias top-tier, mídia profissional consolidada, papers peer-reviewed</text>
  <text x="834" y="212" font-size="11.5" fill="#256A75" font-weight="600" text-anchor="end">use com confiança, cite o autor</text>

  <!-- TIER 3: Moderada -->
  <g filter="url(#sh16b)">
    <rect x="72" y="246" width="782" height="52" rx="10" fill="#FFFFFF" stroke="#CFC8B6"/>
  </g>
  <circle cx="102" cy="272" r="14" fill="#C2912C"/>
  <text x="102" y="277" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">T3</text>
  <text x="128" y="266" font-size="15" font-weight="700" fill="#1B2A33">Tier 3 — Confiabilidade moderada</text>
  <text x="128" y="285" font-size="12" fill="#7C7768">Blogs corporativos, releases oficiais, mídia regional, sites técnicos especializados</text>
  <text x="834" y="276" font-size="11.5" fill="#9A7A2E" font-weight="600" text-anchor="end">verifique antes de citar</text>

  <!-- TIER 4: Baixa -->
  <g filter="url(#sh16b)">
    <rect x="72" y="310" width="782" height="52" rx="10" fill="#FFFFFF" stroke="#E7CDBE"/>
  </g>
  <circle cx="102" cy="336" r="14" fill="#B5532F" opacity="0.6"/>
  <text x="102" y="341" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">T4</text>
  <text x="128" y="330" font-size="15" font-weight="700" fill="#1B2A33">Tier 4 — Baixa confiabilidade</text>
  <text x="128" y="349" font-size="12" fill="#7C7768">Blogs pessoais sem expertise, fóruns, redes sociais, conteúdo sem autoria clara</text>
  <text x="834" y="340" font-size="11.5" fill="#B5532F" font-weight="600" text-anchor="end">só como indicador inicial</text>

  <!-- TIER 5: Desconfiança -->
  <g filter="url(#sh16b)">
    <rect x="72" y="374" width="782" height="52" rx="10" fill="#F0DDD2" stroke="#E7CDBE"/>
  </g>
  <circle cx="102" cy="400" r="14" fill="#B5532F"/>
  <text x="102" y="405" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">T5</text>
  <text x="128" y="394" font-size="15" font-weight="700" fill="#B5532F">Tier 5 — Desconfiança ativa</text>
  <text x="128" y="413" font-size="12" fill="#7C7768">Sites com agenda declarada, conteúdo gerado sem autoria, SEO spam</text>
  <text x="834" y="404" font-size="11.5" fill="#B5532F" font-weight="600" text-anchor="end">descarte ou valide duramente</text>

  <!-- Alerta final -->
  <g filter="url(#sh16b)">
    <rect x="44" y="442" width="810" height="36" rx="9" fill="#FBF6EA" stroke="#E2D4AC"/>
  </g>
  <text x="64" y="457" font-size="12" font-weight="700" fill="#9A7A2E">Disciplina mínima profissional:</text>
  <text x="64" y="470" font-size="11.5" fill="#7C7768">material que sai da organização — abra a fonte, leia o trecho, confirme. Número específico — vá à fonte primária, não à secundária que Claude citou.</text>

  <!-- Legenda rodapé -->
  <text x="44" y="492" font-size="12.5" fill="#7C7768" font-style="italic">Web Search faz triagem básica, não infalível. A curadoria fina das fontes citadas continua sendo trabalho do operador.</text>
</svg>
