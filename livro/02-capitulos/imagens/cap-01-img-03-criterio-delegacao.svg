<svg viewBox="0 0 880 490" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh1c" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule1c" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
    <marker id="axEnd1c" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#1B2A33"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="878" height="488" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <text x="44" y="48" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 1.3 · INVARIANTE 9 — OPERADOR</text>
  <text x="44" y="78" font-size="23" font-weight="700" fill="#1B2A33">Critério de delegação executiva</text>
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule1c)"/>

  <!-- axes -->
  <line x1="160" y1="420" x2="820" y2="420" stroke="#1B2A33" stroke-width="2" marker-end="url(#axEnd1c)"/>
  <line x1="160" y1="420" x2="160" y2="118" stroke="#1B2A33" stroke-width="2" marker-end="url(#axEnd1c)"/>

  <!-- axis labels -->
  <text x="490" y="450" font-size="12.5" fill="#1B2A33" text-anchor="middle" font-weight="600">CAPACIDADE DE VERIFICAR O RESULTADO →</text>
  <text x="490" y="464" font-size="11.5" fill="#7C7768" text-anchor="middle">baixa ←————————————→ alta</text>

  <text x="148" y="270" font-size="12.5" fill="#1B2A33" font-weight="600" text-anchor="middle" transform="rotate(-90 148 270)">REVERSIBILIDADE DO ERRO →</text>
  <text x="136" y="270" font-size="11" fill="#7C7768" text-anchor="middle" transform="rotate(-90 136 270)">baixa ←————→ alta</text>

  <!-- dividers -->
  <line x1="490" y1="130" x2="490" y2="420" stroke="#CFC8B6" stroke-width="1.2" stroke-dasharray="4 4"/>
  <line x1="160" y1="270" x2="820" y2="270" stroke="#CFC8B6" stroke-width="1.2" stroke-dasharray="4 4"/>

  <!-- Q1 top-left: Alta reversibilidade + Baixa verificação → co-executar -->
  <g filter="url(#sh1c)">
    <rect x="174" y="138" width="300" height="118" rx="12" fill="#F1ECE0" stroke="#D8D0BD"/>
  </g>
  <text x="324" y="168" font-size="14" font-weight="700" fill="#44525C" text-anchor="middle">CO-EXECUTAR</text>
  <text x="324" y="188" font-size="11.5" fill="#7C7768" text-anchor="middle">alta reversibilidade · baixa verificação</text>
  <text x="324" y="208" font-size="11.5" fill="#7C7768" text-anchor="middle">Brainstorm, exploração, rascunho</text>
  <text x="324" y="224" font-size="11.5" fill="#7C7768" text-anchor="middle">IA prepara, humano ancora o julgamento</text>
  <text x="324" y="242" font-size="11" fill="#44525C" font-style="italic" text-anchor="middle">você está no loop</text>

  <!-- Q2 top-right: Alta reversibilidade + Alta verificação → delegar -->
  <g filter="url(#sh1c)">
    <rect x="504" y="138" width="300" height="118" rx="12" fill="#EFF6F7" stroke="#BBD7DB"/>
  </g>
  <text x="654" y="168" font-size="14" font-weight="700" fill="#2E7D8A" text-anchor="middle">DELEGAR COM SEGURANÇA</text>
  <text x="654" y="188" font-size="11.5" fill="#7C7768" text-anchor="middle">alta reversibilidade · alta verificação</text>
  <text x="654" y="208" font-size="11.5" fill="#7C7768" text-anchor="middle">Síntese, primeiro rascunho, pesquisa</text>
  <text x="654" y="224" font-size="11.5" fill="#7C7768" text-anchor="middle">IA executa, você valida e aprova</text>
  <text x="654" y="242" font-size="11" fill="#2E7D8A" font-style="italic" text-anchor="middle">fluxo de máxima alavancagem</text>

  <!-- Q3 bottom-left: Baixa reversibilidade + Baixa verificação → reter -->
  <g filter="url(#sh1c)">
    <rect x="174" y="284" width="300" height="118" rx="12" fill="#F0DDD2" stroke="#E7CDBE"/>
  </g>
  <text x="324" y="314" font-size="14" font-weight="700" fill="#B5532F" text-anchor="middle">RETER</text>
  <text x="324" y="334" font-size="11.5" fill="#7C7768" text-anchor="middle">baixa reversibilidade · baixa verificação</text>
  <text x="324" y="354" font-size="11.5" fill="#7C7768" text-anchor="middle">Decisão estratégica, julgamento sobre</text>
  <text x="324" y="370" font-size="11.5" fill="#7C7768" text-anchor="middle">pessoas, comunicação sensível</text>
  <text x="324" y="390" font-size="11" fill="#B5532F" font-style="italic" text-anchor="middle">responsabilidade não se transfere para IA</text>

  <!-- Q4 bottom-right: Baixa reversibilidade + Alta verificação → co-executar com freio -->
  <g filter="url(#sh1c)">
    <rect x="504" y="284" width="300" height="118" rx="12" fill="#FBF6EA" stroke="#E2D4AC"/>
  </g>
  <text x="654" y="314" font-size="14" font-weight="700" fill="#9A7A2E" text-anchor="middle">CO-EXECUTAR COM FREIO</text>
  <text x="654" y="334" font-size="11.5" fill="#7C7768" text-anchor="middle">baixa reversibilidade · alta verificação</text>
  <text x="654" y="354" font-size="11.5" fill="#7C7768" text-anchor="middle">Análise de risco, auditoria, M&amp;A</text>
  <text x="654" y="370" font-size="11.5" fill="#7C7768" text-anchor="middle">IA prepara análise densa, você decide</text>
  <text x="654" y="390" font-size="11" fill="#9A7A2E" font-style="italic" text-anchor="middle">validar fontes críticas antes de assinar</text>

  <text x="44" y="482" font-size="12.5" fill="#7C7768" font-style="italic">Dois eixos: reversibilidade do erro × capacidade de verificação do resultado. Os quatro quadrantes mapeiam quais tarefas delegar, quais co-executar e quais reter.</text>
</svg>
