<svg viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh11b" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule11b" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="878" height="478" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <text x="44" y="48" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 11.2 · INVARIANTE 9 — OPERADOR</text>
  <text x="44" y="78" font-size="23" font-weight="700" fill="#1B2A33">Web versus Desktop — quando usar cada</text>
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule11b)"/>

  <!-- LEFT PANEL: WEB -->
  <g filter="url(#sh11b)">
    <rect x="56" y="116" width="356" height="292" rx="13" fill="#FFFFFF" stroke="#CFE3E6"/>
  </g>
  <path d="M56,129 a13,13 0 0 1 13,-13 h330 a13,13 0 0 1 13,13 v22 h-356 z" fill="#2E7D8A"/>
  <text x="76" y="144" font-size="15" font-weight="700" fill="#FFFFFF" letter-spacing="1">CLAUDE WEB</text>
  <text x="402" y="144" font-size="12" fill="#DCEFF1" text-anchor="end" font-style="italic">a camada conversacional</text>

  <g font-size="13" fill="#1B2A33">
    <rect x="76" y="160" width="316" height="30" rx="7" fill="#EFF6F7" stroke="#CFE3E6"/>
    <text x="92" y="180">Conversa longa, escrita, brainstorm</text>
    <rect x="76" y="198" width="316" height="30" rx="7" fill="#EFF6F7" stroke="#CFE3E6"/>
    <text x="92" y="218">Pesquisa profunda com Research</text>
    <rect x="76" y="236" width="316" height="30" rx="7" fill="#EFF6F7" stroke="#CFE3E6"/>
    <text x="92" y="256">Acessível de qualquer dispositivo</text>
    <rect x="76" y="274" width="316" height="30" rx="7" fill="#EFF6F7" stroke="#CFE3E6"/>
    <text x="92" y="294">Histórico sincronizado, Projects</text>
  </g>

  <text x="76" y="337" font-size="12.5" fill="#256A75" font-weight="600">IDEAL PARA: trabalho cognitivo puro</text>
  <text x="76" y="356" font-size="12" fill="#7C7768">não precisa tocar arquivos locais</text>

  <text x="76" y="383" font-size="12.5" fill="#7C7768">— sem Cowork mode</text>
  <text x="76" y="399" font-size="12.5" fill="#7C7768">— MCP apenas remotos</text>

  <!-- RIGHT PANEL: DESKTOP -->
  <g filter="url(#sh11b)">
    <rect x="468" y="116" width="356" height="292" rx="13" fill="#FFFFFF" stroke="#E2D4AC"/>
  </g>
  <path d="M468,129 a13,13 0 0 1 13,-13 h330 a13,13 0 0 1 13,13 v22 h-356 z" fill="#C2912C"/>
  <text x="488" y="144" font-size="15" font-weight="700" fill="#FFFFFF" letter-spacing="1">CLAUDE DESKTOP</text>
  <text x="814" y="144" font-size="12" fill="#FBEFD0" text-anchor="end" font-style="italic">a camada operacional</text>

  <g font-size="13" fill="#1B2A33">
    <rect x="488" y="160" width="316" height="30" rx="7" fill="#FBF6EA" stroke="#EADfBF"/>
    <text x="504" y="180">Automação de arquivos e apps locais</text>
    <rect x="488" y="198" width="316" height="30" rx="7" fill="#FBF6EA" stroke="#EADfBF"/>
    <text x="504" y="218">MCP customizados rodando na máquina</text>
    <rect x="488" y="236" width="316" height="30" rx="7" fill="#FBF6EA" stroke="#EADfBF"/>
    <text x="504" y="256">Cowork mode — opera apps nativos</text>
    <rect x="488" y="274" width="316" height="30" rx="7" fill="#FBF6EA" stroke="#EADfBF"/>
    <text x="504" y="294">Atalho global de qualquer lugar</text>
  </g>

  <text x="488" y="337" font-size="12.5" fill="#9A7A2E" font-weight="600">IDEAL PARA: automação operacional real</text>
  <text x="488" y="356" font-size="12" fill="#7C7768">fluxos que envolvem ação no sistema</text>

  <text x="488" y="383" font-size="12.5" fill="#7C7768">+ Cowork mode (3 tiers de permissão)</text>
  <text x="488" y="399" font-size="12.5" fill="#7C7768">+ MCP locais e remotos</text>

  <text x="44" y="452" font-size="12.5" fill="#7C7768" font-style="italic">Não é exclusiva: profissionais maduros usam os dois. Mesma conta sincroniza histórico, Projects e configurações entre eles.</text>
</svg>
