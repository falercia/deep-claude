<svg viewBox="0 0 880 500" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh29d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule29d" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
    <marker id="arrInk29d" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#44525C"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="878" height="498" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <!-- Kicker + Title -->
  <text x="44" y="48" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 29.4 · INVARIANTE 6 — AUTONOMIA PROPORCIONAL</text>
  <text x="44" y="78" font-size="23" font-weight="700" fill="#1B2A33">Quatro vetores de ataque em servidores MCP</text>
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule29d)"/>

  <!-- Column header labels -->
  <text x="210" y="112" font-size="11.5" font-weight="700" fill="#B5532F" text-anchor="middle" letter-spacing="1">VETOR</text>
  <text x="648" y="112" font-size="11.5" font-weight="700" fill="#2E7D8A" text-anchor="middle" letter-spacing="1">MITIGAÇÃO PRIMÁRIA</text>
  <line x1="44" y1="118" x2="836" y2="118" stroke="#E6DFC9" stroke-width="1"/>

  <!-- Row 1: Prompt Injection -->
  <g filter="url(#sh29d)">
    <rect x="44" y="128" width="370" height="72" rx="11" fill="#F0DDD2" stroke="#E7CDBE"/>
  </g>
  <circle cx="78" cy="164" r="14" fill="#B5532F"/>
  <text x="78" y="169" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="104" y="152" font-size="14" font-weight="700" fill="#B5532F">Prompt Injection</text>
  <text x="104" y="170" font-size="12" fill="#44525C">Instrução disfarçada de dado</text>
  <text x="104" y="186" font-size="12" fill="#44525C">em tool result</text>

  <path d="M414,164 H458" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk29d)"/>

  <g filter="url(#sh29d)">
    <rect x="464" y="128" width="372" height="72" rx="11" fill="#EFF6F7" stroke="#CFE3E6"/>
  </g>
  <text x="484" y="152" font-size="13" font-weight="700" fill="#2E7D8A">Delimitação no system prompt</text>
  <text x="484" y="170" font-size="12" fill="#44525C">tool results = dados não confiáveis</text>
  <text x="484" y="186" font-size="12" fill="#44525C">+ sanitização de conteúdo de terceiros</text>

  <!-- Row 2: Servidor Malicioso -->
  <g filter="url(#sh29d)">
    <rect x="44" y="214" width="370" height="72" rx="11" fill="#F0DDD2" stroke="#E7CDBE"/>
  </g>
  <circle cx="78" cy="250" r="14" fill="#B5532F"/>
  <text x="78" y="255" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="104" y="238" font-size="14" font-weight="700" fill="#B5532F">Servidor Malicioso</text>
  <text x="104" y="256" font-size="12" fill="#44525C">Supply chain: exfiltra contexto</text>
  <text x="104" y="272" font-size="12" fill="#44525C">ou modifica resultados</text>

  <path d="M414,250 H458" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk29d)"/>

  <g filter="url(#sh29d)">
    <rect x="464" y="214" width="372" height="72" rx="11" fill="#EFF6F7" stroke="#CFE3E6"/>
  </g>
  <text x="484" y="238" font-size="13" font-weight="700" fill="#2E7D8A">Catálogo aprovado + revisão</text>
  <text x="484" y="256" font-size="12" fill="#44525C">nenhum servidor sem revisão</text>
  <text x="484" y="272" font-size="12" fill="#44525C">de código ou procedência</text>

  <!-- Row 3: Confused Deputy -->
  <g filter="url(#sh29d)">
    <rect x="44" y="300" width="370" height="72" rx="11" fill="#F0DDD2" stroke="#E7CDBE"/>
  </g>
  <circle cx="78" cy="336" r="14" fill="#B5532F"/>
  <text x="78" y="341" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="104" y="324" font-size="14" font-weight="700" fill="#B5532F">Confused Deputy</text>
  <text x="104" y="342" font-size="12" fill="#44525C">Servidor usa permissão própria</text>
  <text x="104" y="358" font-size="12" fill="#44525C">em vez de permissão do usuário</text>

  <path d="M414,336 H458" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk29d)"/>

  <g filter="url(#sh29d)">
    <rect x="464" y="300" width="372" height="72" rx="11" fill="#EFF6F7" stroke="#CFE3E6"/>
  </g>
  <text x="484" y="324" font-size="13" font-weight="700" fill="#2E7D8A">Token passthrough</text>
  <text x="484" y="342" font-size="12" fill="#44525C">servidor usa token do usuário</text>
  <text x="484" y="358" font-size="12" fill="#44525C">+ validação server-side de escopo</text>

  <!-- Row 4: Exfiltração -->
  <g filter="url(#sh29d)">
    <rect x="44" y="386" width="370" height="72" rx="11" fill="#F0DDD2" stroke="#E7CDBE"/>
  </g>
  <circle cx="78" cy="422" r="14" fill="#B5532F"/>
  <text x="78" y="427" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>
  <text x="104" y="410" font-size="14" font-weight="700" fill="#B5532F">Exfiltração via Tool</text>
  <text x="104" y="428" font-size="12" fill="#44525C">Modelo manipulado escreve dados</text>
  <text x="104" y="444" font-size="12" fill="#44525C">sensíveis em endpoint externo</text>

  <path d="M414,422 H458" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk29d)"/>

  <g filter="url(#sh29d)">
    <rect x="464" y="386" width="372" height="72" rx="11" fill="#EFF6F7" stroke="#CFE3E6"/>
  </g>
  <text x="484" y="410" font-size="13" font-weight="700" fill="#2E7D8A">Separação leitura / escrita</text>
  <text x="484" y="428" font-size="12" fill="#44525C">validação de destino em tools</text>
  <text x="484" y="444" font-size="12" fill="#44525C">de saída; categorização por dado</text>

  <!-- Caption -->
  <text x="44" y="488" font-size="12.5" fill="#7C7768" font-style="italic">Segurança em profundidade: cada vetor tem mitigação específica. A defesa não é técnica — é de delimitação entre dados e instruções.</text>
</svg>
