<svg viewBox="0 0 880 500" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
    <marker id="arrInk" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#44525C"/>
    </marker>
    <marker id="arrGold" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#C2912C"/>
    </marker>
    <marker id="arrRisk" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#B5532F"/>
    </marker>
  </defs>

  <!-- Frame -->
  <rect x="1" y="1" width="878" height="498" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <!-- Kicker + Title -->
  <text x="44" y="48" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 36.1 · INVARIANTE 8 — RESPONSABILIDADE INDELEGÁVEL</text>
  <text x="44" y="78" font-size="23" font-weight="700" fill="#1B2A33">Pipeline de due diligence assistida</text>
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule)"/>

  <!-- AI PIPELINE label (top band) -->
  <text x="44" y="128" font-size="11.5" font-weight="700" fill="#44525C" letter-spacing="1">PIPELINE DE AGENTES · faz a leitura linear</text>

  <!-- Step 1: Ingestão -->
  <g filter="url(#sh)">
    <rect x="44" y="138" width="116" height="82" rx="11" fill="#FFFFFF" stroke="#CFC8B6"/>
  </g>
  <circle cx="64" cy="154" r="11" fill="#44525C"/>
  <text x="64" y="159" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="102" y="174" font-size="12.5" font-weight="700" fill="#1B2A33" text-anchor="middle">Ingestão</text>
  <text x="102" y="190" font-size="11" fill="#7C7768" text-anchor="middle">data room</text>
  <text x="102" y="205" font-size="11" fill="#7C7768" text-anchor="middle">chunking</text>

  <!-- Arrow 1→2 -->
  <path d="M160,179 H190" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk)"/>

  <!-- Step 2: Classificação -->
  <g filter="url(#sh)">
    <rect x="192" y="138" width="116" height="82" rx="11" fill="#FFFFFF" stroke="#BBD7DB"/>
  </g>
  <circle cx="212" cy="154" r="11" fill="#2E7D8A"/>
  <text x="212" y="159" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="250" y="174" font-size="12.5" font-weight="700" fill="#1B2A33" text-anchor="middle">Classificação</text>
  <text x="250" y="190" font-size="11" fill="#7C7768" text-anchor="middle">tipo de doc</text>
  <text x="250" y="205" font-size="10.5" fill="#2E7D8A" text-anchor="middle">Haiku</text>

  <!-- Arrow 2→3 -->
  <path d="M308,179 H338" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk)"/>

  <!-- Step 3: Extração -->
  <g filter="url(#sh)">
    <rect x="340" y="138" width="130" height="82" rx="11" fill="#FFFFFF" stroke="#BBD7DB"/>
  </g>
  <circle cx="360" cy="154" r="11" fill="#2E7D8A"/>
  <text x="360" y="159" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="405" y="174" font-size="12.5" font-weight="700" fill="#1B2A33" text-anchor="middle">Extração</text>
  <text x="405" y="190" font-size="11" fill="#7C7768" text-anchor="middle">cláusulas + citação</text>
  <text x="405" y="205" font-size="10.5" fill="#2E7D8A" text-anchor="middle">Sonnet · rubrica</text>

  <!-- Arrow 3→4 -->
  <path d="M470,179 H500" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk)"/>

  <!-- Step 4: Sumarização -->
  <g filter="url(#sh)">
    <rect x="502" y="138" width="116" height="82" rx="11" fill="#FFFFFF" stroke="#BBD7DB"/>
  </g>
  <circle cx="522" cy="154" r="11" fill="#2E7D8A"/>
  <text x="522" y="159" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>
  <text x="560" y="174" font-size="12.5" font-weight="700" fill="#1B2A33" text-anchor="middle">Sumarização</text>
  <text x="560" y="190" font-size="11" fill="#7C7768" text-anchor="middle">por categoria</text>
  <text x="560" y="205" font-size="10.5" fill="#2E7D8A" text-anchor="middle">Sonnet</text>

  <!-- Arrow 4→5 -->
  <path d="M618,179 H648" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk)"/>

  <!-- Step 5: Red flags -->
  <g filter="url(#sh)">
    <rect x="650" y="138" width="116" height="82" rx="11" fill="#FFFFFF" stroke="#E7CDBE"/>
  </g>
  <circle cx="670" cy="154" r="11" fill="#B5532F"/>
  <text x="670" y="159" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">5</text>
  <text x="708" y="174" font-size="12.5" font-weight="700" fill="#1B2A33" text-anchor="middle">Red flags</text>
  <text x="708" y="190" font-size="11" fill="#7C7768" text-anchor="middle">SEV-1 / SEV-2</text>
  <text x="708" y="205" font-size="10.5" fill="#9A7A2E" text-anchor="middle">Opus (críticos)</text>

  <!-- Arrow 5→6 (down to human) -->
  <path d="M708,220 V262" fill="none" stroke="#C2912C" stroke-width="2.4" marker-end="url(#arrGold)"/>

  <!-- Divider: AI / Human -->
  <line x1="44" y1="250" x2="836" y2="250" stroke="#E6DFC9" stroke-width="1.2" stroke-dasharray="6 4"/>
  <rect x="352" y="242" width="176" height="18" rx="9" fill="#FBF8F1" stroke="#E6DFC9"/>
  <text x="440" y="255" font-size="11" font-weight="700" fill="#7C7768" text-anchor="middle" letter-spacing="1">FRONTEIRA DE RESPONSABILIDADE</text>

  <!-- Step 6: Revisão humana focada -->
  <text x="44" y="282" font-size="11.5" font-weight="700" fill="#C2912C" letter-spacing="1">REVISÃO HUMANA FOCADA · faz o julgamento</text>

  <g filter="url(#sh)">
    <rect x="44" y="292" width="792" height="100" rx="13" fill="#FFFFFF" stroke="#E2D4AC"/>
  </g>
  <path d="M44,305 a13,13 0 0 1 13,-13 h766 a13,13 0 0 1 13,13 v18 h-792 z" fill="#1B2A33"/>
  <circle cx="68" cy="314" r="11" fill="#C2912C"/>
  <text x="68" y="319" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">6</text>
  <text x="440" y="318" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">Sócio Sênior — Revisão Focada</text>

  <!-- Sub-elements in step 6 -->
  <rect x="62" y="334" width="176" height="44" rx="9" fill="#FBF6EA" stroke="#E2D4AC"/>
  <text x="150" y="351" font-size="12" fill="#9A7A2E" text-anchor="middle" font-weight="600">Lê apenas os flags</text>
  <text x="150" y="368" font-size="11.5" fill="#7C7768" text-anchor="middle">não o data room inteiro</text>

  <rect x="254" y="334" width="176" height="44" rx="9" fill="#FBF6EA" stroke="#E2D4AC"/>
  <text x="342" y="351" font-size="12" fill="#9A7A2E" text-anchor="middle" font-weight="600">Interpreta o risco</text>
  <text x="342" y="368" font-size="11.5" fill="#7C7768" text-anchor="middle">julgamento jurídico</text>

  <rect x="446" y="334" width="176" height="44" rx="9" fill="#FBF6EA" stroke="#E2D4AC"/>
  <text x="534" y="351" font-size="12" fill="#9A7A2E" text-anchor="middle" font-weight="600">Decide a estratégia</text>
  <text x="534" y="368" font-size="11.5" fill="#7C7768" text-anchor="middle">onde a IA não chega</text>

  <rect x="638" y="334" width="190" height="44" rx="9" fill="#1B2A33" stroke="#1B2A33"/>
  <text x="733" y="351" font-size="12" fill="#C2912C" text-anchor="middle" font-weight="700">Assina o parecer</text>
  <text x="733" y="368" font-size="11.5" fill="#FFFFFF" text-anchor="middle">nome + número OAB</text>

  <!-- Key principle box -->
  <g filter="url(#sh)">
    <rect x="44" y="408" width="792" height="42" rx="10" fill="#F0DDD2" stroke="#E7CDBE"/>
  </g>
  <text x="440" y="427" font-size="13" font-weight="700" fill="#B5532F" text-anchor="middle">A IA faz a leitura. O advogado faz o julgamento. A assinatura não muda de mãos.</text>
  <text x="440" y="443" font-size="11.5" fill="#7C7768" text-anchor="middle">Invariante 8: responsabilidade sempre tem um nome humano — com número de OAB.</text>

  <!-- Caption -->
  <text x="44" y="484" font-size="12.5" fill="#7C7768" font-style="italic">Citação literal obrigatória em cada extração com hash verificável contra o original. Ausência de flag não é atestado de ausência.</text>
</svg>
