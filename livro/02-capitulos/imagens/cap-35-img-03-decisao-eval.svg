<svg viewBox="0 0 880 510" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
    <marker id="arrInk" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#44525C"/>
    </marker>
    <marker id="arrGold" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#C2912C"/>
    </marker>
    <marker id="arrRisk" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#B5532F"/>
    </marker>
  </defs>

  <!-- Frame -->
  <rect x="1" y="1" width="878" height="508" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <!-- Kicker + Title -->
  <text x="44" y="48" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 34.3 · INVARIANTE 7 — TERMÔMETRO</text>
  <text x="44" y="78" font-size="23" font-weight="700" fill="#1B2A33">Antes de confiar no eval: três perguntas em sequência</text>
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule)"/>

  <!-- Question 1 node -->
  <g filter="url(#sh)">
    <rect x="270" y="118" width="340" height="66" rx="13" fill="#1B2A33"/>
  </g>
  <text x="440" y="146" font-size="13.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">O critério é verificável por terceiro</text>
  <text x="440" y="166" font-size="13.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">sem acesso ao sistema?</text>

  <!-- Q1 YES arrow (right → green outcome) -->
  <path d="M610,151 H680" fill="none" stroke="#2E7D8A" stroke-width="2.2" marker-end="url(#arrInk)"/>
  <text x="642" y="145" font-size="12" font-weight="700" fill="#2E7D8A">SIM</text>

  <!-- Q1 NO arrow (down → action) -->
  <path d="M440,184 V220" fill="none" stroke="#B5532F" stroke-width="2.2" marker-end="url(#arrRisk)"/>
  <text x="452" y="210" font-size="12" font-weight="700" fill="#B5532F">NÃO</text>

  <!-- Q1 NO action box -->
  <g filter="url(#sh)">
    <rect x="270" y="222" width="340" height="44" rx="10" fill="#F0DDD2" stroke="#E7CDBE"/>
  </g>
  <text x="440" y="239" font-size="12" fill="#B5532F" text-anchor="middle" font-weight="600">Reescrever como rubrica verificável</text>
  <text x="440" y="256" font-size="11.5" fill="#7C7768" text-anchor="middle">por terceiro — sem referência ao sistema</text>

  <!-- Arrow from Q1 action → Q2 -->
  <path d="M440,266 V302" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk)"/>

  <!-- Question 2 node -->
  <g filter="url(#sh)">
    <rect x="270" y="304" width="340" height="66" rx="13" fill="#243B47"/>
  </g>
  <text x="440" y="332" font-size="13.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">O dataset contém casos onde</text>
  <text x="440" y="352" font-size="13.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">o sistema falha hoje?</text>

  <!-- Q2 YES arrow (right) -->
  <path d="M610,337 H680" fill="none" stroke="#2E7D8A" stroke-width="2.2" marker-end="url(#arrInk)"/>
  <text x="642" y="331" font-size="12" font-weight="700" fill="#2E7D8A">SIM</text>

  <!-- Q2 NO arrow (down) -->
  <path d="M440,370 V406" fill="none" stroke="#B5532F" stroke-width="2.2" marker-end="url(#arrRisk)"/>
  <text x="452" y="396" font-size="12" font-weight="700" fill="#B5532F">NÃO</text>

  <!-- Q2 NO action box -->
  <g filter="url(#sh)">
    <rect x="270" y="408" width="340" height="44" rx="10" fill="#F0DDD2" stroke="#E7CDBE"/>
  </g>
  <text x="440" y="425" font-size="12" fill="#B5532F" text-anchor="middle" font-weight="600">Incluir deliberadamente casos</text>
  <text x="440" y="442" font-size="11.5" fill="#7C7768" text-anchor="middle">de falha real + adversariais</text>

  <!-- Arrow from Q2 action → Q3 -->
  <path d="M440,452 V468 H756 V330" fill="none" stroke="#44525C" stroke-width="1.6" stroke-dasharray="5 4"/>

  <!-- Question 3 node -->
  <g filter="url(#sh)">
    <rect x="682" y="180" width="170" height="114" rx="13" fill="#FFFFFF" stroke="#CFC8B6"/>
  </g>
  <text x="767" y="208" font-size="12" font-weight="700" fill="#1B2A33" text-anchor="middle">O método discrimina</text>
  <text x="767" y="226" font-size="12" font-weight="700" fill="#1B2A33" text-anchor="middle">entre "ótimo" e</text>
  <text x="767" y="244" font-size="12" font-weight="700" fill="#1B2A33" text-anchor="middle">"aceitável" onde</text>
  <text x="767" y="262" font-size="12" font-weight="700" fill="#1B2A33" text-anchor="middle">mais importa?</text>

  <!-- Q3 YES → final outcome (green) -->
  <path d="M767,294 V330" fill="none" stroke="#2E7D8A" stroke-width="2.2" marker-end="url(#arrInk)"/>
  <text x="779" y="320" font-size="12" font-weight="700" fill="#2E7D8A">SIM</text>

  <!-- Final outcome box -->
  <g filter="url(#sh)">
    <rect x="682" y="332" width="170" height="54" rx="12" fill="#2E7D8A"/>
  </g>
  <text x="767" y="358" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">Eval calibrado</text>
  <text x="767" y="376" font-size="12" fill="#CFE3E6" text-anchor="middle">métricas são evidência</text>

  <!-- Q3 NO down -->
  <path d="M767,294 V410" fill="none" stroke="#B5532F" stroke-width="1.6" stroke-dasharray="4 4"/>
  <g filter="url(#sh)">
    <rect x="682" y="412" width="170" height="44" rx="10" fill="#F0DDD2" stroke="#E7CDBE"/>
  </g>
  <text x="767" y="429" font-size="11.5" fill="#B5532F" text-anchor="middle" font-weight="600">Identificar dimensão</text>
  <text x="767" y="446" font-size="11" fill="#7C7768" text-anchor="middle">mais custosa e cobrir</text>

  <!-- Caption -->
  <text x="44" y="498" font-size="12.5" fill="#7C7768" font-style="italic">Qualquer "não" é problema de calibração antes de ser problema de resultado. Avalie o eval antes de usar as métricas para decidir.</text>
</svg>
