<svg viewBox="0 0 880 470" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
    <linearGradient id="costBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#EFF6F7"/><stop offset="1" stop-color="#FBF6EA"/>
    </linearGradient>
    <marker id="arrInk" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#44525C"/>
    </marker>
    <marker id="arrGold" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#C2912C"/>
    </marker>
  </defs>

  <!-- Frame -->
  <rect x="1" y="1" width="878" height="468" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <!-- Kicker + Title -->
  <text x="44" y="48" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 34.2 · INVARIANTE 7 — TERMÔMETRO</text>
  <text x="44" y="78" font-size="23" font-weight="700" fill="#1B2A33">Hierarquia de métodos de pontuação</text>
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule)"/>

  <!-- Cost axis label (left) -->
  <text x="58" y="170" font-size="11" font-weight="700" fill="#7C7768" text-anchor="middle">custo</text>
  <text x="58" y="184" font-size="11" font-weight="700" fill="#B5532F" text-anchor="middle">alto</text>
  <text x="58" y="390" font-size="11" font-weight="700" fill="#2E7D8A" text-anchor="middle">baixo</text>

  <!-- Vertical cost bar -->
  <defs>
    <linearGradient id="costGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0DDD2"/><stop offset="1" stop-color="#EFF6F7"/>
    </linearGradient>
  </defs>
  <rect x="44" y="140" width="16" height="264" rx="8" fill="url(#costGrad)"/>

  <!-- LAYER 1: Determinístico (base, teal) -->
  <g filter="url(#sh)">
    <rect x="90" y="352" width="752" height="72" rx="12" fill="#FFFFFF" stroke="#BBD7DB"/>
  </g>
  <path d="M90,364 a12,12 0 0 1 12,-12 h728 a12,12 0 0 1 12,12 v18 h-752 z" fill="#2E7D8A"/>
  <text x="466" y="379" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">DETERMINÍSTICO — exact match, schema validation, string match</text>
  <!-- Pills row 1 -->
  <rect x="110" y="392" width="86" height="22" rx="11" fill="#EFF6F7" stroke="#CFE3E6"/>
  <text x="153" y="407" font-size="11.5" fill="#256A75" text-anchor="middle" font-weight="600">custo ≈ zero</text>
  <rect x="208" y="392" width="104" height="22" rx="11" fill="#EFF6F7" stroke="#CFE3E6"/>
  <text x="260" y="407" font-size="11.5" fill="#256A75" text-anchor="middle" font-weight="600">cobertura 100%</text>
  <rect x="324" y="392" width="126" height="22" rx="11" fill="#EFF6F7" stroke="#CFE3E6"/>
  <text x="387" y="407" font-size="11.5" fill="#256A75" text-anchor="middle" font-weight="600">sem ambiguidade</text>
  <text x="650" y="407" font-size="12" fill="#7C7768" text-anchor="end" font-style="italic">campos estruturados, formatos, exact values</text>

  <!-- LAYER 2: LLM-as-judge (meio, gold) -->
  <g filter="url(#sh)">
    <rect x="90" y="260" width="752" height="80" rx="12" fill="#FFFFFF" stroke="#E2D4AC"/>
  </g>
  <path d="M90,272 a12,12 0 0 1 12,-12 h728 a12,12 0 0 1 12,12 v18 h-752 z" fill="#C2912C"/>
  <text x="466" y="287" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">LLM-AS-JUDGE — rubrica explícita + output categórico</text>
  <!-- Pills row 2 -->
  <rect x="110" y="302" width="88" height="22" rx="11" fill="#FBF6EA" stroke="#EADfBF"/>
  <text x="154" y="317" font-size="11.5" fill="#9A7A2E" text-anchor="middle" font-weight="600">custo baixo</text>
  <rect x="210" y="302" width="120" height="22" rx="11" fill="#FBF6EA" stroke="#EADfBF"/>
  <text x="270" y="317" font-size="11.5" fill="#9A7A2E" text-anchor="middle" font-weight="600">cobertura parcial</text>
  <rect x="342" y="302" width="148" height="22" rx="11" fill="#FBF6EA" stroke="#EADfBF"/>
  <text x="416" y="317" font-size="11.5" fill="#9A7A2E" text-anchor="middle" font-weight="600">requer calibração</text>
  <text x="830" y="317" font-size="12" fill="#7C7768" text-anchor="end" font-style="italic">semântica, coerência, fidelidade</text>

  <!-- LAYER 3: Humano especialista (topo, ardósia) -->
  <g filter="url(#sh)">
    <rect x="90" y="150" width="752" height="98" rx="12" fill="#FFFFFF" stroke="#CFC8B6"/>
  </g>
  <path d="M90,162 a12,12 0 0 1 12,-12 h728 a12,12 0 0 1 12,12 v18 h-752 z" fill="#1B2A33"/>
  <text x="466" y="177" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">HUMANO ESPECIALISTA — revisão por amostra</text>
  <!-- Pills row 3 -->
  <rect x="110" y="196" width="90" height="22" rx="11" fill="#F1ECE0" stroke="#D8D0BD"/>
  <text x="155" y="211" font-size="11.5" fill="#44525C" text-anchor="middle" font-weight="600">custo alto</text>
  <rect x="212" y="196" width="120" height="22" rx="11" fill="#F1ECE0" stroke="#D8D0BD"/>
  <text x="272" y="211" font-size="11.5" fill="#44525C" text-anchor="middle" font-weight="600">cobertura ~5-15%</text>
  <rect x="344" y="196" width="124" height="22" rx="11" fill="#F1ECE0" stroke="#D8D0BD"/>
  <text x="406" y="211" font-size="11.5" fill="#44525C" text-anchor="middle" font-weight="600">máxima nuance</text>
  <text x="830" y="211" font-size="12" fill="#7C7768" text-anchor="end" font-style="italic">casos clínicos, jurídicos, análise financeira</text>
  <!-- Calibration note inside layer 3 -->
  <rect x="110" y="224" width="410" height="18" rx="9" fill="#FBF6EA" stroke="#E2D4AC"/>
  <text x="315" y="237" font-size="11.5" fill="#9A7A2E" text-anchor="middle">calibra o LLM-judge periodicamente — correlação mínima acordada</text>

  <!-- Calibration arrow (bidirectional) between layer 2 and 3 -->
  <path d="M466,248 V264" fill="none" stroke="#C2912C" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrGold)"/>
  <path d="M466,262 V248" fill="none" stroke="#C2912C" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrGold)"/>
  <rect x="392" y="248" width="148" height="18" rx="9" fill="#FBF6EA" stroke="#E2D4AC"/>
  <text x="466" y="261" font-size="11" fill="#9A7A2E" text-anchor="middle" font-weight="600">calibração bidirecional</text>

  <!-- Caption -->
  <text x="44" y="458" font-size="12.5" fill="#7C7768" font-style="italic">A escolha certa não é a mais sofisticada — é a mais adequada ao critério. Determinístico onde houver resposta certa; humano onde não houver substituto.</text>
</svg>
