<svg viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh7" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule7" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
    <marker id="arrInk7" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#44525C"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="878" height="438" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <text x="44" y="46" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 22.1 · INVARIANTE 6 — AUTONOMIA PROPORCIONAL</text>
  <text x="44" y="75" font-size="23" font-weight="700" fill="#1B2A33">O loop de tool use</text>
  <rect x="44" y="87" width="86" height="3.5" rx="1.75" fill="url(#goldRule7)"/>

  <!-- Model node (left) -->
  <g filter="url(#sh7)"><rect x="74" y="150" width="200" height="150" rx="14" fill="#1B2A33"/></g>
  <text x="174" y="212" font-size="17" font-weight="700" fill="#FFFFFF" text-anchor="middle">Modelo</text>
  <text x="174" y="234" font-size="12" fill="#C2912C" text-anchor="middle">raciocina e decide</text>
  <text x="174" y="250" font-size="12" fill="#C2912C" text-anchor="middle">QUANDO chamar</text>

  <!-- Executor node (right) -->
  <g filter="url(#sh7)"><rect x="606" y="150" width="200" height="150" rx="14" fill="#FFFFFF" stroke="#CFC8B6"/></g>
  <text x="706" y="206" font-size="17" font-weight="700" fill="#1B2A33" text-anchor="middle">Você / Executor</text>
  <text x="706" y="228" font-size="12" fill="#7C7768" text-anchor="middle">executa a chamada</text>
  <text x="706" y="244" font-size="12" fill="#7C7768" text-anchor="middle">no mundo real</text>

  <!-- top arrow: model -> executor (requisição) -->
  <path d="M274,190 H604" fill="none" stroke="#44525C" stroke-width="2.4" marker-end="url(#arrInk7)"/>
  <text x="440" y="178" font-size="12.5" fill="#1B2A33" text-anchor="middle" font-weight="600">1 · requisição estruturada (qual tool, quais parâmetros)</text>

  <!-- bottom arrow: executor -> model (resultado) -->
  <path d="M606,262 H276" fill="none" stroke="#44525C" stroke-width="2.4" marker-end="url(#arrInk7)"/>
  <text x="440" y="286" font-size="12.5" fill="#1B2A33" text-anchor="middle" font-weight="600">2 · resultado retorna ao contexto · o modelo continua</text>

  <!-- governance boundary -->
  <line x1="440" y1="120" x2="440" y2="330" stroke="#B5532F" stroke-width="1.6" stroke-dasharray="5 5"/>
  <g filter="url(#sh7)"><rect x="356" y="332" width="168" height="40" rx="20" fill="#F0DDD2" stroke="#E7CDBE"/></g>
  <text x="440" y="357" font-size="12.5" font-weight="700" fill="#B5532F" text-anchor="middle">fronteira de execução</text>
  <text x="440" y="116" font-size="11.5" fill="#B5532F" text-anchor="middle" font-weight="600">PONTO DE GOVERNANÇA</text>

  <text x="44" y="406" font-size="12.5" fill="#7C7768" font-style="italic">O modelo PEDE a ação; quem executa é você. É na fronteira de execução que escopo, auditoria e reversibilidade entram — proporcionais ao risco da tool.</text>
</svg>
