<svg viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh39a" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule39a" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="878" height="458" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <text x="44" y="48" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 39.1 · INVARIANTE 9 — OPERADOR</text>
  <text x="44" y="78" font-size="23" font-weight="700" fill="#1B2A33">IA in-product vs. IA assistiva interna em SaaS</text>
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule39a)"/>

  <!-- LEFT PANEL: IA in-product -->
  <g filter="url(#sh39a)">
    <rect x="44" y="112" width="380" height="296" rx="13" fill="#FFFFFF" stroke="#BBD7DB"/>
  </g>
  <path d="M44,125 a13,13 0 0 1 13,-13 h354 a13,13 0 0 1 13,13 v24 h-380 z" fill="#2E7D8A"/>
  <text x="234" y="143" font-size="14.5" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">IA IN-PRODUCT</text>
  <text x="234" y="158" font-size="11" fill="#DCF0F2" text-anchor="middle" font-style="italic">copiloto embarcado</text>

  <g font-size="12.5">
    <rect x="62" y="176" width="346" height="28" rx="6" fill="#EFF6F7" stroke="#CFE3E6"/>
    <text x="82" y="194" font-weight="600" fill="#1B2A33">Quem recebe</text>
    <text x="262" y="194" fill="#1B2A33">usuário final do produto</text>

    <rect x="62" y="212" width="346" height="28" rx="6" fill="#EFF6F7" stroke="#CFE3E6"/>
    <text x="82" y="230" font-weight="600" fill="#1B2A33">Erro imediato</text>
    <text x="262" y="230" fill="#B5532F" font-weight="600">churn · erosão de confiança</text>

    <rect x="62" y="248" width="346" height="28" rx="6" fill="#EFF6F7" stroke="#CFE3E6"/>
    <text x="82" y="266" font-weight="600" fill="#1B2A33">Isolamento</text>
    <text x="262" y="266" fill="#1B2A33">tenant isolation inegociável</text>

    <rect x="62" y="284" width="346" height="28" rx="6" fill="#EFF6F7" stroke="#CFE3E6"/>
    <text x="82" y="302" font-weight="600" fill="#1B2A33">Latência</text>
    <text x="262" y="302" fill="#1B2A33">segundos · perceptível</text>

    <rect x="62" y="320" width="346" height="28" rx="6" fill="#EFF6F7" stroke="#CFE3E6"/>
    <text x="82" y="338" font-weight="600" fill="#1B2A33">Eval mínimo</text>
    <text x="262" y="338" fill="#1B2A33">golden set + loop + adversarial</text>

    <rect x="62" y="356" width="346" height="28" rx="6" fill="#EFF6F7" stroke="#CFE3E6"/>
    <text x="82" y="374" font-weight="600" fill="#1B2A33">Critério define</text>
    <text x="262" y="374" fill="#1B2A33">time de produto + CS</text>
  </g>

  <!-- RIGHT PANEL: IA assistiva -->
  <g filter="url(#sh39a)">
    <rect x="456" y="112" width="380" height="296" rx="13" fill="#FFFFFF" stroke="#E2D4AC"/>
  </g>
  <path d="M456,125 a13,13 0 0 1 13,-13 h354 a13,13 0 0 1 13,13 v24 h-380 z" fill="#C2912C"/>
  <text x="646" y="143" font-size="14.5" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">IA ASSISTIVA INTERNA</text>
  <text x="646" y="158" font-size="11" fill="#F9EBC8" text-anchor="middle" font-style="italic">pesquisa · pré-vendas</text>

  <g font-size="12.5">
    <rect x="474" y="176" width="346" height="28" rx="6" fill="#FBF6EA" stroke="#EADfBF"/>
    <text x="494" y="194" font-weight="600" fill="#1B2A33">Quem recebe</text>
    <text x="674" y="194" fill="#1B2A33">profissional interno (revisor)</text>

    <rect x="474" y="212" width="346" height="28" rx="6" fill="#FBF6EA" stroke="#EADfBF"/>
    <text x="494" y="230" font-weight="600" fill="#1B2A33">Erro imediato</text>
    <text x="674" y="230" fill="#7C7768">controlável · revisor intercepta</text>

    <rect x="474" y="248" width="346" height="28" rx="6" fill="#FBF6EA" stroke="#EADfBF"/>
    <text x="494" y="266" font-weight="600" fill="#1B2A33">Isolamento</text>
    <text x="674" y="266" fill="#1B2A33">MCP privado para dados sensíveis</text>

    <rect x="474" y="284" width="346" height="28" rx="6" fill="#FBF6EA" stroke="#EADfBF"/>
    <text x="494" y="302" font-weight="600" fill="#1B2A33">Latência</text>
    <text x="674" y="302" fill="#1B2A33">minutos a horas · Research</text>

    <rect x="474" y="320" width="346" height="28" rx="6" fill="#FBF6EA" stroke="#EADfBF"/>
    <text x="494" y="338" font-weight="600" fill="#1B2A33">Eval mínimo</text>
    <text x="674" y="338" fill="#1B2A33">golden set + honestidade de fonte</text>

    <rect x="474" y="356" width="346" height="28" rx="6" fill="#FBF6EA" stroke="#EADfBF"/>
    <text x="494" y="374" font-weight="600" fill="#1B2A33">Critério define</text>
    <text x="674" y="374" fill="#1B2A33">domain experts (quem perde deals)</text>
  </g>

  <text x="44" y="448" font-size="12.5" fill="#7C7768" font-style="italic">O denominador comum: critério definido por quem conhece o problema, loop fechando no uso real, revisão humana estrutural onde a consequência do erro é assimétrica.</text>
</svg>
