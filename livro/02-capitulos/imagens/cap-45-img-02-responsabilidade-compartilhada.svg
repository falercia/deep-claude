<svg viewBox="0 0 880 520" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="goldRule442" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C2912C"/>
      <stop offset="100%" stop-color="#E2C879"/>
    </linearGradient>
    <filter id="shadow442" x="-5%" y="-5%" width="115%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="tealGrad442" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2E7D8A"/>
      <stop offset="100%" stop-color="#3D9BAA"/>
    </linearGradient>
    <linearGradient id="terracotaGrad442" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C4623A"/>
      <stop offset="100%" stop-color="#B5532F"/>
    </linearGradient>
  </defs>

  <!-- Frame -->
  <rect x="1" y="1" width="878" height="518" rx="16" fill="#FBF8F1" stroke="#E6DFC9" stroke-width="1.5"/>

  <!-- Kicker -->
  <text x="44" y="44" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 44.2 · INVARIANTE 8 — RESPONSABILIDADE INDELEGÁVEL</text>

  <!-- Title -->
  <text x="44" y="72" font-size="23" font-weight="700" fill="#1B2A33">Modelo de responsabilidade compartilhada: Claude</text>

  <!-- Gold rule -->
  <rect x="44" y="85" width="86" height="3.5" rx="1.75" fill="url(#goldRule442)"/>

  <!-- COLUMN HEADERS -->
  <!-- Anthropic header left -->
  <rect x="44" y="100" width="340" height="36" rx="8" fill="url(#tealGrad442)" filter="url(#shadow442)"/>
  <text x="214" y="123" font-size="13.5" font-weight="700" fill="#FBF8F1" text-anchor="middle" letter-spacing="2">ANTHROPIC</text>

  <!-- Center label -->
  <text x="440" y="121" font-size="11" font-weight="600" fill="#7C7768" text-anchor="middle" letter-spacing="1">RESPONSABILIDADE</text>

  <!-- Cliente header right -->
  <rect x="496" y="100" width="340" height="36" rx="8" fill="url(#terracotaGrad442)" filter="url(#shadow442)"/>
  <text x="666" y="123" font-size="13.5" font-weight="700" fill="#FBF8F1" text-anchor="middle" letter-spacing="2">CLIENTE</text>

  <!-- LAYER BARS — 7 layers, each ~40px tall, starting at y=148, gap 4px -->
  <!-- Layer 7 (top reading order) = Controle de acesso e auditoria — CLIENTE -->
  <!-- Layer 1 (bottom reading) = Infraestrutura física -->
  <!-- Reading top to bottom: layer 7→1 -->

  <!-- We show layers bottom-up in visual, top-down in reading order -->
  <!-- Top reading = most abstract = CLIENT responsibility -->
  <!-- Layer row 1 (topmost): Controle de acesso e auditoria — CLIENTE -->
  <rect x="496" y="148" width="340" height="40" rx="6" fill="#F0DDD2" stroke="#E7CDBE" stroke-width="1.2"/>
  <text x="666" y="163" font-size="12" font-weight="700" fill="#B5532F" text-anchor="middle">7. Controle de acesso e auditoria</text>
  <text x="666" y="180" font-size="11" fill="#44525C" text-anchor="middle">logs, RACI, revisão periódica</text>
  <!-- Left side faded -->
  <rect x="44" y="148" width="340" height="40" rx="6" fill="#F1ECE0" stroke="#D8D0BD" stroke-width="1"/>
  <text x="214" y="173" font-size="11" fill="#CFC8B6" text-anchor="middle">—</text>

  <!-- Layer row 2: Classificação e seleção de dados — CLIENTE -->
  <rect x="496" y="196" width="340" height="40" rx="6" fill="#F0DDD2" stroke="#E7CDBE" stroke-width="1.2"/>
  <text x="666" y="211" font-size="12" font-weight="700" fill="#B5532F" text-anchor="middle">6. Classificação e seleção de dados</text>
  <text x="666" y="228" font-size="11" fill="#44525C" text-anchor="middle">o que entra no prompt, base legal LGPD</text>
  <rect x="44" y="196" width="340" height="40" rx="6" fill="#F1ECE0" stroke="#D8D0BD" stroke-width="1"/>
  <text x="214" y="221" font-size="11" fill="#CFC8B6" text-anchor="middle">—</text>

  <!-- Layer row 3: Integração e arquitetura — CLIENTE -->
  <rect x="496" y="244" width="340" height="40" rx="6" fill="#F0DDD2" stroke="#E7CDBE" stroke-width="1.2"/>
  <text x="666" y="259" font-size="12" font-weight="700" fill="#B5532F" text-anchor="middle">5. Integração e arquitetura</text>
  <text x="666" y="276" font-size="11" fill="#44525C" text-anchor="middle">APIs, prompts, VPC, configurações</text>
  <rect x="44" y="244" width="340" height="40" rx="6" fill="#F1ECE0" stroke="#D8D0BD" stroke-width="1"/>
  <text x="214" y="269" font-size="11" fill="#CFC8B6" text-anchor="middle">—</text>

  <!-- DIVIDER LINE between layer 5 and 4 -->
  <line x1="44" y1="291" x2="836" y2="291" stroke="#B5532F" stroke-width="1.8" stroke-dasharray="7,4"/>
  <text x="440" y="305" font-size="11" font-weight="600" fill="#B5532F" text-anchor="middle" letter-spacing="0.5">linha de divisão de responsabilidade</text>

  <!-- Layer row 4: Contrato e DPA — SHARED -->
  <!-- Spans both halves -->
  <rect x="44" y="312" width="792" height="40" rx="6" fill="#FBF6EA" stroke="#EADfBF" stroke-width="1.2"/>
  <text x="440" y="327" font-size="12" font-weight="700" fill="#C2912C" text-anchor="middle">4. Contrato e DPA</text>
  <text x="440" y="344" font-size="11" fill="#44525C" text-anchor="middle">DPA · ZDR · opt-out de treinamento · SLA — negociado entre as partes</text>
  <!-- Shared label stripes -->
  <rect x="44" y="312" width="4" height="40" rx="2" fill="#2E7D8A"/>
  <rect x="832" y="312" width="4" height="40" rx="2" fill="#B5532F"/>

  <!-- Layer row 5: Segurança do modelo — ANTHROPIC -->
  <rect x="44" y="360" width="340" height="40" rx="6" fill="#EFF6F7" stroke="#CFE3E6" stroke-width="1.2"/>
  <text x="214" y="375" font-size="12" font-weight="700" fill="#2E7D8A" text-anchor="middle">3. Segurança e integridade do modelo</text>
  <text x="214" y="392" font-size="11" fill="#44525C" text-anchor="middle">RLHF, red team, Constitutional AI</text>
  <rect x="496" y="360" width="340" height="40" rx="6" fill="#F1ECE0" stroke="#D8D0BD" stroke-width="1"/>
  <text x="666" y="385" font-size="11" fill="#CFC8B6" text-anchor="middle">—</text>

  <!-- Layer row 6: Segurança lógica da plataforma — ANTHROPIC -->
  <rect x="44" y="408" width="340" height="40" rx="6" fill="#EFF6F7" stroke="#CFE3E6" stroke-width="1.2"/>
  <text x="214" y="423" font-size="12" font-weight="700" fill="#2E7D8A" text-anchor="middle">2. Segurança lógica da plataforma</text>
  <text x="214" y="440" font-size="11" fill="#44525C" text-anchor="middle">criptografia, acesso interno, SOC 2</text>
  <rect x="496" y="408" width="340" height="40" rx="6" fill="#F1ECE0" stroke="#D8D0BD" stroke-width="1"/>
  <text x="666" y="429" font-size="11" fill="#CFC8B6" text-anchor="middle">—</text>

  <!-- Layer row 7: Infraestrutura física e de rede — ANTHROPIC -->
  <rect x="44" y="456" width="340" height="40" rx="6" fill="#EFF6F7" stroke="#CFE3E6" stroke-width="1.2"/>
  <text x="214" y="471" font-size="12" font-weight="700" fill="#2E7D8A" text-anchor="middle">1. Infraestrutura física e de rede</text>
  <text x="214" y="488" font-size="11" fill="#44525C" text-anchor="middle">data centers, TLS, AES-256, ISO 27001</text>
  <rect x="496" y="456" width="340" height="40" rx="6" fill="#F1ECE0" stroke="#D8D0BD" stroke-width="1"/>
  <text x="666" y="477" font-size="11" fill="#CFC8B6" text-anchor="middle">—</text>

  <!-- Caption -->
  <text x="44" y="514" font-size="12" fill="#7C7768" font-style="italic">
    Auditor que perguntar 'como vocês garantem compliance de IA?' — resposta 'usamos Enterprise com SOC 2' cobre o lado do fornecedor, não da organização.
  </text>
</svg>
