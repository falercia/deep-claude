<svg viewBox="0 0 1000 540" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="1000" height="540" fill="#fefce8"/>
  <text x="500" y="40" fill="#0d1b2a" font-size="22" font-weight="700" text-anchor="middle">A SEMANA DO EXECUTIVO COM CLAUDE</text>
  <text x="500" y="64" fill="#6b7280" font-size="13" text-anchor="middle">Como integrar Claude na agenda em pontos estratégicos sem virar dependência ingênua</text>

  <!-- Days -->
  <g>
    <rect x="60" y="100" width="180" height="60" rx="8" fill="#0d1b2a"/>
    <text x="150" y="124" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">SEGUNDA</text>
    <text x="150" y="144" fill="#9ca3af" font-size="10" text-anchor="middle">início da semana</text>
  </g>

  <g>
    <rect x="60" y="170" width="940" height="80" rx="8" fill="#bbf7d0"/>
    <text x="80" y="194" fill="#0d1b2a" font-size="11" font-weight="700">6h45 · Briefing matinal scheduled task</text>
    <text x="80" y="212" fill="#374151" font-size="10">agenda do dia, emails críticos, notícias setoriais</text>
    <text x="80" y="230" fill="#374151" font-size="10">─ resumo de 5 minutos antes do café da manhã</text>

    <text x="380" y="194" fill="#0d1b2a" font-size="11" font-weight="700">9h00 · Planejamento da semana</text>
    <text x="380" y="212" fill="#374151" font-size="10">conversa estruturada em Project executivo,</text>
    <text x="380" y="230" fill="#374151" font-size="10">priorização das decisões críticas</text>

    <text x="680" y="194" fill="#0d1b2a" font-size="11" font-weight="700">14h-18h · Reuniões com briefing automático</text>
    <text x="680" y="212" fill="#374151" font-size="10">2h antes de cada reunião importante,</text>
    <text x="680" y="230" fill="#374151" font-size="10">briefing personalizado chega no mobile</text>
  </g>

  <g>
    <rect x="60" y="260" width="180" height="60" rx="8" fill="#0d1b2a"/>
    <text x="150" y="284" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">TERÇA-QUINTA</text>
    <text x="150" y="304" fill="#9ca3af" font-size="10" text-anchor="middle">execução intensa</text>
  </g>

  <g>
    <rect x="60" y="330" width="940" height="80" rx="8" fill="#bfdbfe"/>
    <text x="80" y="354" fill="#0d1b2a" font-size="11" font-weight="700">Manhã · Trânsito = brainstorm com voz</text>
    <text x="80" y="372" fill="#374151" font-size="10">preparação para reuniões,</text>
    <text x="80" y="390" fill="#374151" font-size="10">processamento de decisões em aberto</text>

    <text x="380" y="354" fill="#0d1b2a" font-size="11" font-weight="700">Dia · Research para decisões complexas</text>
    <text x="380" y="372" fill="#374151" font-size="10">análise estruturada de alternativas,</text>
    <text x="380" y="390" fill="#374151" font-size="10">com fontes auditáveis para defender no board</text>

    <text x="680" y="354" fill="#0d1b2a" font-size="11" font-weight="700">Noite · Reflexão pós-evento</text>
    <text x="680" y="372" fill="#374151" font-size="10">no carro voltando, lições do dia,</text>
    <text x="680" y="390" fill="#374151" font-size="10">notas para retomar amanhã</text>
  </g>

  <g>
    <rect x="60" y="420" width="180" height="60" rx="8" fill="#0d1b2a"/>
    <text x="150" y="444" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">SEXTA</text>
    <text x="150" y="464" fill="#9ca3af" font-size="10" text-anchor="middle">fechamento e visão</text>
  </g>

  <g>
    <rect x="280" y="420" width="720" height="60" rx="8" fill="#fde68a"/>
    <text x="300" y="444" fill="#0d1b2a" font-size="11" font-weight="700">17h · Relatório semanal automatizado + 1h de reflexão estratégica</text>
    <text x="300" y="462" fill="#374151" font-size="10">métricas consolidadas, decisões pendentes para semana seguinte,</text>
    <text x="300" y="478" fill="#374151" font-size="10">conversa profunda com Claude sobre direção estratégica de médio prazo</text>
  </g>

  <text x="500" y="520" fill="#E97451" font-size="11" text-anchor="middle" font-weight="600">Claude é amplificador de capacidade executiva, não substituto. Quem confunde fica refém. Quem entende, ganha vantagem.</text>
</svg>
