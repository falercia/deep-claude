<svg viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh24a" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule24a" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
    <linearGradient id="attnCurve" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C2912C" stop-opacity="0.8"/>
      <stop offset="0.4" stop-color="#CFC8B6" stop-opacity="0.3"/>
      <stop offset="0.7" stop-color="#CFC8B6" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#C2912C" stop-opacity="0.8"/>
    </linearGradient>
    <marker id="arrInk24a" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#44525C"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="878" height="478" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <!-- Kicker -->
  <text x="44" y="46" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 24.1 · INVARIANTE 9 — OPERADOR</text>
  <text x="44" y="76" font-size="23" font-weight="700" fill="#1B2A33">Os cinco blocos e a curva de atenção</text>
  <rect x="44" y="88" width="86" height="3.5" rx="1.75" fill="url(#goldRule24a)"/>

  <!-- LEFT COLUMN: Five blocks stacked -->
  <!-- Block 1: Persona + Missão -->
  <g filter="url(#sh24a)"><rect x="44" y="116" width="420" height="54" rx="10" fill="#1B2A33"/></g>
  <circle cx="80" cy="143" r="14" fill="#C2912C"/>
  <text x="80" y="148" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="106" y="138" font-size="14" font-weight="700" fill="#FFFFFF">Persona + Missão</text>
  <text x="106" y="158" font-size="12" fill="#E2C879">quem é o modelo; para que serve</text>
  <text x="450" y="148" font-size="12" font-weight="700" fill="#C2912C" text-anchor="end">ALTA ATENÇÃO</text>

  <!-- Block 2: Constituição -->
  <g filter="url(#sh24a)"><rect x="44" y="178" width="420" height="54" rx="10" fill="#1B2A33"/></g>
  <circle cx="80" cy="205" r="14" fill="#C2912C"/>
  <text x="80" y="210" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="106" y="200" font-size="14" font-weight="700" fill="#FFFFFF">Constituição</text>
  <text x="106" y="220" font-size="12" fill="#E2C879">regras invioláveis · o que nunca fazer</text>
  <text x="450" y="210" font-size="12" font-weight="700" fill="#C2912C" text-anchor="end">ALTA ATENÇÃO</text>

  <!-- Block 3: Contexto -->
  <g filter="url(#sh24a)"><rect x="44" y="240" width="420" height="54" rx="10" fill="#FFFFFF" stroke="#CFC8B6"/></g>
  <circle cx="80" cy="267" r="14" fill="#7C7768"/>
  <text x="80" y="272" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="106" y="262" font-size="14" font-weight="700" fill="#44525C">Contexto da tarefa</text>
  <text x="106" y="282" font-size="12" fill="#7C7768">documentos · histórico · dados dinâmicos</text>
  <text x="450" y="272" font-size="12" font-weight="700" fill="#7C7768" text-anchor="end">BAIXA ATENÇÃO</text>

  <!-- Block 4: Instrução operacional -->
  <g filter="url(#sh24a)"><rect x="44" y="302" width="420" height="54" rx="10" fill="#1B2A33"/></g>
  <circle cx="80" cy="329" r="14" fill="#C2912C"/>
  <text x="80" y="334" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>
  <text x="106" y="324" font-size="14" font-weight="700" fill="#FFFFFF">Instrução operacional + Formato</text>
  <text x="106" y="344" font-size="12" fill="#E2C879">o que fazer com o input; como formatar</text>
  <text x="450" y="334" font-size="12" font-weight="700" fill="#C2912C" text-anchor="end">ALTA ATENÇÃO</text>

  <!-- Block 5: Pergunta viva -->
  <g filter="url(#sh24a)"><rect x="44" y="364" width="420" height="54" rx="10" fill="#C2912C"/></g>
  <circle cx="80" cy="391" r="14" fill="#FBF8F1"/>
  <text x="80" y="396" font-size="14" font-weight="700" fill="#C2912C" text-anchor="middle">5</text>
  <text x="106" y="386" font-size="14" font-weight="700" fill="#FFFFFF">Pergunta viva / Input do usuário</text>
  <text x="106" y="406" font-size="12" fill="#FBF6EA">última posição · sempre ao final · sanitizado</text>
  <text x="450" y="396" font-size="12" font-weight="700" fill="#FBF8F1" text-anchor="end">ALTA ATENÇÃO</text>

  <!-- RIGHT COLUMN: Attention curve visualization -->
  <text x="536" y="116" font-size="12" font-weight="700" fill="#9A7A2E" letter-spacing="1" text-anchor="middle">CURVA DE ATENÇÃO</text>

  <!-- Attention bar chart (horizontal bars) -->
  <!-- Block 1 -->
  <g filter="url(#sh24a)"><rect x="504" y="128" width="260" height="38" rx="8" fill="#FBF6EA" stroke="#E2D4AC"/></g>
  <rect x="512" y="134" width="224" height="26" rx="6" fill="#C2912C"/>
  <text x="728" y="152" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="end">alta</text>

  <!-- Block 2 -->
  <g filter="url(#sh24a)"><rect x="504" y="190" width="260" height="38" rx="8" fill="#FBF6EA" stroke="#E2D4AC"/></g>
  <rect x="512" y="196" width="210" height="26" rx="6" fill="#C2912C"/>
  <text x="720" y="214" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="end">alta</text>

  <!-- Block 3 (low) -->
  <g filter="url(#sh24a)"><rect x="504" y="252" width="260" height="38" rx="8" fill="#F1ECE0" stroke="#CFC8B6"/></g>
  <rect x="512" y="258" width="82" height="26" rx="6" fill="#7C7768"/>
  <text x="600" y="276" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="end">baixa</text>

  <!-- Block 4 -->
  <g filter="url(#sh24a)"><rect x="504" y="314" width="260" height="38" rx="8" fill="#FBF6EA" stroke="#E2D4AC"/></g>
  <rect x="512" y="320" width="224" height="26" rx="6" fill="#C2912C"/>
  <text x="728" y="338" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="end">alta</text>

  <!-- Block 5 -->
  <g filter="url(#sh24a)"><rect x="504" y="376" width="260" height="38" rx="8" fill="#FBF6EA" stroke="#E2D4AC"/></g>
  <rect x="512" y="382" width="236" height="26" rx="6" fill="#C2912C"/>
  <text x="740" y="400" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="end">alta</text>

  <!-- WARNING callout -->
  <g filter="url(#sh24a)"><rect x="44" y="432" width="792" height="36" rx="10" fill="#F0DDD2" stroke="#E7CDBE"/></g>
  <text x="64" y="448" font-size="12.5" font-weight="700" fill="#B5532F">Regra crítica:</text>
  <text x="175" y="448" font-size="12.5" fill="#7C7768"> regras importantes nunca ficam no Bloco 3 — enterradas no meio, são silenciosamente ignoradas.</text>
  <text x="64" y="462" font-size="11.5" fill="#7C7768">Blocos 1+2 (topo) e 4+5 (fundo) são as posições fortes. O crítico vai nelas.</text>

  <!-- Footer -->
  <text x="44" y="472" font-size="12.5" fill="#7C7768" font-style="italic">O efeito de extremidades é arquitetural — vale para toda família transformer. Estruturar é garantir que o importante esteja onde a atenção é mais densa.</text>
</svg>
