<svg viewBox="0 0 880 470" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh38a" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule38a" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
    <marker id="arrInk38a" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#44525C"/>
    </marker>
    <marker id="arrRisk38a" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#B5532F"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="878" height="468" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <text x="44" y="48" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 38.1 · INVARIANTE 1 — PLAUSIBILIDADE</text>
  <text x="44" y="78" font-size="23" font-weight="700" fill="#1B2A33">Por que "plausível" não basta em finanças</text>
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule38a)"/>

  <!-- Left: Plausível node -->
  <g filter="url(#sh38a)">
    <rect x="56" y="130" width="226" height="200" rx="13" fill="#FFFFFF" stroke="#CFC8B6"/>
  </g>
  <path d="M56,143 a13,13 0 0 1 13,-13 h200 a13,13 0 0 1 13,13 v22 h-226 z" fill="#44525C"/>
  <text x="169" y="158" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">O MODELO</text>
  <text x="169" y="173" font-size="11" fill="#CCCED0" text-anchor="middle">entrega o plausível</text>

  <g font-size="12.5" fill="#1B2A33">
    <text x="76" y="205" font-weight="600">saldo: R$ 4.823,47</text>
    <text x="76" y="222" fill="#7C7768">— (gerado como texto)</text>
    <text x="76" y="248" font-weight="600">tarifa: R$ 12,90/mês</text>
    <text x="76" y="265" fill="#7C7768">— (contexto injetado)</text>
    <text x="76" y="291" font-weight="600">prazo: 5 dias úteis</text>
    <text x="76" y="308" fill="#7C7768">— (aproximado)</text>
  </g>

  <!-- Center: Coincide / Diverge -->
  <text x="440" y="178" font-size="13" fill="#7C7768" text-anchor="middle">coincidem</text>
  <path d="M282,200 H390" fill="none" stroke="#44525C" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrInk38a)"/>
  <text x="336" y="195" font-size="11.5" fill="#7C7768" text-anchor="middle">✓ ok</text>

  <text x="440" y="285" font-size="13" fill="#B5532F" text-anchor="middle" font-weight="600">divergem</text>
  <path d="M282,270 C330,270 370,270 390,270" fill="none" stroke="#B5532F" stroke-width="2.2" marker-end="url(#arrRisk38a)"/>
  <text x="336" y="265" font-size="11.5" fill="#B5532F" text-anchor="middle" font-weight="600">⚠ risco</text>

  <!-- Right: Real / Autoritativo node -->
  <g filter="url(#sh38a)">
    <rect x="598" y="130" width="226" height="200" rx="13" fill="#FFFFFF" stroke="#CFC8B6"/>
  </g>
  <path d="M598,143 a13,13 0 0 1 13,-13 h200 a13,13 0 0 1 13,13 v22 h-226 z" fill="#1B2A33"/>
  <text x="711" y="158" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">SISTEMA AUTORITATIVO</text>
  <text x="711" y="173" font-size="11" fill="#C2912C" text-anchor="middle">entrega o verdadeiro</text>

  <g font-size="12.5" fill="#1B2A33">
    <text x="618" y="205" font-weight="600">saldo: R$ 4.863,12</text>
    <text x="618" y="222" fill="#2E7D8A">— (core bancário · real-time)</text>
    <text x="618" y="248" font-weight="600">tarifa: R$ 14,90/mês</text>
    <text x="618" y="265" fill="#2E7D8A">— (contrato vigente)</text>
    <text x="618" y="291" font-weight="600">prazo: 3 dias úteis</text>
    <text x="618" y="308" fill="#2E7D8A">— (regulação BACEN)</text>
  </g>

  <!-- Tool call arrow (bottom) -->
  <path d="M398,240 H580" fill="none" stroke="#B5532F" stroke-width="2.2" marker-end="url(#arrRisk38a)"/>
  <text x="489" y="232" font-size="11.5" fill="#B5532F" text-anchor="middle" font-weight="700">divergência detectável</text>
  <text x="489" y="250" font-size="11" fill="#B5532F" text-anchor="middle">passivo de compliance</text>

  <!-- Solution box (bottom) -->
  <g filter="url(#sh38a)">
    <rect x="220" y="380" width="440" height="54" rx="12" fill="#1B2A33"/>
  </g>
  <text x="440" y="403" font-size="14.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">REGRA OPERACIONAL</text>
  <text x="440" y="423" font-size="12.5" fill="#C2912C" text-anchor="middle">O modelo nunca gera valores financeiros — ele os busca via tool call</text>

  <!-- Four pillars -->
  <g font-size="11.5" fill="#44525C">
    <g filter="url(#sh38a)">
      <rect x="56" y="352" width="138" height="24" rx="6" fill="#F1ECE0" stroke="#D8D0BD"/>
    </g>
    <text x="125" y="368" text-anchor="middle" font-weight="600">Exatidão em valores</text>

    <g filter="url(#sh38a)">
      <rect x="204" y="352" width="138" height="24" rx="6" fill="#F1ECE0" stroke="#D8D0BD"/>
    </g>
    <text x="273" y="368" text-anchor="middle" font-weight="600">Conformidade regulatória</text>

    <g filter="url(#sh38a)">
      <rect x="538" y="352" width="138" height="24" rx="6" fill="#F1ECE0" stroke="#D8D0BD"/>
    </g>
    <text x="607" y="368" text-anchor="middle" font-weight="600">Antifraude · PLD</text>

    <g filter="url(#sh38a)">
      <rect x="686" y="352" width="138" height="24" rx="6" fill="#F1ECE0" stroke="#D8D0BD"/>
    </g>
    <text x="755" y="368" text-anchor="middle" font-weight="600">Rastreabilidade integral</text>
  </g>

  <text x="44" y="458" font-size="12.5" fill="#7C7768" font-style="italic">Em finanças, a tolerância à resposta "plausível mas errada" é zero: saldos, tarifas e prazos não admitem aproximações que soam bem.</text>
</svg>
