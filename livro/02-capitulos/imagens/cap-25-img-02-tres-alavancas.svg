<svg viewBox="0 0 880 450" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh24b" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule24b" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
    <marker id="arrInk24b" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#44525C"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="878" height="448" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <!-- Kicker -->
  <text x="44" y="46" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 24.2 · INVARIANTE 9 — OPERADOR</text>
  <text x="44" y="76" font-size="23" font-weight="700" fill="#1B2A33">As três alavancas da qualidade de saída</text>
  <rect x="44" y="88" width="86" height="3.5" rx="1.75" fill="url(#goldRule24b)"/>

  <!-- Central QUALIDADE node -->
  <g filter="url(#sh24b)"><rect x="350" y="166" width="180" height="80" rx="16" fill="#1B2A33"/></g>
  <text x="440" y="205" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">QUALIDADE</text>
  <text x="440" y="228" font-size="13" fill="#C2912C" text-anchor="middle">de saída</text>

  <!-- Arrows from levers to center -->
  <path d="M230,230 H348" fill="none" stroke="#44525C" stroke-width="2.4" marker-end="url(#arrInk24b)"/>
  <path d="M440,280 V248" fill="none" stroke="#44525C" stroke-width="2.4" marker-end="url(#arrInk24b)"/>
  <path d="M650,230 H532" fill="none" stroke="#44525C" stroke-width="2.4" marker-end="url(#arrInk24b)"/>

  <!-- PROMPT lever (left) -->
  <g filter="url(#sh24b)"><rect x="44" y="160" width="186" height="140" rx="14" fill="#FFFFFF" stroke="#CFC8B6"/></g>
  <rect x="44" y="160" width="186" height="38" rx="14" fill="#44525C"/>
  <rect x="44" y="182" width="186" height="16" fill="#44525C"/>
  <text x="137" y="184" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">PROMPT</text>
  <text x="137" y="198" font-size="11.5" fill="#E2C879" text-anchor="middle">instrução</text>
  <text x="64" y="224" font-size="12.5" fill="#1B2A33" font-weight="600">Quando ajustar:</text>
  <text x="64" y="244" font-size="12" fill="#7C7768">critério pouco claro</text>
  <text x="64" y="262" font-size="12" fill="#7C7768">saída varia muito</text>
  <text x="64" y="280" font-size="12" fill="#7C7768">formato inconsistente</text>

  <!-- CONTEXTO lever (bottom) -->
  <g filter="url(#sh24b)"><rect x="330" y="298" width="220" height="130" rx="14" fill="#FFFFFF" stroke="#CFC8B6"/></g>
  <rect x="330" y="298" width="220" height="38" rx="14" fill="#2E7D8A"/>
  <rect x="330" y="320" width="220" height="16" fill="#2E7D8A"/>
  <text x="440" y="322" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">CONTEXTO</text>
  <text x="440" y="338" font-size="11.5" fill="#E2F0F2" text-anchor="middle">informação disponível</text>
  <text x="350" y="364" font-size="12.5" fill="#1B2A33" font-weight="600">Quando ajustar:</text>
  <text x="350" y="384" font-size="12" fill="#7C7768">ignora dado relevante</text>
  <text x="350" y="402" font-size="12" fill="#7C7768">inventa fato não fornecido</text>

  <!-- MODELO lever (right) -->
  <g filter="url(#sh24b)"><rect x="650" y="160" width="186" height="140" rx="14" fill="#FFFFFF" stroke="#CFC8B6"/></g>
  <rect x="650" y="160" width="186" height="38" rx="14" fill="#C2912C"/>
  <rect x="650" y="182" width="186" height="16" fill="#C2912C"/>
  <text x="743" y="184" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">MODELO</text>
  <text x="743" y="198" font-size="11.5" fill="#FBF6EA" text-anchor="middle">capacidade base</text>
  <text x="670" y="224" font-size="12.5" fill="#1B2A33" font-weight="600">Quando ajustar:</text>
  <text x="670" y="244" font-size="12" fill="#7C7768">casos simples ok,</text>
  <text x="670" y="264" font-size="12" fill="#7C7768">complexos erram</text>
  <text x="670" y="284" font-size="12" fill="#7C7768">latência inadequada</text>

  <!-- Misdiagnosis WARNING -->
  <g filter="url(#sh24b)"><rect x="44" y="342" width="278" height="80" rx="12" fill="#F0DDD2" stroke="#E7CDBE"/></g>
  <text x="64" y="362" font-size="13" font-weight="700" fill="#B5532F">Erro mais comum</text>
  <text x="64" y="382" font-size="12" fill="#7C7768">atribuir ao prompt o que</text>
  <text x="64" y="400" font-size="12" fill="#7C7768">é problema de contexto,</text>
  <text x="64" y="416" font-size="12" fill="#7C7768">ou ao contexto o que é modelo.</text>

  <!-- Diagnosis tip chip -->
  <g filter="url(#sh24b)"><rect x="590" y="342" width="246" height="80" rx="12" fill="#EFF6F7" stroke="#BBD7DB"/></g>
  <text x="610" y="362" font-size="13" font-weight="700" fill="#2E7D8A">Diagnóstico primeiro</text>
  <text x="610" y="382" font-size="12" fill="#7C7768">isole a variável antes de</text>
  <text x="610" y="400" font-size="12" fill="#7C7768">iterar. Mudar tudo de uma</text>
  <text x="610" y="416" font-size="12" fill="#7C7768">vez é adivinhação.</text>

  <!-- Footer -->
  <text x="44" y="439" font-size="12.5" fill="#7C7768" font-style="italic">Saber distinguir qual alavanca acionar direciona esforço para onde produz retorno. Mais palavras no prompt não resolve problema de contexto ou de capacidade de modelo.</text>
</svg>
