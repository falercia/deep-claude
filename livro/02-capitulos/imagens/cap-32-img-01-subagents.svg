<svg viewBox="0 0 880 490" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh31a" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule31a" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
    <marker id="arrInk31a" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#44525C"/>
    </marker>
    <marker id="arrGold31a" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#C2912C"/>
    </marker>
    <marker id="arrTeal31a" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2E7D8A"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="878" height="488" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <!-- Kicker + Title -->
  <text x="44" y="48" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 31.1 · INVARIANTE 6 — AUTONOMIA PROPORCIONAL</text>
  <text x="44" y="78" font-size="23" font-weight="700" fill="#1B2A33">Subagents em ação: decomposição, especialização, consolidação</text>
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule31a)"/>

  <!-- Objective input arrow -->
  <text x="44" y="162" font-size="12" fill="#7C7768" font-weight="600" font-style="italic">OBJETIVO</text>
  <path d="M44" y="168"/>
  <path d="M104,168 H230" fill="none" stroke="#C2912C" stroke-width="2.2" marker-end="url(#arrGold31a)"/>

  <!-- Main Agent node -->
  <g filter="url(#sh31a)">
    <rect x="236" y="130" width="192" height="100" rx="14" fill="#1B2A33"/>
  </g>
  <text x="332" y="168" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">Agente Principal</text>
  <text x="332" y="188" font-size="12" fill="#C2912C" text-anchor="middle">decompõe · coordena</text>
  <text x="332" y="206" font-size="11.5" fill="#E2C879" text-anchor="middle">consolida resultado final</text>

  <!-- Arrows from main agent down to subagents -->
  <path d="M332,230 L226,290" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk31a)"/>
  <path d="M332,230 L332,290" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk31a)"/>
  <path d="M332,230 L440,290" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk31a)"/>

  <!-- Subagent 1: Pesquisador (teal) -->
  <g filter="url(#sh31a)">
    <rect x="64" y="296" width="198" height="110" rx="13" fill="#FFFFFF" stroke="#BBD7DB"/>
  </g>
  <path d="M64,309 a13,13 0 0 1 13,-13 h172 a13,13 0 0 1 13,13 v20 h-198 z" fill="#2E7D8A"/>
  <text x="163" y="323" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">PESQUISADOR</text>
  <text x="163" y="348" font-size="12" fill="#1B2A33" text-anchor="middle">varredura · briefing</text>
  <rect x="84" y="360" width="60" height="18" rx="9" fill="#EFF6F7" stroke="#CFE3E6"/>
  <text x="114" y="373" font-size="10" fill="#2E7D8A" text-anchor="middle" font-weight="700">Opus</text>
  <rect x="152" y="360" width="90" height="18" rx="9" fill="#EFF6F7" stroke="#CFE3E6"/>
  <text x="197" y="373" font-size="10" fill="#2E7D8A" text-anchor="middle" font-weight="700">Web Search</text>
  <rect x="84" y="384" width="138" height="16" rx="8" fill="#F1ECE0"/>
  <text x="153" y="396" font-size="10" fill="#7C7768" text-anchor="middle" font-style="italic">contexto isolado</text>

  <!-- Subagent 2: Analista (dourado) -->
  <g filter="url(#sh31a)">
    <rect x="233" y="296" width="198" height="110" rx="13" fill="#FFFFFF" stroke="#E2D4AC"/>
  </g>
  <path d="M233,309 a13,13 0 0 1 13,-13 h172 a13,13 0 0 1 13,13 v20 h-198 z" fill="#C2912C"/>
  <text x="332" y="323" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">ANALISTA</text>
  <text x="332" y="348" font-size="12" fill="#1B2A33" text-anchor="middle">análise · decisão</text>
  <rect x="253" y="360" width="60" height="18" rx="9" fill="#FBF6EA" stroke="#EADfBF"/>
  <text x="283" y="373" font-size="10" fill="#9A7A2E" text-anchor="middle" font-weight="700">Opus</text>
  <rect x="321" y="360" width="90" height="18" rx="9" fill="#FBF6EA" stroke="#EADfBF"/>
  <text x="366" y="373" font-size="10" fill="#9A7A2E" text-anchor="middle" font-weight="700">Knowledge Base</text>
  <rect x="253" y="384" width="138" height="16" rx="8" fill="#F1ECE0"/>
  <text x="322" y="396" font-size="10" fill="#7C7768" text-anchor="middle" font-style="italic">contexto isolado</text>

  <!-- Subagent 3: Redator (tinta) -->
  <g filter="url(#sh31a)">
    <rect x="402" y="296" width="198" height="110" rx="13" fill="#FFFFFF" stroke="#CFC8B6"/>
  </g>
  <path d="M402,309 a13,13 0 0 1 13,-13 h172 a13,13 0 0 1 13,13 v20 h-198 z" fill="#44525C"/>
  <text x="501" y="323" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">REDATOR</text>
  <text x="501" y="348" font-size="12" fill="#1B2A33" text-anchor="middle">redação · formato</text>
  <rect x="422" y="360" width="64" height="18" rx="9" fill="#F1ECE0" stroke="#D8D0BD"/>
  <text x="454" y="373" font-size="10" fill="#44525C" text-anchor="middle" font-weight="700">Sonnet</text>
  <rect x="494" y="360" width="84" height="18" rx="9" fill="#F1ECE0" stroke="#D8D0BD"/>
  <text x="536" y="373" font-size="10" fill="#44525C" text-anchor="middle" font-weight="700">Skill de escrita</text>
  <rect x="422" y="384" width="138" height="16" rx="8" fill="#F1ECE0"/>
  <text x="491" y="396" font-size="10" fill="#7C7768" text-anchor="middle" font-style="italic">contexto isolado</text>

  <!-- Arrows from subagents up to result node -->
  <path d="M163,406 L630,435" fill="none" stroke="#C2912C" stroke-width="2.2" marker-end="url(#arrGold31a)"/>
  <path d="M332,406 L650,443" fill="none" stroke="#C2912C" stroke-width="2.2" marker-end="url(#arrGold31a)"/>
  <path d="M501,406 L670,449" fill="none" stroke="#C2912C" stroke-width="2.2" marker-end="url(#arrGold31a)"/>

  <!-- Result node -->
  <g filter="url(#sh31a)">
    <rect x="634" y="396" width="202" height="68" rx="26" fill="#1B2A33"/>
  </g>
  <text x="735" y="424" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">RESULTADO</text>
  <text x="735" y="442" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">CONSOLIDADO</text>
  <text x="735" y="458" font-size="11" fill="#C2912C" text-anchor="middle">entregue ao usuário</text>

  <!-- Pattern pills -->
  <text x="630" y="130" font-size="11.5" font-weight="700" fill="#7C7768" letter-spacing="1">PADRÕES DE ORQUESTRAÇÃO</text>
  <rect x="630" y="138" width="100" height="22" rx="11" fill="#FBF6EA" stroke="#EADfBF"/>
  <text x="680" y="153" font-size="11" fill="#9A7A2E" text-anchor="middle" font-weight="600">Pipeline</text>
  <rect x="738" y="138" width="100" height="22" rx="11" fill="#EFF6F7" stroke="#CFE3E6"/>
  <text x="788" y="153" font-size="11" fill="#2E7D8A" text-anchor="middle" font-weight="600">Paralelo</text>
  <rect x="630" y="168" width="100" height="22" rx="11" fill="#F1ECE0" stroke="#D8D0BD"/>
  <text x="680" y="183" font-size="11" fill="#44525C" text-anchor="middle" font-weight="600">Orquestrador</text>
  <rect x="738" y="168" width="100" height="22" rx="11" fill="#F1ECE0" stroke="#D8D0BD"/>
  <text x="788" y="183" font-size="11" fill="#44525C" text-anchor="middle" font-weight="600">Debate</text>

  <!-- Caption -->
  <text x="44" y="476" font-size="12.5" fill="#7C7768" font-style="italic">Cada subagente opera com contexto isolado e conjunto próprio de tools — o agente principal só coordena e consolida, sem executar as especializações diretamente.</text>
</svg>
