<svg viewBox="0 0 880 540" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
    <marker id="arrInk" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#44525C"/>
    </marker>
    <marker id="arrGold" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#C2912C"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="878" height="538" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <!-- Kicker + Title -->
  <text x="44" y="48" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 9.1 · INVARIANTE 6 — AUTONOMIA PROPORCIONAL</text>
  <text x="44" y="78" font-size="23" font-weight="700" fill="#1B2A33">Anatomia do Claude Code</text>
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule)"/>

  <!-- Layer 1 (bottom): WORKSPACE -->
  <g filter="url(#sh)">
    <rect x="44" y="460" width="792" height="54" rx="10" fill="#FFFFFF" stroke="#CFE3E6"/>
  </g>
  <path d="M44,470 a10,10 0 0 1 10,-10 h772 a10,10 0 0 1 10,10 v14 h-792 z" fill="#2E7D8A"/>
  <text x="180" y="481" font-size="13" font-weight="700" fill="#FFFFFF">WORKSPACE</text>
  <text x="280" y="481" font-size="12" fill="#C8E6EA">diretório do projeto indexado — árvore de arquivos, package.json, README.md, Cargo.toml</text>
  <text x="60" y="502" font-size="12" fill="#7C7768">src/ · tests/ · config/ · CLAUDE.md</text>
  <text x="800" y="502" font-size="12" fill="#2E7D8A" text-anchor="end" font-weight="600">contexto vivo</text>

  <!-- Arrow up -->
  <path d="M200,460 V436" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk)"/>
  <path d="M680,460 V436" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk)"/>

  <!-- Layer 2: CLAUDE.md + LLM + TOOLS -->

  <!-- CLAUDE.md (left) -->
  <g filter="url(#sh)">
    <rect x="44" y="356" width="190" height="80" rx="10" fill="#FBF6EA" stroke="#EADfBF"/>
  </g>
  <text x="139" y="376" font-size="13" font-weight="700" fill="#9A7A2E" text-anchor="middle">CLAUDE.md</text>
  <text x="139" y="395" font-size="11.5" fill="#7C7768" text-anchor="middle">Instruções persistentes</text>
  <text x="139" y="411" font-size="11.5" fill="#7C7768" text-anchor="middle">do projeto</text>
  <text x="139" y="427" font-size="11" fill="#C2912C" text-anchor="middle" font-weight="600">padrões · restrições · contexto</text>

  <!-- Arrow from CLAUDE.md to LLM -->
  <path d="M234,396 H294" fill="none" stroke="#C2912C" stroke-width="2.2" marker-end="url(#arrGold)"/>

  <!-- LLM CENTRAL -->
  <g filter="url(#sh)">
    <rect x="302" y="340" width="276" height="120" rx="12" fill="#1B2A33"/>
  </g>
  <text x="440" y="372" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">LLM CENTRAL</text>
  <text x="440" y="392" font-size="12" fill="#C2912C" text-anchor="middle">Claude Sonnet ou Opus</text>
  <text x="440" y="414" font-size="12" fill="#FFFFFF" text-anchor="middle">raciocina · planeja · decide</text>
  <text x="440" y="432" font-size="11.5" fill="#44525C" text-anchor="middle">quando e como usar cada tool</text>
  <text x="440" y="450" font-size="11.5" fill="#44525C" text-anchor="middle">mantém estado da sessão</text>

  <!-- Arrow from MODO PLAN to LLM -->
  <path d="M644,396 H580" fill="none" stroke="#C2912C" stroke-width="2.2" marker-end="url(#arrGold)"/>

  <!-- MODO PLAN (right) -->
  <g filter="url(#sh)">
    <rect x="644" y="356" width="190" height="80" rx="10" fill="#FBF6EA" stroke="#EADfBF"/>
  </g>
  <text x="739" y="376" font-size="13" font-weight="700" fill="#9A7A2E" text-anchor="middle">MODO PLAN</text>
  <text x="739" y="395" font-size="11.5" fill="#7C7768" text-anchor="middle">Plano antes de executar</text>
  <text x="739" y="411" font-size="11.5" fill="#7C7768" text-anchor="middle">você aprova antes</text>
  <text x="739" y="427" font-size="11" fill="#C2912C" text-anchor="middle" font-weight="600">supervisão humana explícita</text>

  <!-- Arrow up from LLM to TOOLS -->
  <path d="M440,340 V318" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk)"/>

  <!-- Layer 3: TOOLS -->
  <g filter="url(#sh)">
    <rect x="44" y="230" width="792" height="88" rx="10" fill="#FFFFFF" stroke="#E6DFC9"/>
  </g>
  <path d="M44,240 a10,10 0 0 1 10,-10 h772 a10,10 0 0 1 10,10 v14 h-792 z" fill="#44525C"/>
  <text x="180" y="251" font-size="13" font-weight="700" fill="#FFFFFF">TOOLS</text>
  <text x="260" y="251" font-size="12" fill="#CFC8B6">o que o agente pode fazer no mundo real</text>

  <!-- Tool chips -->
  <rect x="56" y="266" width="62" height="22" rx="11" fill="#EFF6F7" stroke="#CFE3E6"/>
  <text x="87" y="281" font-size="11" font-weight="700" fill="#2E7D8A" text-anchor="middle">Read</text>

  <rect x="124" y="266" width="58" height="22" rx="11" fill="#EFF6F7" stroke="#CFE3E6"/>
  <text x="153" y="281" font-size="11" font-weight="700" fill="#2E7D8A" text-anchor="middle">Edit</text>

  <rect x="188" y="266" width="64" height="22" rx="11" fill="#EFF6F7" stroke="#CFE3E6"/>
  <text x="220" y="281" font-size="11" font-weight="700" fill="#2E7D8A" text-anchor="middle">Write</text>

  <rect x="258" y="266" width="58" height="22" rx="11" fill="#EFF6F7" stroke="#CFE3E6"/>
  <text x="287" y="281" font-size="11" font-weight="700" fill="#2E7D8A" text-anchor="middle">Grep</text>

  <rect x="322" y="266" width="56" height="22" rx="11" fill="#EFF6F7" stroke="#CFE3E6"/>
  <text x="350" y="281" font-size="11" font-weight="700" fill="#2E7D8A" text-anchor="middle">Glob</text>

  <rect x="384" y="266" width="56" height="22" rx="11" fill="#F0DDD2" stroke="#E7CDBE"/>
  <text x="412" y="281" font-size="11" font-weight="700" fill="#B5532F" text-anchor="middle">Bash</text>

  <rect x="446" y="266" width="86" height="22" rx="11" fill="#F0DDD2" stroke="#E7CDBE"/>
  <text x="489" y="281" font-size="11" font-weight="700" fill="#B5532F" text-anchor="middle">Subagents</text>

  <rect x="538" y="266" width="82" height="22" rx="11" fill="#EFF6F7" stroke="#CFE3E6"/>
  <text x="579" y="281" font-size="11" font-weight="700" fill="#2E7D8A" text-anchor="middle">WebFetch</text>

  <rect x="626" y="266" width="50" height="22" rx="11" fill="#F0DDD2" stroke="#E7CDBE"/>
  <text x="651" y="281" font-size="11" font-weight="700" fill="#B5532F" text-anchor="middle">MCP</text>

  <rect x="682" y="266" width="62" height="22" rx="11" fill="#EFF6F7" stroke="#CFE3E6"/>
  <text x="713" y="281" font-size="11" font-weight="700" fill="#2E7D8A" text-anchor="middle">Skills</text>

  <text x="760" y="281" font-size="11.5" fill="#7C7768">+ extensível</text>

  <!-- Arrow up to OUTPUT -->
  <path d="M440,230 V208" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk)"/>

  <!-- Layer 4 (top): OUTPUT -->
  <g filter="url(#sh)">
    <rect x="44" y="118" width="792" height="90" rx="10" fill="#FFFFFF" stroke="#EADfBF"/>
  </g>
  <path d="M44,128 a10,10 0 0 1 10,-10 h772 a10,10 0 0 1 10,10 v14 h-792 z" fill="#C2912C"/>
  <text x="180" y="139" font-size="13" font-weight="700" fill="#FFFFFF">OUTPUT</text>
  <text x="260" y="139" font-size="12" fill="#FBF6EA">o agente entrega, você revisa e direciona</text>
  <text x="60" y="164" font-size="12.5" font-weight="700" fill="#1B2A33">Branch + Commit</text>
  <text x="60" y="182" font-size="11.5" fill="#7C7768">nome convencionado · mensagem estruturada</text>
  <rect x="260" y="152" width="1" height="46" fill="#E6DFC9"/>
  <text x="280" y="164" font-size="12.5" font-weight="700" fill="#1B2A33">Pull Request</text>
  <text x="280" y="182" font-size="11.5" fill="#7C7768">título + descrição + contexto do que mudou</text>
  <rect x="500" y="152" width="1" height="46" fill="#E6DFC9"/>
  <text x="520" y="164" font-size="12.5" font-weight="700" fill="#1B2A33">Arquivos Editados</text>
  <text x="520" y="182" font-size="11.5" fill="#7C7768">testes passando · revisão humana antes do merge</text>

  <!-- Caption -->
  <text x="44" y="528" font-size="12.5" fill="#7C7768" font-style="italic">Agente CLI com acesso completo ao workspace — as camadas que convertem um objetivo em entrega real.</text>
</svg>
