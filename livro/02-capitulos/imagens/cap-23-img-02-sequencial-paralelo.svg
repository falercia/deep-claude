<svg viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh22b" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule22b" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
    <marker id="arrInk22b" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#44525C"/>
    </marker>
    <marker id="arrTeal22b" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2E7D8A"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="878" height="458" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <!-- Kicker -->
  <text x="44" y="46" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 22.2 · INVARIANTE 6 — AUTONOMIA PROPORCIONAL</text>
  <text x="44" y="76" font-size="23" font-weight="700" fill="#1B2A33">Tool use sequencial vs. paralelo</text>
  <rect x="44" y="88" width="86" height="3.5" rx="1.75" fill="url(#goldRule22b)"/>

  <!-- DIVIDER LINE -->
  <line x1="440" y1="106" x2="440" y2="404" stroke="#E6DFC9" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- LEFT SIDE LABEL: SEQUENCIAL -->
  <text x="220" y="116" font-size="12" font-weight="700" fill="#B5532F" text-anchor="middle" letter-spacing="1">SEQUENCIAL — EVITAR</text>

  <!-- RIGHT SIDE LABEL: PARALELO -->
  <text x="660" y="116" font-size="12" font-weight="700" fill="#2E7D8A" text-anchor="middle" letter-spacing="1">PARALELO — PREFERIR</text>

  <!-- SEQUENTIAL: three sequential tool calls stacked top-down -->
  <!-- Turn 1 -->
  <g filter="url(#sh22b)"><rect x="54" y="132" width="172" height="44" rx="10" fill="#FFFFFF" stroke="#E7CDBE"/></g>
  <text x="140" y="150" font-size="13" font-weight="700" fill="#1B2A33" text-anchor="middle">Turno 1</text>
  <text x="140" y="168" font-size="11.5" fill="#7C7768" text-anchor="middle">tool_use → ferramenta A</text>
  <g filter="url(#sh22b)"><rect x="240" y="132" width="172" height="44" rx="10" fill="#F0DDD2" stroke="#E7CDBE"/></g>
  <text x="326" y="150" font-size="13" font-weight="700" fill="#B5532F" text-anchor="middle">aguarda</text>
  <text x="326" y="168" font-size="11.5" fill="#7C7768" text-anchor="middle">resultado A</text>
  <path d="M226,154 H238" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk22b)"/>

  <!-- Turn 2 -->
  <g filter="url(#sh22b)"><rect x="54" y="200" width="172" height="44" rx="10" fill="#FFFFFF" stroke="#E7CDBE"/></g>
  <text x="140" y="218" font-size="13" font-weight="700" fill="#1B2A33" text-anchor="middle">Turno 2</text>
  <text x="140" y="236" font-size="11.5" fill="#7C7768" text-anchor="middle">tool_use → ferramenta B</text>
  <g filter="url(#sh22b)"><rect x="240" y="200" width="172" height="44" rx="10" fill="#F0DDD2" stroke="#E7CDBE"/></g>
  <text x="326" y="218" font-size="13" font-weight="700" fill="#B5532F" text-anchor="middle">aguarda</text>
  <text x="326" y="236" font-size="11.5" fill="#7C7768" text-anchor="middle">resultado B</text>
  <path d="M226,222 H238" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk22b)"/>

  <!-- Turn 3 -->
  <g filter="url(#sh22b)"><rect x="54" y="268" width="172" height="44" rx="10" fill="#FFFFFF" stroke="#E7CDBE"/></g>
  <text x="140" y="286" font-size="13" font-weight="700" fill="#1B2A33" text-anchor="middle">Turno 3</text>
  <text x="140" y="304" font-size="11.5" fill="#7C7768" text-anchor="middle">tool_use → ferramenta C</text>
  <g filter="url(#sh22b)"><rect x="240" y="268" width="172" height="44" rx="10" fill="#F0DDD2" stroke="#E7CDBE"/></g>
  <text x="326" y="286" font-size="13" font-weight="700" fill="#B5532F" text-anchor="middle">aguarda</text>
  <text x="326" y="304" font-size="11.5" fill="#7C7768" text-anchor="middle">resultado C</text>
  <path d="M226,290 H238" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk22b)"/>

  <!-- Arrows between sequential turns -->
  <path d="M140,176 V198" fill="none" stroke="#44525C" stroke-width="2" marker-end="url(#arrInk22b)"/>
  <path d="M140,244 V266" fill="none" stroke="#44525C" stroke-width="2" marker-end="url(#arrInk22b)"/>

  <!-- Sequential total time chip -->
  <g filter="url(#sh22b)"><rect x="54" y="336" width="358" height="40" rx="10" fill="#F0DDD2" stroke="#E7CDBE"/></g>
  <text x="233" y="354" font-size="13" font-weight="700" fill="#B5532F" text-anchor="middle">Latência total = A + B + C</text>
  <text x="233" y="370" font-size="11.5" fill="#7C7768" text-anchor="middle">três roundtrips · custo máximo</text>

  <!-- PARALLEL: single turn with three parallel calls -->
  <!-- Single turn node -->
  <g filter="url(#sh22b)"><rect x="454" y="132" width="372" height="44" rx="10" fill="#1B2A33"/></g>
  <text x="640" y="150" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">Turno único</text>
  <text x="640" y="168" font-size="11.5" fill="#C2912C" text-anchor="middle">tool_use → A + B + C no mesmo bloco</text>

  <!-- Three parallel execution boxes -->
  <path d="M560,176 V210" fill="none" stroke="#2E7D8A" stroke-width="2" marker-end="url(#arrTeal22b)"/>
  <path d="M640,176 V210" fill="none" stroke="#2E7D8A" stroke-width="2" marker-end="url(#arrTeal22b)"/>
  <path d="M720,176 V210" fill="none" stroke="#2E7D8A" stroke-width="2" marker-end="url(#arrTeal22b)"/>

  <g filter="url(#sh22b)"><rect x="454" y="214" width="110" height="80" rx="10" fill="#EFF6F7" stroke="#BBD7DB"/></g>
  <text x="509" y="244" font-size="13" font-weight="700" fill="#2E7D8A" text-anchor="middle">Ferr. A</text>
  <text x="509" y="262" font-size="11" fill="#7C7768" text-anchor="middle">executa</text>
  <text x="509" y="278" font-size="11" fill="#7C7768" text-anchor="middle">em paralelo</text>

  <g filter="url(#sh22b)"><rect x="584" y="214" width="110" height="80" rx="10" fill="#EFF6F7" stroke="#BBD7DB"/></g>
  <text x="639" y="244" font-size="13" font-weight="700" fill="#2E7D8A" text-anchor="middle">Ferr. B</text>
  <text x="639" y="262" font-size="11" fill="#7C7768" text-anchor="middle">executa</text>
  <text x="639" y="278" font-size="11" fill="#7C7768" text-anchor="middle">em paralelo</text>

  <g filter="url(#sh22b)"><rect x="714" y="214" width="112" height="80" rx="10" fill="#EFF6F7" stroke="#BBD7DB"/></g>
  <text x="770" y="244" font-size="13" font-weight="700" fill="#2E7D8A" text-anchor="middle">Ferr. C</text>
  <text x="770" y="262" font-size="11" fill="#7C7768" text-anchor="middle">executa</text>
  <text x="770" y="278" font-size="11" fill="#7C7768" text-anchor="middle">em paralelo</text>

  <!-- Merge arrows back to one result -->
  <path d="M509,294 V328" fill="none" stroke="#2E7D8A" stroke-width="2" marker-end="url(#arrTeal22b)"/>
  <path d="M639,294 V328" fill="none" stroke="#2E7D8A" stroke-width="2" marker-end="url(#arrTeal22b)"/>
  <path d="M770,294 V328" fill="none" stroke="#2E7D8A" stroke-width="2" marker-end="url(#arrTeal22b)"/>

  <!-- Single result message -->
  <g filter="url(#sh22b)"><rect x="454" y="332" width="372" height="44" rx="10" fill="#1B2A33"/></g>
  <text x="640" y="350" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">Uma mensagem com 3 tool_results</text>
  <text x="640" y="368" font-size="11.5" fill="#C2912C" text-anchor="middle">os três resultados voltam juntos</text>

  <!-- Parallel total time chip -->
  <g filter="url(#sh22b)"><rect x="454" y="396" width="372" height="40" rx="10" fill="#EFF6F7" stroke="#BBD7DB"/></g>
  <text x="640" y="413" font-size="13" font-weight="700" fill="#2E7D8A" text-anchor="middle">Latência total = max(A, B, C)</text>
  <text x="640" y="429" font-size="11.5" fill="#7C7768" text-anchor="middle">um roundtrip · ganho puro para operações independentes</text>

  <!-- Footer -->
  <text x="44" y="449" font-size="12.5" fill="#7C7768" font-style="italic">Resultados paralelos precisam voltar juntos numa única mensagem — mensagens separadas ensinam o modelo a sequencializar.</text>
</svg>
