<svg viewBox="0 0 900 540" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="m-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E97451"/>
    </marker>
  </defs>
  <rect width="900" height="540" fill="#0d1b2a"/>
  <text x="450" y="40" fill="#fef3c7" font-size="22" font-weight="700" text-anchor="middle">QUAL CLAUDE USAR? — ÁRVORE DE DECISÃO</text>
  <text x="450" y="64" fill="#9ca3af" font-size="13" text-anchor="middle">Critérios objetivos para escolher entre Opus, Sonnet e Haiku</text>

  <!-- Q1 -->
  <rect x="320" y="100" width="260" height="50" rx="8" fill="#1b263b" stroke="#fbbf24" stroke-width="2"/>
  <text x="450" y="124" fill="#fef3c7" font-size="13" font-weight="700" text-anchor="middle">A tarefa exige raciocínio profundo?</text>
  <text x="450" y="142" fill="#9ca3af" font-size="10" text-anchor="middle">análise crítica, código complexo, escrita executiva?</text>

  <path d="M 340 150 L 200 195" stroke="#86efac" stroke-width="2" marker-end="url(#m-arr)"/>
  <text x="250" y="180" fill="#86efac" font-size="11" font-weight="700">SIM</text>

  <path d="M 560 150 L 700 195" stroke="#fca5a5" stroke-width="2" marker-end="url(#m-arr)"/>
  <text x="650" y="180" fill="#fca5a5" font-size="11" font-weight="700">NÃO</text>

  <!-- Opus -->
  <rect x="80" y="200" width="240" height="60" rx="8" fill="#E97451"/>
  <text x="200" y="226" fill="#fef3c7" font-size="14" font-weight="700" text-anchor="middle">→ OPUS 4.6 / 4.7</text>
  <text x="200" y="246" fill="#fef3c7" font-size="10" text-anchor="middle">premium absoluto vale o preço</text>

  <!-- Q2 -->
  <rect x="580" y="200" width="260" height="50" rx="8" fill="#1b263b" stroke="#fbbf24" stroke-width="2"/>
  <text x="710" y="224" fill="#fef3c7" font-size="13" font-weight="700" text-anchor="middle">Volume gigantesco e tarefa simples?</text>
  <text x="710" y="242" fill="#9ca3af" font-size="10" text-anchor="middle">classificação, extração, roteamento, real-time?</text>

  <path d="M 600 250 L 460 295" stroke="#86efac" stroke-width="2" marker-end="url(#m-arr)"/>
  <text x="520" y="280" fill="#86efac" font-size="11" font-weight="700">SIM</text>

  <path d="M 800 250 L 800 295" stroke="#fca5a5" stroke-width="2" marker-end="url(#m-arr)"/>
  <text x="820" y="280" fill="#fca5a5" font-size="11" font-weight="700">NÃO</text>

  <!-- Haiku -->
  <rect x="340" y="300" width="240" height="60" rx="8" fill="#fbbf24"/>
  <text x="460" y="326" fill="#0d1b2a" font-size="14" font-weight="700" text-anchor="middle">→ HAIKU 4.5</text>
  <text x="460" y="346" fill="#0d1b2a" font-size="10" text-anchor="middle">velocidade e custo, com qualidade adequada</text>

  <!-- Sonnet -->
  <rect x="680" y="300" width="240" height="60" rx="8" fill="#86efac"/>
  <text x="800" y="326" fill="#0d1b2a" font-size="14" font-weight="700" text-anchor="middle">→ SONNET 4.5 / 4.6</text>
  <text x="800" y="346" fill="#0d1b2a" font-size="10" text-anchor="middle">o padrão para 80% dos casos</text>

  <!-- Pattern box -->
  <rect x="170" y="410" width="560" height="100" rx="10" fill="#1b263b" stroke="#E97451"/>
  <text x="450" y="440" fill="#fef3c7" font-size="13" font-weight="700" text-anchor="middle">O PADRÃO DA OPERAÇÃO MADURA</text>
  <text x="450" y="464" fill="#e5e7eb" font-size="11" text-anchor="middle">~5-10% das chamadas → Opus (tarefas críticas e complexas)</text>
  <text x="450" y="482" fill="#e5e7eb" font-size="11" text-anchor="middle">~50-70% das chamadas → Sonnet (o cavalo de batalha)</text>
  <text x="450" y="500" fill="#e5e7eb" font-size="11" text-anchor="middle">~25-45% das chamadas → Haiku (volume e velocidade)</text>
</svg>
