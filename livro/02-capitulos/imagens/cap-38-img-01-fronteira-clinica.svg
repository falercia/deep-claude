<svg viewBox="0 0 880 500" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh37a" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule37a" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="878" height="498" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <text x="44" y="48" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 37.1 · INVARIANTE 8 — RESPONSABILIDADE INDELEGÁVEL</text>
  <text x="44" y="78" font-size="23" font-weight="700" fill="#1B2A33">Mapa de uso: apoio administrativo vs. decisão clínica</text>
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule37a)"/>

  <!-- LEFT ZONE: Apoio Administrativo (verde/teal) -->
  <g filter="url(#sh37a)">
    <rect x="44" y="112" width="358" height="330" rx="13" fill="#FFFFFF" stroke="#BBD7DB"/>
  </g>
  <path d="M44,125 a13,13 0 0 1 13,-13 h332 a13,13 0 0 1 13,13 v22 h-358 z" fill="#2E7D8A"/>
  <text x="223" y="141" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">ZONA DE APOIO</text>
  <text x="223" y="156" font-size="11" fill="#DCF0F2" text-anchor="middle" font-style="italic">IA assistida · supervisão humana obrigatória</text>

  <!-- Items in left zone -->
  <g font-size="13" fill="#1B2A33">
    <g filter="url(#sh37a)">
      <rect x="64" y="174" width="318" height="44" rx="9" fill="#EFF6F7" stroke="#CFE3E6"/>
    </g>
    <text x="84" y="192" font-size="13.5" font-weight="700" fill="#2E7D8A">Caso A</text>
    <text x="148" y="192" font-size="13" fill="#1B2A33">Sumarização de prontuário</text>
    <text x="84" y="209" font-size="11.5" fill="#7C7768">histórico estruturado para preparação médica · rascunho rotulado</text>

    <g filter="url(#sh37a)">
      <rect x="64" y="228" width="318" height="44" rx="9" fill="#EFF6F7" stroke="#CFE3E6"/>
    </g>
    <text x="84" y="246" font-size="13.5" font-weight="700" fill="#2E7D8A">Caso B</text>
    <text x="148" y="246" font-size="13" fill="#1B2A33">Organização de literatura</text>
    <text x="84" y="263" font-size="11.5" fill="#7C7768">síntese de diretrizes; médico lê a fonte primária antes de decidir</text>

    <g filter="url(#sh37a)">
      <rect x="64" y="282" width="318" height="44" rx="9" fill="#EFF6F7" stroke="#CFE3E6"/>
    </g>
    <text x="84" y="300" font-size="13.5" font-weight="700" fill="#2E7D8A">Caso C</text>
    <text x="148" y="300" font-size="13" fill="#1B2A33">Formatação SOAP pós-consulta</text>
    <text x="84" y="317" font-size="11.5" fill="#7C7768">médico é o autor; IA organiza; assinatura digital obrigatória</text>

    <g filter="url(#sh37a)">
      <rect x="64" y="336" width="318" height="44" rx="9" fill="#EFF6F7" stroke="#CFE3E6"/>
    </g>
    <text x="84" y="354" font-size="13.5" font-weight="700" fill="#2E7D8A">Caso D</text>
    <text x="148" y="354" font-size="13" fill="#1B2A33">Comunicação administrativa</text>
    <text x="84" y="371" font-size="11.5" fill="#7C7768">biblioteca pré-aprovada; dúvida clínica escala automaticamente</text>
  </g>

  <!-- DIVIDER LINE (fronteira explícita) -->
  <line x1="440" y1="112" x2="440" y2="442" stroke="#B5532F" stroke-width="2.5" stroke-dasharray="6 4"/>
  <g filter="url(#sh37a)">
    <rect x="358" y="272" width="164" height="42" rx="21" fill="#F0DDD2" stroke="#E7CDBE"/>
  </g>
  <text x="440" y="288" font-size="11.5" font-weight="700" fill="#B5532F" text-anchor="middle">FRONTEIRA</text>
  <text x="440" y="305" font-size="10.5" fill="#B5532F" text-anchor="middle">Invariante 8</text>

  <!-- RIGHT ZONE: Zona Clínica (risco/terracota) -->
  <g filter="url(#sh37a)">
    <rect x="478" y="112" width="358" height="330" rx="13" fill="#FFFFFF" stroke="#E7CDBE"/>
  </g>
  <path d="M478,125 a13,13 0 0 1 13,-13 h332 a13,13 0 0 1 13,13 v22 h-358 z" fill="#B5532F"/>
  <text x="657" y="141" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">ZONA CLÍNICA</text>
  <text x="657" y="156" font-size="11" fill="#F5D4CA" text-anchor="middle" font-style="italic">humano exclusivo · IA proibida</text>

  <!-- Items in right zone -->
  <g>
    <g filter="url(#sh37a)">
      <rect x="498" y="174" width="318" height="34" rx="9" fill="#F0DDD2" stroke="#E7CDBE"/>
    </g>
    <text x="516" y="196" font-size="13" font-weight="700" fill="#B5532F">✕ Diagnóstico diferencial</text>

    <g filter="url(#sh37a)">
      <rect x="498" y="218" width="318" height="34" rx="9" fill="#F0DDD2" stroke="#E7CDBE"/>
    </g>
    <text x="516" y="240" font-size="13" font-weight="700" fill="#B5532F">✕ Prescrição de medicamento</text>

    <g filter="url(#sh37a)">
      <rect x="498" y="262" width="318" height="34" rx="9" fill="#F0DDD2" stroke="#E7CDBE"/>
    </g>
    <text x="516" y="284" font-size="13" font-weight="700" fill="#B5532F">✕ Interpretação de exame</text>

    <g filter="url(#sh37a)">
      <rect x="498" y="306" width="318" height="34" rx="9" fill="#F0DDD2" stroke="#E7CDBE"/>
    </g>
    <text x="516" y="328" font-size="13" font-weight="700" fill="#B5532F">✕ Triagem clínica de urgência</text>

    <g filter="url(#sh37a)">
      <rect x="498" y="350" width="318" height="34" rx="9" fill="#F0DDD2" stroke="#E7CDBE"/>
    </g>
    <text x="516" y="372" font-size="13" font-weight="700" fill="#B5532F">✕ Aconselhamento clínico ao paciente</text>

    <g filter="url(#sh37a)">
      <rect x="498" y="394" width="318" height="34" rx="9" fill="#F0DDD2" stroke="#E7CDBE"/>
    </g>
    <text x="516" y="416" font-size="13" font-weight="700" fill="#B5532F">✕ Alta hospitalar e alta de procedimento</text>
  </g>

  <text x="44" y="490" font-size="12.5" fill="#7C7768" font-style="italic">A fronteira não é técnica — é política formalizada, assinada pela Diretora Médica, DPO e Diretor Executivo. Cruzá-la não é ineficiência: é violação do Invariante 8.</text>
</svg>
