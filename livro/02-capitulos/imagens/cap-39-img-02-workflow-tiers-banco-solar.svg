<svg viewBox="0 0 880 500" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh38b" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule38b" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
    <marker id="arrInk38b" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#44525C"/>
    </marker>
    <marker id="arrRisk38b" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#B5532F"/>
    </marker>
    <marker id="arrTeal38b" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2E7D8A"/>
    </marker>
    <marker id="arrGold38b" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#C2912C"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="878" height="498" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <text x="44" y="48" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 38.2 · INVARIANTE 1 — PLAUSIBILIDADE</text>
  <text x="44" y="78" font-size="23" font-weight="700" fill="#1B2A33">Agente híbrido por tier de risco</text>
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule38b)"/>

  <!-- Entrada -->
  <g filter="url(#sh38b)">
    <rect x="340" y="112" width="200" height="46" rx="10" fill="#1B2A33"/>
  </g>
  <text x="440" y="131" font-size="13.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">CONTATO DO CLIENTE</text>
  <text x="440" y="149" font-size="11.5" fill="#C2912C" text-anchor="middle">entrada única</text>

  <!-- Classificador -->
  <path d="M440,158 V184" fill="none" stroke="#44525C" stroke-width="2" marker-end="url(#arrInk38b)"/>
  <g filter="url(#sh38b)">
    <rect x="310" y="184" width="260" height="44" rx="10" fill="#FFFFFF" stroke="#CFC8B6"/>
  </g>
  <text x="440" y="203" font-size="13" font-weight="700" fill="#1B2A33" text-anchor="middle">Classificador de Entrada</text>
  <text x="440" y="220" font-size="11.5" fill="#7C7768" text-anchor="middle">regras explícitas + intenção · determinístico</text>

  <!-- Four arrows to tiers -->
  <path d="M360,228 L158,268" fill="none" stroke="#2E7D8A" stroke-width="1.8" marker-end="url(#arrTeal38b)"/>
  <path d="M400,228 L330,268" fill="none" stroke="#C2912C" stroke-width="1.8" marker-end="url(#arrGold38b)"/>
  <path d="M480,228 L550,268" fill="none" stroke="#C2912C" stroke-width="1.8" marker-end="url(#arrGold38b)"/>
  <path d="M520,228 L722,268" fill="none" stroke="#B5532F" stroke-width="1.8" marker-end="url(#arrRisk38b)"/>

  <!-- Tier 1 -->
  <g filter="url(#sh38b)">
    <rect x="56" y="268" width="192" height="110" rx="11" fill="#EFF6F7" stroke="#BBD7DB"/>
  </g>
  <rect x="56" y="268" width="192" height="28" rx="11" fill="#2E7D8A"/>
  <rect x="56" y="282" width="192" height="14" fill="#2E7D8A"/>
  <text x="152" y="285" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">TIER 1 · ~50%</text>
  <text x="76" y="310" font-size="12" font-weight="700" fill="#1B2A33">Baixa criticidade</text>
  <text x="76" y="326" font-size="11.5" fill="#7C7768">informacional, 2ª via</text>
  <text x="76" y="342" font-size="11.5" fill="#7C7768">status, dúvida de uso</text>
  <text x="76" y="360" font-size="11.5" fill="#2E7D8A" font-weight="600">agente resolve · tracing</text>

  <!-- Tier 2 -->
  <g filter="url(#sh38b)">
    <rect x="262" y="268" width="192" height="110" rx="11" fill="#FBF6EA" stroke="#E2D4AC"/>
  </g>
  <rect x="262" y="268" width="192" height="28" rx="11" fill="#C2912C"/>
  <rect x="262" y="282" width="192" height="14" fill="#C2912C"/>
  <text x="358" y="285" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">TIER 2 · ~25%</text>
  <text x="282" y="310" font-size="12" font-weight="700" fill="#1B2A33">Média criticidade</text>
  <text x="282" y="326" font-size="11.5" fill="#7C7768">cobrança, limite</text>
  <text x="282" y="342" font-size="11.5" fill="#7C7768">alteração cadastral</text>
  <text x="282" y="360" font-size="11.5" fill="#9A7A2E" font-weight="600">co-piloto · humano valida</text>

  <!-- Tier 3 -->
  <g filter="url(#sh38b)">
    <rect x="468" y="268" width="192" height="110" rx="11" fill="#FFF5F2" stroke="#E7CDBE"/>
  </g>
  <rect x="468" y="268" width="192" height="28" rx="11" fill="#B5532F"/>
  <rect x="468" y="282" width="192" height="14" fill="#B5532F"/>
  <text x="564" y="285" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">TIER 3 · ~15%</text>
  <text x="488" y="310" font-size="12" font-weight="700" fill="#1B2A33">Alta criticidade</text>
  <text x="488" y="326" font-size="11.5" fill="#7C7768">fraude, contestação</text>
  <text x="488" y="342" font-size="11.5" fill="#7C7768">jurídico</text>
  <text x="488" y="360" font-size="11.5" fill="#B5532F" font-weight="600">assistente · humano decide</text>

  <!-- Tier 4 -->
  <g filter="url(#sh38b)">
    <rect x="674" y="268" width="162" height="110" rx="11" fill="#F0DDD2" stroke="#E7CDBE"/>
  </g>
  <rect x="674" y="268" width="162" height="28" rx="11" fill="#1B2A33"/>
  <rect x="674" y="282" width="162" height="14" fill="#1B2A33"/>
  <text x="755" y="285" font-size="12" font-weight="700" fill="#B5532F" text-anchor="middle">TIER 4 · ~10%</text>
  <text x="694" y="310" font-size="12" font-weight="700" fill="#1B2A33">Crítico</text>
  <text x="694" y="326" font-size="11.5" fill="#7C7768">roubo, ameaça</text>
  <text x="694" y="342" font-size="11.5" fill="#7C7768">denúncia regulatória</text>
  <text x="694" y="360" font-size="11.5" fill="#B5532F" font-weight="600">roteamento direto</text>

  <!-- Escalation arrows up -->
  <path d="M152,378 L152,428" fill="none" stroke="#44525C" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrInk38b)"/>
  <path d="M358,378 L358,428" fill="none" stroke="#44525C" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrInk38b)"/>
  <path d="M564,378 L564,428" fill="none" stroke="#44525C" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrInk38b)"/>

  <!-- Humano box -->
  <g filter="url(#sh38b)">
    <rect x="80" y="428" width="542" height="40" rx="10" fill="#1B2A33"/>
  </g>
  <text x="351" y="444" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">HUMANO COM CONTEXTO COMPLETO</text>
  <text x="351" y="460" font-size="11.5" fill="#C2912C" text-anchor="middle">sessão · tracing · sumário do agente · justificativa de escalação preservados</text>

  <!-- Tool call indicator -->
  <g filter="url(#sh38b)">
    <rect x="648" y="428" width="184" height="40" rx="10" fill="#F1ECE0" stroke="#D8D0BD"/>
  </g>
  <text x="740" y="444" font-size="12" font-weight="700" fill="#1B2A33" text-anchor="middle">TOOL CALLS</text>
  <text x="740" y="460" font-size="11" fill="#7C7768" text-anchor="middle">valores via sistema autoritativo</text>

  <text x="44" y="490" font-size="12.5" fill="#7C7768" font-style="italic">O classificador roteia deterministicamente por regras explícitas — nunca LLM. A autonomia do agente decresce conforme o impacto de erro aumenta por tier.</text>
</svg>
