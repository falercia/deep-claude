<svg viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh5" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
    <marker id="arrInk5" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#44525C"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="878" height="478" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <text x="44" y="48" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 28.1 · INVARIANTE 6 — AUTONOMIA PROPORCIONAL</text>
  <text x="44" y="78" font-size="23" font-weight="700" fill="#1B2A33">Arquitetura corporativa de MCP</text>
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule5)"/>

  <!-- Claude node -->
  <g filter="url(#sh5)"><rect x="48" y="178" width="120" height="150" rx="14" fill="#1B2A33"/></g>
  <text x="108" y="246" font-size="17" font-weight="700" fill="#FFFFFF" text-anchor="middle">Claude</text>
  <text x="108" y="266" font-size="11" fill="#C2912C" text-anchor="middle">cliente MCP</text>

  <!-- connectors -->
  <path d="M168,220 H214" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk5)" fill="none"/>
  <path d="M168,253 H214" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk5)" fill="none"/>
  <path d="M168,286 H214" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk5)" fill="none"/>

  <!-- Layer 1: SaaS externo -->
  <g filter="url(#sh5)"><rect x="220" y="126" width="612" height="60" rx="11" fill="#FFFFFF" stroke="#BBD7DB"/></g>
  <rect x="220" y="126" width="9" height="60" rx="4" fill="#2E7D8A"/>
  <text x="244" y="150" font-size="14.5" font-weight="700" fill="#1B2A33">SaaS externos · servidores oficiais</text>
  <text x="244" y="170" font-size="11.5" fill="#7C7768">manutenção zero · mantidos pelo fornecedor</text>
  <g font-size="11" fill="#256A75">
    <rect x="560" y="138" width="58" height="20" rx="10" fill="#EFF6F7" stroke="#CFE3E6"/><text x="589" y="152" text-anchor="middle">GitHub</text>
    <rect x="624" y="138" width="50" height="20" rx="10" fill="#EFF6F7" stroke="#CFE3E6"/><text x="649" y="152" text-anchor="middle">Slack</text>
    <rect x="680" y="138" width="62" height="20" rx="10" fill="#EFF6F7" stroke="#CFE3E6"/><text x="711" y="152" text-anchor="middle">Salesforce</text>
    <rect x="748" y="138" width="74" height="20" rx="10" fill="#EFF6F7" stroke="#CFE3E6"/><text x="785" y="152" text-anchor="middle">Drive / CRM</text>
  </g>

  <!-- Layer 2: MCP interno -->
  <g filter="url(#sh5)"><rect x="220" y="194" width="612" height="60" rx="11" fill="#FFFFFF" stroke="#E2D4AC"/></g>
  <rect x="220" y="194" width="9" height="60" rx="4" fill="#C2912C"/>
  <text x="244" y="218" font-size="14.5" font-weight="700" fill="#1B2A33">MCP interno · construído pela empresa</text>
  <text x="244" y="238" font-size="11.5" fill="#7C7768">expõe sistemas legados uma vez, reusável por qualquer cliente</text>
  <g font-size="11" fill="#9A7A2E">
    <rect x="612" y="206" width="44" height="20" rx="10" fill="#FBF6EA" stroke="#EADfBF"/><text x="634" y="220" text-anchor="middle">ERP</text>
    <rect x="662" y="206" width="80" height="20" rx="10" fill="#FBF6EA" stroke="#EADfBF"/><text x="702" y="220" text-anchor="middle">Data warehouse</text>
    <rect x="748" y="206" width="74" height="20" rx="10" fill="#FBF6EA" stroke="#EADfBF"/><text x="785" y="220" text-anchor="middle">CRM próprio</text>
  </g>

  <!-- Layer 3: filesystem local -->
  <g filter="url(#sh5)"><rect x="220" y="262" width="612" height="60" rx="11" fill="#FFFFFF" stroke="#CFC8B6"/></g>
  <rect x="220" y="262" width="9" height="60" rx="4" fill="#44525C"/>
  <text x="244" y="286" font-size="14.5" font-weight="700" fill="#1B2A33">Filesystem e local · por usuário</text>
  <text x="244" y="306" font-size="11.5" fill="#7C7768">Desktop e Code · permissão granular configurável</text>
  <g font-size="11" fill="#44525C">
    <rect x="624" y="274" width="58" height="20" rx="10" fill="#F1ECE0" stroke="#D8D0BD"/><text x="653" y="288" text-anchor="middle">Pastas</text>
    <rect x="688" y="274" width="60" height="20" rx="10" fill="#F1ECE0" stroke="#D8D0BD"/><text x="718" y="288" text-anchor="middle">Git local</text>
    <rect x="754" y="274" width="68" height="20" rx="10" fill="#F1ECE0" stroke="#D8D0BD"/><text x="788" y="288" text-anchor="middle">Apps locais</text>
  </g>

  <!-- Governance band -->
  <g filter="url(#sh5)"><rect x="48" y="346" width="784" height="74" rx="13" fill="#1B2A33"/></g>
  <text x="68" y="372" font-size="13.5" font-weight="700" fill="#C2912C" letter-spacing="0.5">CAMADA DE GOVERNANÇA — processo com dono, não lista de políticas</text>
  <g font-size="12" fill="#FFFFFF">
    <rect x="68" y="384" width="172" height="24" rx="12" fill="#2A3D48"/><text x="154" y="400" text-anchor="middle">Catálogo aprovado</text>
    <rect x="252" y="384" width="186" height="24" rx="12" fill="#2A3D48"/><text x="345" y="400" text-anchor="middle">Permissão por função</text>
    <rect x="450" y="384" width="186" height="24" rx="12" fill="#2A3D48"/><text x="543" y="400" text-anchor="middle">Log de cada chamada</text>
    <rect x="648" y="384" width="166" height="24" rx="12" fill="#2A3D48"/><text x="731" y="400" text-anchor="middle">Revisão obrigatória</text>
  </g>

  <text x="44" y="458" font-size="12.5" fill="#7C7768" font-style="italic">Sem a camada de governança, MCP em escala vira passivo de segurança. Ela é o que separa arquitetura corporativa de coleção de integrações ad hoc.</text>
</svg>
