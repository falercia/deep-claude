<svg viewBox="0 0 880 490" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh29c" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule29c" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
    <marker id="arrInk29c" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#44525C"/>
    </marker>
    <marker id="arrTeal29c" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2E7D8A"/>
    </marker>
    <marker id="arrRisk29c" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#B5532F"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="878" height="488" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <!-- Kicker + Title -->
  <text x="44" y="48" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 29.3 · INVARIANTE 6 — AUTONOMIA PROPORCIONAL</text>
  <text x="44" y="78" font-size="23" font-weight="700" fill="#1B2A33">Composição de múltiplos servidores MCP</text>
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule29c)"/>

  <!-- Claude client node -->
  <g filter="url(#sh29c)">
    <rect x="44" y="140" width="154" height="190" rx="14" fill="#1B2A33"/>
  </g>
  <text x="121" y="218" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">Claude</text>
  <text x="121" y="238" font-size="11.5" fill="#C2912C" text-anchor="middle">cliente MCP</text>
  <text x="121" y="258" font-size="11" fill="#7C7768" text-anchor="middle" font-style="italic">contexto</text>
  <text x="121" y="272" font-size="11" fill="#7C7768" text-anchor="middle" font-style="italic">federado</text>

  <!-- Arrows from Claude to each server -->
  <path d="M198,195 H374" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk29c)"/>
  <path d="M198,235 H374" fill="none" stroke="#2E7D8A" stroke-width="2.2" marker-end="url(#arrTeal29c)"/>
  <path d="M198,275 H374" fill="none" stroke="#B5532F" stroke-width="2.2" stroke-dasharray="5 4" marker-end="url(#arrRisk29c)"/>

  <!-- Namespace labels on arrows -->
  <text x="286" y="188" font-size="10.5" fill="#44525C" text-anchor="middle" font-weight="600">crm.buscar</text>
  <text x="286" y="228" font-size="10.5" fill="#2E7D8A" text-anchor="middle" font-weight="600">dw.consultar</text>
  <text x="286" y="268" font-size="10.5" fill="#B5532F" text-anchor="middle" font-weight="600">msg.enviar</text>

  <!-- Server 1: CRM (active, gold) -->
  <g filter="url(#sh29c)">
    <rect x="380" y="118" width="220" height="80" rx="11" fill="#FFFFFF" stroke="#E2D4AC"/>
  </g>
  <rect x="380" y="118" width="9" height="80" rx="4" fill="#C2912C"/>
  <text x="404" y="142" font-size="14" font-weight="700" fill="#1B2A33">Servidor CRM</text>
  <text x="404" y="160" font-size="11.5" fill="#7C7768">dados de cliente · relatórios</text>
  <rect x="518" y="128" width="72" height="18" rx="9" fill="#FBF6EA" stroke="#EADfBF"/>
  <text x="554" y="141" font-size="10" fill="#9A7A2E" text-anchor="middle" font-weight="700">ATIVO</text>
  <text x="404" y="184" font-size="11" fill="#9A7A2E">namespace: crm.*</text>

  <!-- Server 2: Data Warehouse (active, teal) -->
  <g filter="url(#sh29c)">
    <rect x="380" y="216" width="220" height="80" rx="11" fill="#FFFFFF" stroke="#BBD7DB"/>
  </g>
  <rect x="380" y="216" width="9" height="80" rx="4" fill="#2E7D8A"/>
  <text x="404" y="240" font-size="14" font-weight="700" fill="#1B2A33">Data Warehouse</text>
  <text x="404" y="258" font-size="11.5" fill="#7C7768">métricas · análises</text>
  <rect x="518" y="226" width="72" height="18" rx="9" fill="#EFF6F7" stroke="#CFE3E6"/>
  <text x="554" y="239" font-size="10" fill="#2E7D8A" text-anchor="middle" font-weight="700">ATIVO</text>
  <text x="404" y="282" font-size="11" fill="#256A75">namespace: dw.*</text>

  <!-- Server 3: Comunicação (UNAVAILABLE, terracota) -->
  <g filter="url(#sh29c)">
    <rect x="380" y="314" width="220" height="80" rx="11" fill="#FBF8F1" stroke="#B5532F" stroke-dasharray="6 4"/>
  </g>
  <rect x="380" y="314" width="9" height="80" rx="4" fill="#B5532F"/>
  <text x="404" y="338" font-size="14" font-weight="700" fill="#B5532F">Comunicação</text>
  <text x="404" y="356" font-size="11.5" fill="#7C7768">envio de mensagens</text>
  <rect x="498" y="324" width="92" height="18" rx="9" fill="#F0DDD2" stroke="#E7CDBE"/>
  <text x="544" y="337" font-size="10" fill="#B5532F" text-anchor="middle" font-weight="700">INDISPONÍVEL</text>
  <text x="404" y="380" font-size="11" fill="#B5532F">namespace: msg.*</text>

  <!-- Isolation callout for downed server -->
  <g filter="url(#sh29c)">
    <rect x="618" y="314" width="218" height="80" rx="11" fill="#F0DDD2" stroke="#E7CDBE"/>
  </g>
  <text x="727" y="342" font-size="12" font-weight="700" fill="#B5532F" text-anchor="middle">FALHA ISOLADA</text>
  <text x="727" y="360" font-size="11.5" fill="#44525C" text-anchor="middle">CRM e DW continuam</text>
  <text x="727" y="378" font-size="11.5" fill="#44525C" text-anchor="middle">operando normalmente</text>

  <!-- Connection from server 3 to callout -->
  <line x1="600" y1="354" x2="618" y2="354" stroke="#B5532F" stroke-width="1.8" stroke-dasharray="4 3"/>

  <!-- Context window callout box -->
  <g filter="url(#sh29c)">
    <rect x="618" y="118" width="218" height="176" rx="11" fill="#FFFFFF" stroke="#E2D4AC"/>
  </g>
  <text x="727" y="142" font-size="12" font-weight="700" fill="#C2912C" text-anchor="middle">FEDERAÇÃO DE CONTEXTO</text>
  <line x1="638" y1="150" x2="816" y2="150" stroke="#E6DFC9" stroke-width="1"/>
  <text x="727" y="168" font-size="11.5" fill="#44525C" text-anchor="middle">Resources incluídos</text>
  <text x="727" y="184" font-size="11.5" fill="#44525C" text-anchor="middle">consomem context window</text>
  <text x="638" y="208" font-size="11" fill="#7C7768">Estratégia necessária:</text>
  <text x="638" y="224" font-size="11" fill="#9A7A2E">• TTL de cache por Resource</text>
  <text x="638" y="240" font-size="11" fill="#9A7A2E">• inclusão sob demanda</text>
  <text x="638" y="256" font-size="11" fill="#9A7A2E">• prioridade por relevância</text>
  <text x="638" y="276" font-size="11" fill="#7C7768" font-style="italic">sem estratégia → contexto</text>
  <text x="638" y="290" font-size="11" fill="#7C7768" font-style="italic">satura, qualidade degrada</text>

  <!-- Caption -->
  <text x="44" y="440" font-size="12.5" fill="#7C7768" font-style="italic">Namespacing (crm.buscar vs dw.consultar) evita conflito entre servidores. Isolamento de falha garante que um servidor fora do ar não derruba os demais.</text>
  <text x="44" y="458" font-size="12.5" fill="#7C7768" font-style="italic">Roteamento por responsabilidade: cada servidor tem escopo delimitado — o monolito de MCP replica os problemas do monolito de software.</text>
</svg>
