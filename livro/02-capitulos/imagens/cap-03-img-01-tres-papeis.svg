<svg viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh3a" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule3a" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
    <marker id="arr3a" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#44525C"/>
    </marker>
    <marker id="arr3b" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#C2912C"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="878" height="478" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <text x="44" y="48" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 3.1 · INVARIANTE 2 — EXTREMIDADES</text>
  <text x="44" y="78" font-size="23" font-weight="700" fill="#1B2A33">Os três papéis e o fluxo de uma conversa</text>
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule3a)"/>

  <!-- LEFT: Structure label -->
  <text x="44" y="130" font-size="11.5" fill="#7C7768" font-weight="600">ESTRUTURA DE CADA CHAMADA À API</text>

  <!-- SYSTEM block — camada acima -->
  <g filter="url(#sh3a)">
    <rect x="52" y="144" width="490" height="72" rx="12" fill="#1B2A33"/>
  </g>
  <rect x="72" y="156" width="80" height="22" rx="5" fill="#C2912C"/>
  <text x="112" y="171" font-size="11.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">system</text>
  <text x="172" y="170" font-size="13.5" font-weight="700" fill="#FFFFFF">Instrução estrutural</text>
  <text x="172" y="188" font-size="12" fill="#C2912C">parâmetro separado · camada acima da conversa · maior atenção</text>
  <text x="172" y="204" font-size="11.5" fill="#7C7768">persona · regras invioláveis · tom · formato persistente</text>

  <!-- Bracket showing "enviado a cada chamada" -->
  <line x1="552" y1="150" x2="570" y2="150" stroke="#C2912C" stroke-width="1.5"/>
  <line x1="570" y1="150" x2="570" y2="380" stroke="#C2912C" stroke-width="1.5"/>
  <line x1="552" y1="380" x2="570" y2="380" stroke="#C2912C" stroke-width="1.5"/>
  <text x="580" y="258" font-size="12" fill="#9A7A2E" font-weight="600" transform="rotate(-90 580 258)">ENVIADO A CADA CHAMADA</text>

  <!-- USER block 1 -->
  <g filter="url(#sh3a)">
    <rect x="52" y="234" width="490" height="60" rx="12" fill="#FFFFFF" stroke="#CFC8B6"/>
  </g>
  <rect x="72" y="246" width="52" height="22" rx="5" fill="#2E7D8A"/>
  <text x="98" y="261" font-size="11.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">user</text>
  <text x="138" y="260" font-size="13" font-weight="700" fill="#1B2A33">Turno 1 — Input do usuário</text>
  <text x="138" y="278" font-size="12" fill="#7C7768">mensagem, tarefa, pergunta — dispara nova resposta</text>

  <!-- ASSISTANT block 1 -->
  <g filter="url(#sh3a)">
    <rect x="52" y="306" width="490" height="60" rx="12" fill="#F1ECE0" stroke="#D8D0BD"/>
  </g>
  <rect x="72" y="318" width="84" height="22" rx="5" fill="#44525C"/>
  <text x="114" y="333" font-size="11.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">assistant</text>
  <text x="170" y="332" font-size="13" font-weight="700" fill="#1B2A33">Turno 1 — Resposta do modelo</text>
  <text x="170" y="350" font-size="12" fill="#7C7768">incluída no histórico dos turnos seguintes</text>

  <!-- USER block 2 — nova mensagem -->
  <g filter="url(#sh3a)">
    <rect x="52" y="378" width="490" height="60" rx="12" fill="#FFFFFF" stroke="#CFC8B6"/>
  </g>
  <rect x="72" y="390" width="52" height="22" rx="5" fill="#2E7D8A"/>
  <text x="98" y="405" font-size="11.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">user</text>
  <text x="138" y="404" font-size="13" font-weight="700" fill="#1B2A33">Turno 2 — Nova mensagem</text>
  <text x="138" y="422" font-size="12" fill="#7C7768">sistema envia: system + user[1] + assistant[1] + user[2]</text>

  <!-- RIGHT: API call arrow and context window -->
  <g filter="url(#sh3a)">
    <rect x="636" y="180" width="212" height="80" rx="12" fill="#FBF6EA" stroke="#E2D4AC"/>
  </g>
  <text x="742" y="204" font-size="12.5" font-weight="700" fill="#9A7A2E" text-anchor="middle">JANELA DE CONTEXTO</text>
  <text x="742" y="222" font-size="12" fill="#7C7768" text-anchor="middle">teto total compartilhado</text>
  <text x="742" y="240" font-size="12" fill="#7C7768" text-anchor="middle">entre input e output</text>
  <text x="742" y="256" font-size="11" fill="#9A7A2E" font-style="italic" text-anchor="middle">tamanho: Apêndice Vivo</text>

  <!-- API is stateless box -->
  <g filter="url(#sh3a)">
    <rect x="636" y="294" width="212" height="66" rx="12" fill="#F0DDD2" stroke="#E7CDBE"/>
  </g>
  <text x="742" y="318" font-size="12.5" font-weight="700" fill="#B5532F" text-anchor="middle">API É STATELESS</text>
  <text x="742" y="336" font-size="12" fill="#7C7768" text-anchor="middle">você envia o histórico</text>
  <text x="742" y="352" font-size="12" fill="#7C7768" text-anchor="middle">completo a cada chamada</text>

  <text x="44" y="466" font-size="12.5" fill="#7C7768" font-style="italic">Topo: system (parâmetro separado, camada de instrução). Centro: alternância user/assistant (histórico acumulado). A cada chamada: system + histórico completo + nova mensagem user.</text>
</svg>
