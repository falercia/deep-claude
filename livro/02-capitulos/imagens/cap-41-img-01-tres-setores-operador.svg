    <text x="334" y="328" font-weight="600" fill="#1B2A33">Decisão com dono</text>
    <text x="334" y="344" fill="#7C7768">partner avalia · banca oral valida</text>
    <text x="334" y="366" font-weight="600" fill="#1B2A33">Mede o que importa</text>
    <text x="334" y="382" fill="#7C7768">raciocínio de decisão, não output</text>
    <text x="334" y="404" font-weight="600" fill="#1B2A33">Detecta degradação</text>
    <text x="334" y="420" fill="#C2912C">defesa oral com rubrica</text>
