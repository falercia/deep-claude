  </defs>

  <rect x="1" y="1" width="878" height="488" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <text x="44" y="48" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 40.1 · INVARIANTE 9 — OPERADOR</text>
  <text x="44" y="78" font-size="23" font-weight="700" fill="#1B2A33">O Invariante 9 em três setores de conhecimento</text>
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule40a)"/>

  <!-- Top: Amplificador central -->
  <g filter="url(#sh40a)">
    <rect x="310" y="112" width="260" height="54" rx="14" fill="#1B2A33"/>
  </g>
  <text x="440" y="136" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">INVARIANTE 9 · OPERADOR</text>
  <text x="440" y="154" font-size="11.5" fill="#C2912C" text-anchor="middle">IA multiplica competência e incompetência pelo mesmo fator</text>

