  <text x="170" y="264" font-size="11" fill="#DCF0F2" text-anchor="middle">Redecasa</text>

  <g font-size="12">
    <text x="64" y="290" font-weight="600" fill="#1B2A33">Risco principal</text>
    <text x="64" y="306" fill="#B5532F">viés algorítmico · LGPD art. 20</text>
    <text x="64" y="328" font-weight="600" fill="#1B2A33">Decisão com dono</text>
    <text x="64" y="344" fill="#7C7768">recrutador humano decide top-15</text>
    <text x="64" y="366" font-weight="600" fill="#1B2A33">Mede o que importa</text>
    <text x="64" y="382" fill="#7C7768">viés adversarial (120 pares)</text>
    <text x="64" y="404" font-weight="600" fill="#1B2A33">Detecta degradação</text>
    <text x="64" y="420" fill="#2E7D8A">adversarial mensal</text>
  </g>

  <!-- PANEL 2: Educação -->
  <g filter="url(#sh40a)">
    <rect x="314" y="220" width="252" height="218" rx="13" fill="#FFFFFF" stroke="#E2D4AC"/>
  </g>
  <path d="M314,233 a13,13 0 0 1 13,-13 h226 a13,13 0 0 1 13,13 v22 h-252 z" fill="#C2912C"/>
