    <text x="604" y="306" fill="#B5532F">número errado · aparência impecável</text>
    <text x="604" y="328" font-weight="600" fill="#1B2A33">Decisão com dono</text>
    <text x="604" y="344" fill="#7C7768">sócio audita release crítico</text>
    <text x="604" y="366" font-weight="600" fill="#1B2A33">Mede o que importa</text>
