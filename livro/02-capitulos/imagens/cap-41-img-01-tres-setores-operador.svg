  <text x="44" y="480" font-size="12.5" fill="#7C7768" font-style="italic">A amplificação é bidirecional: o mesmo modelo que reduz viés com critério explícito pode amplificar viés com critério vago. A variável não é o modelo — é a qualidade do operador.</text>
