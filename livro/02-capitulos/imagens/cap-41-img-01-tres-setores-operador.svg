  <path d="M362,166 L196,220" fill="none" stroke="#C2912C" stroke-width="2" marker-end="url(#arrGold40a)"/>
  <path d="M440,166 V220" fill="none" stroke="#C2912C" stroke-width="2" marker-end="url(#arrGold40a)"/>
  <path d="M518,166 L684,220" fill="none" stroke="#C2912C" stroke-width="2" marker-end="url(#arrGold40a)"/>

  <!-- PANEL 1: RH -->
  <g filter="url(#sh40a)">
