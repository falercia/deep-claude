<svg viewBox="0 0 880 520" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
    <marker id="arrInk" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#44525C"/>
    </marker>
    <marker id="arrGold" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#C2912C"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="878" height="518" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <!-- Kicker + Title -->
  <text x="44" y="48" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 2.2 · INVARIANTE 9 — OPERADOR</text>
  <text x="44" y="78" font-size="23" font-weight="700" fill="#1B2A33">Constitutional AI — como funciona</text>
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule)"/>

  <!-- Step 1: Constituição -->
  <g filter="url(#sh)">
    <rect x="44" y="122" width="228" height="224" rx="12" fill="#FFFFFF" stroke="#E6DFC9"/>
  </g>
  <path d="M44,134 a12,12 0 0 1 12,-12 h204 a12,12 0 0 1 12,12 v20 h-228 z" fill="#1B2A33"/>
  <circle cx="64" cy="144" r="13" fill="#C2912C"/>
  <text x="64" y="149" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="88" y="150" font-size="13" font-weight="700" fill="#FFFFFF">CONSTITUIÇÃO</text>

  <text x="60" y="180" font-size="12.5" font-weight="700" fill="#1B2A33">Princípios escritos</text>
  <text x="60" y="200" font-size="11.5" fill="#7C7768">Declaração Universal</text>
  <text x="60" y="216" font-size="11.5" fill="#7C7768">dos Direitos Humanos</text>
  <text x="60" y="238" font-size="11.5" fill="#7C7768">Honestidade calibrada</text>
  <text x="60" y="258" font-size="11.5" fill="#7C7768">Recusa a auxiliar em dano</text>
  <text x="60" y="278" font-size="11.5" fill="#7C7768">Respeito a autonomia</text>
  <rect x="60" y="302" width="196" height="24" rx="12" fill="#FBF6EA" stroke="#EADfBF"/>
  <text x="158" y="318" font-size="11" font-weight="700" fill="#9A7A2E" text-anchor="middle">pública · auditável · refinável</text>

  <!-- Arrow 1→2 -->
  <path d="M272,234 H318" fill="none" stroke="#C2912C" stroke-width="2.2" marker-end="url(#arrGold)"/>

  <!-- Step 2: Self-Critique -->
  <g filter="url(#sh)">
    <rect x="326" y="122" width="228" height="224" rx="12" fill="#FFFFFF" stroke="#E6DFC9"/>
  </g>
  <path d="M326,134 a12,12 0 0 1 12,-12 h204 a12,12 0 0 1 12,12 v20 h-228 z" fill="#2E7D8A"/>
  <circle cx="346" cy="144" r="13" fill="#FFFFFF"/>
  <text x="346" y="149" font-size="13" font-weight="700" fill="#2E7D8A" text-anchor="middle">2</text>
  <text x="370" y="150" font-size="12" font-weight="700" fill="#FFFFFF">AUTOAVALIAÇÃO</text>

  <text x="342" y="180" font-size="12" font-weight="700" fill="#1B2A33">Self-critique and revision</text>

  <!-- Sub-steps in step 2 -->
  <rect x="342" y="196" width="196" height="28" rx="8" fill="#EFF6F7" stroke="#CFE3E6"/>
  <text x="440" y="214" font-size="11.5" fill="#1B2A33" text-anchor="middle">Modelo gera resposta inicial</text>

  <path d="M440,224 V238" fill="none" stroke="#44525C" stroke-width="1.8" marker-end="url(#arrInk)"/>

  <rect x="342" y="242" width="196" height="28" rx="8" fill="#EFF6F7" stroke="#CFE3E6"/>
  <text x="440" y="260" font-size="11.5" fill="#1B2A33" text-anchor="middle">Avalia à luz da constituição</text>

  <path d="M440,270 V284" fill="none" stroke="#44525C" stroke-width="1.8" marker-end="url(#arrInk)"/>

  <rect x="342" y="288" width="196" height="28" rx="8" fill="#EFF6F7" stroke="#CFE3E6"/>
  <text x="440" y="306" font-size="11.5" fill="#1B2A33" text-anchor="middle">Revisa se identificar problema</text>

  <rect x="342" y="322" width="196" height="24" rx="12" fill="#2E7D8A"/>
  <text x="440" y="338" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">sem depender de humanos</text>

  <!-- Arrow 2→3 -->
  <path d="M554,234 H600" fill="none" stroke="#C2912C" stroke-width="2.2" marker-end="url(#arrGold)"/>

  <!-- Step 3: RLAIF -->
  <g filter="url(#sh)">
    <rect x="608" y="122" width="228" height="224" rx="12" fill="#FFFFFF" stroke="#EADfBF"/>
  </g>
  <path d="M608,134 a12,12 0 0 1 12,-12 h204 a12,12 0 0 1 12,12 v20 h-228 z" fill="#C2912C"/>
  <circle cx="628" cy="144" r="13" fill="#FFFFFF"/>
  <text x="628" y="149" font-size="13" font-weight="700" fill="#C2912C" text-anchor="middle">3</text>
  <text x="650" y="150" font-size="13" font-weight="700" fill="#FFFFFF">RLAIF</text>

  <text x="624" y="180" font-size="12" font-weight="700" fill="#1B2A33">RL from AI Feedback</text>
  <text x="624" y="200" font-size="11.5" fill="#7C7768">Pares (original + revisada)</text>
  <text x="624" y="218" font-size="11.5" fill="#7C7768">viram sinal de treinamento</text>
  <text x="624" y="244" font-size="11.5" fill="#7C7768">Volume impossível para</text>
  <text x="624" y="260" font-size="11.5" fill="#7C7768">anotadores humanos</text>
  <text x="624" y="284" font-size="11.5" fill="#7C7768">Pesos do modelo ajustados</text>
  <rect x="624" y="306" width="196" height="24" rx="12" fill="#FBF6EA" stroke="#EADfBF"/>
  <text x="722" y="322" font-size="11" font-weight="700" fill="#9A7A2E" text-anchor="middle">ajusta pesos em escala</text>

  <!-- Comparison panel: RLHF vs CAI -->
  <g filter="url(#sh)">
    <rect x="44" y="364" width="792" height="130" rx="12" fill="#FFFFFF" stroke="#E6DFC9"/>
  </g>
  <path d="M44,376 a12,12 0 0 1 12,-12 h768 a12,12 0 0 1 12,12 v20 h-792 z" fill="#44525C"/>
  <text x="440" y="391" font-size="12.5" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">RLHF TRADICIONAL vs CONSTITUTIONAL AI</text>

  <!-- Left: RLHF -->
  <text x="62" y="418" font-size="12.5" font-weight="700" fill="#B5532F">RLHF</text>
  <text x="62" y="436" font-size="11.5" fill="#7C7768">Humanos avaliam pares de respostas</text>
  <text x="62" y="452" font-size="11.5" fill="#7C7768">Lento, caro e sujeito a viés do anotador</text>
  <text x="62" y="468" font-size="11.5" fill="#7C7768">Princípios implícitos e difíceis de auditar</text>

  <!-- Divider -->
  <line x1="440" y1="404" x2="440" y2="482" stroke="#E6DFC9" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Right: CAI -->
  <text x="458" y="418" font-size="12.5" font-weight="700" fill="#2E7D8A">CONSTITUTIONAL AI</text>
  <text x="458" y="436" font-size="11.5" fill="#7C7768">Modelo avalia com princípios escritos</text>
  <text x="458" y="452" font-size="11.5" fill="#7C7768">Escala sem custo linear de anotadores</text>
  <text x="458" y="468" font-size="11.5" fill="#7C7768">Princípios públicos, auditáveis e refináveis</text>

  <!-- Caption -->
  <text x="44" y="510" font-size="12.5" fill="#7C7768" font-style="italic">Em vez de humanos avaliando, o modelo se autoavalia com base em princípios escritos. É isso que escala onde RLHF não escala.</text>
</svg>
