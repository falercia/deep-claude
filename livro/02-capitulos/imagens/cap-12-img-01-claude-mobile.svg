<svg viewBox="0 0 880 500" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh12a" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule12a" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
    <linearGradient id="riskBar12a" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#EFF6F7"/><stop offset="1" stop-color="#FBF6EA"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="878" height="498" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <text x="44" y="48" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 12.1 · INVARIANTE 9 — OPERADOR</text>
  <text x="44" y="78" font-size="23" font-weight="700" fill="#1B2A33">Claude Mobile — voz, câmera e disponibilidade</text>
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule12a)"/>

  <!-- uniqueness axis -->
  <rect x="44" y="128" width="14" height="300" rx="7" fill="url(#riskBar12a)"/>
  <text x="51" y="120" font-size="11" fill="#9A7A2E" text-anchor="middle" font-weight="600">único</text>
  <text x="51" y="444" font-size="11" fill="#256A75" text-anchor="middle" font-weight="600">base</text>

  <!-- 1 App iOS/Android (base) -->
  <g filter="url(#sh12a)"><rect x="82" y="390" width="756" height="52" rx="10" fill="#FFFFFF" stroke="#CFE3E6"/></g>
  <circle cx="112" cy="416" r="14" fill="#2E7D8A"/><text x="112" y="421" font-size="14" font-weight="700" fill="#FFF" text-anchor="middle">1</text>
  <text x="138" y="412" font-size="15" font-weight="700" fill="#1B2A33">App nativo iOS e Android</text>
  <text x="138" y="430" font-size="12.5" fill="#7C7768">conta sincronizada, Projects, histórico e modelos — a mesma experiência do Web na palma da mão</text>
  <text x="822" y="421" font-size="11.5" fill="#256A75" text-anchor="end" font-weight="600">sincronizado</text>

  <!-- 2 Widgets e Compartilhamento -->
  <g filter="url(#sh12a)"><rect x="82" y="330" width="756" height="52" rx="10" fill="#FFFFFF" stroke="#CFE3E6"/></g>
  <circle cx="112" cy="356" r="14" fill="#2E7D8A"/><text x="112" y="361" font-size="14" font-weight="700" fill="#FFF" text-anchor="middle">2</text>
  <text x="138" y="352" font-size="15" font-weight="700" fill="#1B2A33">Widgets e atalho de compartilhamento</text>
  <text x="138" y="370" font-size="12.5" fill="#7C7768">acesso rápido na tela inicial + qualquer app envia conteúdo diretamente ao Claude</text>
  <text x="822" y="361" font-size="11.5" fill="#256A75" text-anchor="end" font-weight="600">integração SO</text>

  <!-- 3 Notificações de Tasks -->
  <g filter="url(#sh12a)"><rect x="82" y="270" width="756" height="52" rx="10" fill="#FFFFFF" stroke="#E2D4AC"/></g>
  <circle cx="112" cy="296" r="14" fill="#C2912C"/><text x="112" y="301" font-size="14" font-weight="700" fill="#FFF" text-anchor="middle">3</text>
  <text x="138" y="292" font-size="15" font-weight="700" fill="#1B2A33">Notificações de tarefas e Research</text>
  <text x="138" y="310" font-size="12.5" fill="#7C7768">Scheduled Tasks e pesquisas longas concluídas chegam no celular — resultado disponível onde você está</text>
  <text x="822" y="301" font-size="11.5" fill="#9A7A2E" text-anchor="end" font-weight="600">assíncrono</text>

  <!-- 4 Câmera multimodal -->
  <g filter="url(#sh12a)"><rect x="82" y="210" width="756" height="52" rx="10" fill="#FBF6EA" stroke="#E2D4AC"/></g>
  <circle cx="112" cy="236" r="14" fill="#C2912C"/><text x="112" y="241" font-size="14" font-weight="700" fill="#FFF" text-anchor="middle">4</text>
  <text x="138" y="232" font-size="15" font-weight="700" fill="#9A7A2E">Câmera — multimodal do mundo físico</text>
  <text x="138" y="250" font-size="12.5" fill="#7C7768">foto de documento, equação, objeto, lugar ou gráfico vira input analisado em segundos</text>
  <text x="822" y="241" font-size="11.5" fill="#9A7A2E" text-anchor="end" font-weight="600">exclusivo mobile</text>

  <!-- 5 Voz nativa -->
  <g filter="url(#sh12a)"><rect x="82" y="150" width="756" height="52" rx="10" fill="#FBF6EA" stroke="#EADfBF"/></g>
  <circle cx="112" cy="176" r="14" fill="#C2912C"/><text x="112" y="181" font-size="14" font-weight="700" fill="#FFF" text-anchor="middle">5</text>
  <text x="138" y="172" font-size="15" font-weight="700" fill="#9A7A2E">Voz nativa — conversa em áudio</text>
  <text x="138" y="190" font-size="12.5" fill="#7C7768">PT-BR fluente, mãos livres, baixa latência — modo híbrido voz + teclado para precisão</text>
  <text x="822" y="181" font-size="11.5" fill="#9A7A2E" text-anchor="end" font-weight="600">exclusivo mobile</text>

  <text x="44" y="478" font-size="12.5" fill="#7C7768" font-style="italic">Mobile não é versão reduzida do Claude. Voz e câmera são alavancas exclusivas — usá-las nos momentos certos é o que separa uso casual de uso profissional.</text>
</svg>
