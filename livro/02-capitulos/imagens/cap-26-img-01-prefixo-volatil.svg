<svg viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh251" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule251" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
    <marker id="arrGreen251" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2E7D8A"/>
    </marker>
    <marker id="arrRed251" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#B5532F"/>
    </marker>
    <marker id="arrInk251" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#44525C"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="878" height="398" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <text x="44" y="46" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 25.1 · INVARIANTE 5 — CUSTO COMPOSTO</text>
  <text x="44" y="76" font-size="23" font-weight="700" fill="#1B2A33">Prefixo estável × sufixo volátil</text>
  <rect x="44" y="88" width="86" height="3.5" rx="1.75" fill="url(#goldRule251)"/>

  <!-- label: ordem de processamento -->
  <text x="44" y="126" font-size="11.5" font-weight="700" fill="#7C7768" letter-spacing="1">ORDEM DE PROCESSAMENTO DA API · tools → system → messages</text>

  <!-- Block 1: tools -->
  <g filter="url(#sh251)">
    <rect x="44" y="140" width="148" height="72" rx="10" fill="#EFF6F7" stroke="#2E7D8A"/>
  </g>
  <text x="118" y="170" font-size="14" font-weight="700" fill="#1B2A33" text-anchor="middle">Tools</text>
  <text x="118" y="188" font-size="11.5" fill="#7C7768" text-anchor="middle">definição de ferramentas</text>
  <text x="118" y="204" font-size="11" fill="#256A75" text-anchor="middle" font-weight="600">estável</text>

  <!-- arrow -->
  <path d="M192,176 H216" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk251)" fill="none"/>

  <!-- Block 2: system -->
  <g filter="url(#sh251)">
    <rect x="220" y="140" width="148" height="72" rx="10" fill="#EFF6F7" stroke="#2E7D8A"/>
  </g>
  <text x="294" y="170" font-size="14" font-weight="700" fill="#1B2A33" text-anchor="middle">System Prompt</text>
  <text x="294" y="188" font-size="11.5" fill="#7C7768" text-anchor="middle">instruções de negócio</text>
  <text x="294" y="204" font-size="11" fill="#256A75" text-anchor="middle" font-weight="600">estável</text>

  <!-- arrow -->
  <path d="M368,176 H392" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk251)" fill="none"/>

  <!-- Block 3: knowledge / exemplos -->
  <g filter="url(#sh251)">
    <rect x="396" y="140" width="148" height="72" rx="10" fill="#EFF6F7" stroke="#2E7D8A"/>
  </g>
  <text x="470" y="163" font-size="14" font-weight="700" fill="#1B2A33" text-anchor="middle">Documentação</text>
  <text x="470" y="180" font-size="11.5" fill="#7C7768" text-anchor="middle">base de conhecimento</text>
  <text x="470" y="196" font-size="11.5" fill="#7C7768" text-anchor="middle">+ exemplos few-shot</text>
  <text x="470" y="212" font-size="11" fill="#256A75" text-anchor="middle" font-weight="600">estável</text>

  <!-- arrow -->
  <path d="M544,176 H568" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk251)" fill="none"/>

  <!-- Block 4: user message (volatile) -->
  <g filter="url(#sh251)">
    <rect x="572" y="140" width="148" height="72" rx="10" fill="#F0DDD2" stroke="#B5532F"/>
  </g>
  <text x="646" y="170" font-size="14" font-weight="700" fill="#1B2A33" text-anchor="middle">Mensagem</text>
  <text x="646" y="188" font-size="11.5" fill="#7C7768" text-anchor="middle">pergunta do usuário</text>
  <text x="646" y="204" font-size="11" fill="#B5532F" text-anchor="middle" font-weight="600">volátil</text>

  <!-- breakpoint line -->
  <line x1="556" y1="118" x2="556" y2="254" stroke="#C2912C" stroke-width="2" stroke-dasharray="6 4"/>
  <g filter="url(#sh251)">
    <rect x="490" y="106" width="132" height="26" rx="13" fill="#FBF6EA" stroke="#C2912C"/>
  </g>
  <text x="556" y="123" font-size="11.5" font-weight="700" fill="#C2912C" text-anchor="middle">breakpoint de cache</text>

  <!-- cache read annotation (below left blocks) -->
  <path d="M118,214 L118,262" stroke="#2E7D8A" stroke-width="1.8" stroke-dasharray="3 3" fill="none"/>
  <path d="M294,214 L294,262" stroke="#2E7D8A" stroke-width="1.8" stroke-dasharray="3 3" fill="none"/>
  <path d="M470,214 L470,262" stroke="#2E7D8A" stroke-width="1.8" stroke-dasharray="3 3" fill="none"/>
  <rect x="44" y="262" width="498" height="36" rx="9" fill="#EFF6F7" stroke="#2E7D8A"/>
  <text x="293" y="279" font-size="12.5" font-weight="700" fill="#2E7D8A" text-anchor="middle">&#x2713; LIDO DO CACHE · custo de cache-read (fração do input normal)</text>
  <text x="293" y="295" font-size="11" fill="#7C7768" text-anchor="middle">reprocessado uma vez; nas chamadas seguintes o estado computado é reutilizado</text>

  <!-- normal processing annotation (below right block) -->
  <path d="M646,214 L646,262" stroke="#B5532F" stroke-width="1.8" stroke-dasharray="3 3" fill="none"/>
  <rect x="572" y="262" width="266" height="36" rx="9" fill="#F0DDD2" stroke="#B5532F"/>
  <text x="705" y="279" font-size="12.5" font-weight="700" fill="#B5532F" text-anchor="middle">PROCESSADO NORMALMENTE</text>
  <text x="705" y="295" font-size="11" fill="#7C7768" text-anchor="middle">custo de input integral · muda a cada chamada</text>

  <text x="44" y="358" font-size="12.5" fill="#7C7768" font-style="italic">A economia estrutural: separe o que é estável do que é volátil e não pague duas vezes pelo que não mudou. Um único byte diferente antes do breakpoint resulta em cache miss.</text>
</svg>
