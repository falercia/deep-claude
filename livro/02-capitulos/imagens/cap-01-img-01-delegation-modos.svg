<svg viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh1a" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule1a" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="878" height="458" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <text x="44" y="48" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 1.1 · INVARIANTE 9 — OPERADOR</text>
  <text x="44" y="78" font-size="23" font-weight="700" fill="#1B2A33">Delegation: as três modalidades de engajamento</text>
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule1a)"/>

  <!-- Supervision axis -->
  <text x="44" y="128" font-size="11.5" fill="#7C7768">SUPERVISÃO EXIGIDA</text>
  <line x1="44" y1="132" x2="440" y2="132" stroke="#C2912C" stroke-width="2"/>
  <text x="454" y="128" font-size="11.5" fill="#7C7768">DECRESCENTE</text>
  <line x1="580" y1="132" x2="836" y2="132" stroke="#2E7D8A" stroke-width="2"/>

  <!-- AUTOMATION card -->
  <g filter="url(#sh1a)">
    <rect x="52" y="148" width="244" height="248" rx="13" fill="#FFFFFF" stroke="#E2D4AC"/>
  </g>
  <path d="M52,161 a13,13 0 0 1 13,-13 h218 a13,13 0 0 1 13,13 v24 h-244 z" fill="#C2912C"/>
  <text x="174" y="178" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">AUTOMATION</text>

  <text x="174" y="210" font-size="13.5" font-weight="700" fill="#1B2A33" text-anchor="middle">IA executa</text>
  <text x="174" y="228" font-size="12" fill="#7C7768" text-anchor="middle">por instrução humana</text>

  <rect x="72" y="244" width="204" height="30" rx="8" fill="#FBF6EA" stroke="#EADfBF"/>
  <text x="174" y="264" font-size="12" fill="#9A7A2E" text-anchor="middle">Briefings automáticos</text>
  <rect x="72" y="280" width="204" height="30" rx="8" fill="#FBF6EA" stroke="#EADfBF"/>
  <text x="174" y="300" font-size="12" fill="#9A7A2E" text-anchor="middle">Relatórios periódicos</text>
  <rect x="72" y="316" width="204" height="30" rx="8" fill="#FBF6EA" stroke="#EADfBF"/>
  <text x="174" y="336" font-size="12" fill="#9A7A2E" text-anchor="middle">Tarefas agendadas</text>

  <text x="174" y="376" font-size="11.5" fill="#9A7A2E" font-weight="600" text-anchor="middle">SUPERVISÃO DO RESULTADO</text>

  <!-- AUGMENTATION card -->
  <g filter="url(#sh1a)">
    <rect x="318" y="148" width="244" height="248" rx="13" fill="#FFFFFF" stroke="#CFC8B6"/>
  </g>
  <path d="M318,161 a13,13 0 0 1 13,-13 h218 a13,13 0 0 1 13,13 v24 h-244 z" fill="#1B2A33"/>
  <text x="440" y="178" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">AUGMENTATION</text>

  <text x="440" y="210" font-size="13.5" font-weight="700" fill="#1B2A33" text-anchor="middle">humano + IA colaboram</text>
  <text x="440" y="228" font-size="12" fill="#7C7768" text-anchor="middle">como parceiros de pensamento</text>

  <rect x="338" y="244" width="204" height="30" rx="8" fill="#F1ECE0" stroke="#D8D0BD"/>
  <text x="440" y="264" font-size="12" fill="#44525C" text-anchor="middle">Brainstorm e análise crítica</text>
  <rect x="338" y="280" width="204" height="30" rx="8" fill="#F1ECE0" stroke="#D8D0BD"/>
  <text x="440" y="300" font-size="12" fill="#44525C" text-anchor="middle">Redação com revisão humana</text>
  <rect x="338" y="316" width="204" height="30" rx="8" fill="#F1ECE0" stroke="#D8D0BD"/>
  <text x="440" y="336" font-size="12" fill="#44525C" text-anchor="middle">Planejamento estratégico</text>

  <text x="440" y="376" font-size="11.5" fill="#44525C" font-weight="600" text-anchor="middle">SUPERVISÃO DO PROCESSO</text>

  <!-- AGENCY card -->
  <g filter="url(#sh1a)">
    <rect x="584" y="148" width="244" height="248" rx="13" fill="#FFFFFF" stroke="#BBD7DB"/>
  </g>
  <path d="M584,161 a13,13 0 0 1 13,-13 h218 a13,13 0 0 1 13,13 v24 h-244 z" fill="#2E7D8A"/>
  <text x="706" y="178" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">AGENCY</text>

  <text x="706" y="210" font-size="13.5" font-weight="700" fill="#1B2A33" text-anchor="middle">humano configura</text>
  <text x="706" y="228" font-size="12" fill="#7C7768" text-anchor="middle">IA executa tarefas futuras</text>

  <rect x="604" y="244" width="204" height="30" rx="8" fill="#EFF6F7" stroke="#CFE3E6"/>
  <text x="706" y="264" font-size="12" fill="#256A75" text-anchor="middle">Pesquisa autônoma</text>
  <rect x="604" y="280" width="204" height="30" rx="8" fill="#EFF6F7" stroke="#CFE3E6"/>
  <text x="706" y="300" font-size="12" fill="#256A75" text-anchor="middle">Fluxos multi-etapa</text>
  <rect x="604" y="316" width="204" height="30" rx="8" fill="#EFF6F7" stroke="#CFE3E6"/>
  <text x="706" y="336" font-size="12" fill="#256A75" text-anchor="middle">Workflows agendados</text>

  <text x="706" y="376" font-size="11.5" fill="#256A75" font-weight="600" text-anchor="middle">SUPERVISÃO DA CONFIGURAÇÃO</text>

  <text x="44" y="446" font-size="12.5" fill="#7C7768" font-style="italic">Automation (IA executa) · Augmentation (colaboração contínua) · Agency (humano configura, IA age autonomamente). Cada modalidade implica nível diferente de supervisão exigida.</text>
</svg>
