<svg viewBox="0 0 880 500" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
    <marker id="arrInk3" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#44525C"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="878" height="498" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <text x="44" y="48" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 8.2 · INVARIANTE 6 — AUTONOMIA PROPORCIONAL</text>
  <text x="44" y="78" font-size="23" font-weight="700" fill="#1B2A33">O ciclo de autonomia supervisionada</text>
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule3)"/>

  <!-- dashed control ring -->
  <circle cx="440" cy="280" r="182" fill="none" stroke="#C2912C" stroke-width="1.4" stroke-dasharray="3 6" opacity="0.7"/>
  <text x="440" y="120" font-size="11.5" fill="#9A7A2E" text-anchor="middle" font-weight="600" letter-spacing="0.5">PARADA DISPONÍVEL A QUALQUER MOMENTO</text>

  <!-- curved flow arrows clockwise -->
  <path d="M520,150 A182,182 0 0 1 600,228" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk3)"/>
  <path d="M620,340 A182,182 0 0 1 540,412" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk3)"/>
  <path d="M340,410 A182,182 0 0 1 260,332" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk3)"/>
  <path d="M262,222 A182,182 0 0 1 360,150" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk3)"/>

  <!-- center -->
  <g filter="url(#sh3)"><circle cx="440" cy="280" r="74" fill="#1B2A33"/></g>
  <text x="440" y="272" font-size="13.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">HUMANO</text>
  <text x="440" y="291" font-size="11" fill="#C2912C" text-anchor="middle">no ponto de</text>
  <text x="440" y="305" font-size="11" fill="#C2912C" text-anchor="middle">decisão consequente</text>

  <!-- N node -->
  <g filter="url(#sh3)"><rect x="356" y="116" width="168" height="50" rx="10" fill="#FFFFFF" stroke="#CFE3E6"/></g>
  <text x="440" y="139" font-size="14" font-weight="700" fill="#1B2A33" text-anchor="middle">1 · Objetivo</text>
  <text x="440" y="156" font-size="11.5" fill="#7C7768" text-anchor="middle">o desfecho, não o passo</text>

  <!-- E node (highlight: previsibilidade) -->
  <g filter="url(#sh3)"><rect x="596" y="255" width="186" height="50" rx="10" fill="#FFFFFF" stroke="#CFE3E6"/></g>
  <text x="689" y="278" font-size="14" font-weight="700" fill="#1B2A33" text-anchor="middle">2 · Plano exibido</text>
  <text x="689" y="295" font-size="11.5" fill="#7C7768" text-anchor="middle">previsibilidade antes de agir</text>

  <!-- S node (highlight gold: aprovação) -->
  <g filter="url(#sh3)"><rect x="346" y="394" width="188" height="50" rx="10" fill="#FBF6EA" stroke="#E2D4AC"/></g>
  <text x="440" y="417" font-size="14" font-weight="700" fill="#9A7A2E" text-anchor="middle">3 · Aprovação humana</text>
  <text x="440" y="434" font-size="11.5" fill="#7C7768" text-anchor="middle">escopo e permissão granular</text>

  <!-- W node -->
  <g filter="url(#sh3)"><rect x="98" y="255" width="190" height="50" rx="10" fill="#FFFFFF" stroke="#CFE3E6"/></g>
  <text x="193" y="278" font-size="14" font-weight="700" fill="#1B2A33" text-anchor="middle">4 · Execução visível</text>
  <text x="193" y="295" font-size="11.5" fill="#7C7768" text-anchor="middle">observabilidade passo a passo</text>

  <text x="44" y="480" font-size="12.5" fill="#7C7768" font-style="italic">Os quatro freios implementam a proporcionalidade: plano dá previsibilidade; permissão dá escopo; execução visível dá observabilidade; parada dá reversibilidade de curso.</text>
</svg>
