<svg viewBox="0 0 880 500" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="878" height="498" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <!-- Kicker + Title -->
  <text x="44" y="48" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 9.2 · INVARIANTE 6 — AUTONOMIA PROPORCIONAL</text>
  <text x="44" y="78" font-size="23" font-weight="700" fill="#1B2A33">Claude Code vs Cursor vs Copilot</text>
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule)"/>

  <!-- Table header row -->
  <g filter="url(#sh)">
    <rect x="44" y="110" width="792" height="44" rx="10" fill="#1B2A33"/>
  </g>
  <text x="220" y="137" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">CLAUDE CODE</text>
  <text x="490" y="137" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">CURSOR</text>
  <text x="750" y="137" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">GITHUB COPILOT</text>
  <!-- Vertical dividers in header -->
  <line x1="360" y1="114" x2="360" y2="150" stroke="#44525C" stroke-width="1"/>
  <line x1="618" y1="114" x2="618" y2="150" stroke="#44525C" stroke-width="1"/>

  <!-- Row 1: Paradigma -->
  <rect x="44" y="154" width="792" height="44" rx="0" fill="#F1ECE0"/>
  <text x="44" y="166" font-size="11" font-weight="700" fill="#7C7768">  PARADIGMA</text>
  <text x="220" y="183" font-size="13" font-weight="700" fill="#1B2A33" text-anchor="middle">Agente CLI · terminal</text>
  <text x="490" y="183" font-size="13" fill="#1B2A33" text-anchor="middle">IDE com IA embarcada</text>
  <text x="750" y="183" font-size="13" fill="#1B2A33" text-anchor="middle">Autocomplete inteligente</text>
  <line x1="360" y1="154" x2="360" y2="198" stroke="#E6DFC9" stroke-width="1"/>
  <line x1="618" y1="154" x2="618" y2="198" stroke="#E6DFC9" stroke-width="1"/>

  <!-- Row 2: Autonomia -->
  <rect x="44" y="198" width="792" height="44" rx="0" fill="#FFFFFF"/>
  <text x="44" y="210" font-size="11" font-weight="700" fill="#7C7768">  AUTONOMIA</text>
  <rect x="148" y="214" width="144" height="20" rx="10" fill="#F0DDD2" stroke="#E7CDBE"/>
  <text x="220" y="228" font-size="12" font-weight="700" fill="#B5532F" text-anchor="middle">Alta — fluxos completos</text>
  <rect x="406" y="214" width="168" height="20" rx="10" fill="#EFF6F7" stroke="#CFE3E6"/>
  <text x="490" y="228" font-size="12" fill="#2E7D8A" text-anchor="middle">Média — edição assistida</text>
  <rect x="668" y="214" width="164" height="20" rx="10" fill="#F1ECE0" stroke="#D8D0BD"/>
  <text x="750" y="228" font-size="12" fill="#44525C" text-anchor="middle">Baixa — sugestões</text>
  <line x1="360" y1="198" x2="360" y2="242" stroke="#E6DFC9" stroke-width="1"/>
  <line x1="618" y1="198" x2="618" y2="242" stroke="#E6DFC9" stroke-width="1"/>

  <!-- Row 3: Onde mora -->
  <rect x="44" y="242" width="792" height="44" rx="0" fill="#F1ECE0"/>
  <text x="44" y="254" font-size="11" font-weight="700" fill="#7C7768">  ONDE MORA</text>
  <text x="220" y="271" font-size="12.5" fill="#1B2A33" text-anchor="middle">Terminal · qualquer OS</text>
  <text x="490" y="271" font-size="12.5" fill="#1B2A33" text-anchor="middle">IDE próprio (fork VS Code)</text>
  <text x="750" y="271" font-size="12.5" fill="#1B2A33" text-anchor="middle">Extensão (VS Code, JetBrains)</text>
  <line x1="360" y1="242" x2="360" y2="286" stroke="#E6DFC9" stroke-width="1"/>
  <line x1="618" y1="242" x2="618" y2="286" stroke="#E6DFC9" stroke-width="1"/>

  <!-- Row 4: Tools -->
  <rect x="44" y="286" width="792" height="44" rx="0" fill="#FFFFFF"/>
  <text x="44" y="298" font-size="11" font-weight="700" fill="#7C7768">  ACESSO A TOOLS</text>
  <text x="220" y="315" font-size="12.5" fill="#1B2A33" text-anchor="middle">Bash · MCP · Web · Skills</text>
  <text x="490" y="315" font-size="12.5" fill="#1B2A33" text-anchor="middle">Limitado ao editor</text>
  <text x="750" y="315" font-size="12.5" fill="#1B2A33" text-anchor="middle">Restrito · autocomplete</text>
  <line x1="360" y1="286" x2="360" y2="330" stroke="#E6DFC9" stroke-width="1"/>
  <line x1="618" y1="286" x2="618" y2="330" stroke="#E6DFC9" stroke-width="1"/>

  <!-- Row 5: Pedido natural -->
  <rect x="44" y="330" width="792" height="44" rx="0" fill="#F1ECE0"/>
  <text x="44" y="342" font-size="11" font-weight="700" fill="#7C7768">  PEDIDO NATURAL</text>
  <text x="220" y="357" font-size="12" fill="#1B2A33" text-anchor="middle" font-style="italic">"implemente X end-to-end"</text>
  <text x="490" y="357" font-size="12" fill="#1B2A33" text-anchor="middle" font-style="italic">"refatore esta função para Y"</text>
  <text x="750" y="357" font-size="12" fill="#1B2A33" text-anchor="middle" font-style="italic">complete esta linha</text>
  <line x1="360" y1="330" x2="360" y2="374" stroke="#E6DFC9" stroke-width="1"/>
  <line x1="618" y1="330" x2="618" y2="374" stroke="#E6DFC9" stroke-width="1"/>

  <!-- Row 6: Quando usar -->
  <rect x="44" y="374" width="792" height="60" rx="0" fill="#FFFFFF"/>
  <text x="44" y="386" font-size="11" font-weight="700" fill="#7C7768">  QUANDO USAR</text>
  <text x="220" y="401" font-size="11.5" fill="#7C7768" text-anchor="middle">Tarefa grande · multi-passo</text>
  <text x="220" y="417" font-size="11.5" fill="#7C7768" text-anchor="middle">refatoração · infra · código</text>
  <text x="490" y="401" font-size="11.5" fill="#7C7768" text-anchor="middle">Edição com arquivo aberto</text>
  <text x="490" y="417" font-size="11.5" fill="#7C7768" text-anchor="middle">refactoring rápido no editor</text>
  <text x="750" y="401" font-size="11.5" fill="#7C7768" text-anchor="middle">Aceleração de digitação</text>
  <text x="750" y="417" font-size="11.5" fill="#7C7768" text-anchor="middle">boilerplate · padrões repetitivos</text>
  <line x1="360" y1="374" x2="360" y2="434" stroke="#E6DFC9" stroke-width="1"/>
  <line x1="618" y1="374" x2="618" y2="434" stroke="#E6DFC9" stroke-width="1"/>

  <!-- Table borders -->
  <rect x="44" y="154" width="792" height="280" rx="0" fill="none" stroke="#E6DFC9" stroke-width="1"/>

  <!-- Bottom note -->
  <g filter="url(#sh)">
    <rect x="200" y="444" width="480" height="34" rx="17" fill="#1B2A33"/>
  </g>
  <text x="440" y="466" font-size="12.5" font-weight="700" fill="#C2912C" text-anchor="middle">As três coexistem — use cada uma para o paradigma certo</text>

  <!-- Caption -->
  <text x="44" y="490" font-size="12.5" fill="#7C7768" font-style="italic">Benchmarks de desempenho (SWE-bench Verified, preços) correntes no Apêndice Vivo (J).</text>
</svg>
