<svg viewBox="0 0 880 470" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh4b" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule4b" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
    <linearGradient id="ctxGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#2E7D8A" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="878" height="468" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <text x="44" y="48" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 4.2 · INVARIANTE 4 — ENCAIXE</text>
  <text x="44" y="78" font-size="23" font-weight="700" fill="#1B2A33">Extended Thinking e Janela de Contexto</text>
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule4b)"/>

  <!-- TOP SECTION: Extended thinking availability -->
  <text x="44" y="130" font-size="13" fill="#1B2A33" font-weight="700">EXTENDED THINKING</text>
  <text x="44" y="148" font-size="12" fill="#7C7768">raciocínio interno prolongado antes da resposta — ativa seletivamente</text>

  <!-- Opus block -->
  <g filter="url(#sh4b)">
    <rect x="52" y="162" width="238" height="100" rx="12" fill="#FBF6EA" stroke="#E2D4AC"/>
  </g>
  <path d="M52,174 a12,12 0 0 1 12,-12 h214 a12,12 0 0 1 12,12 v22 h-238 z" fill="#C2912C"/>
  <text x="171" y="190" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">OPUS</text>
  <rect x="72" y="200" width="80" height="20" rx="8" fill="#C2912C"/>
  <text x="112" y="214" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">✓ disponível</text>
  <text x="72" y="238" font-size="12" fill="#7C7768">análises complexas, multi-restrição</text>
  <text x="72" y="254" font-size="11.5" fill="#9A7A2E" font-weight="600">custo: tokens de thinking contam</text>

  <!-- Sonnet block -->
  <g filter="url(#sh4b)">
    <rect x="318" y="162" width="238" height="100" rx="12" fill="#F1ECE0" stroke="#D8D0BD"/>
  </g>
  <path d="M318,174 a12,12 0 0 1 12,-12 h214 a12,12 0 0 1 12,12 v22 h-238 z" fill="#44525C"/>
  <text x="437" y="190" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">SONNET</text>
  <rect x="338" y="200" width="80" height="20" rx="8" fill="#44525C"/>
  <text x="378" y="214" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">✓ disponível</text>
  <text x="338" y="238" font-size="12" fill="#7C7768">uso geral, ativar em casos específicos</text>
  <text x="338" y="254" font-size="11.5" fill="#44525C" font-weight="600">latência cresce com tokens de thinking</text>

  <!-- Haiku block -->
  <g filter="url(#sh4b)">
    <rect x="584" y="162" width="238" height="100" rx="12" fill="#EFF6F7" stroke="#BBD7DB"/>
  </g>
  <path d="M584,174 a12,12 0 0 1 12,-12 h214 a12,12 0 0 1 12,12 v22 h-238 z" fill="#2E7D8A"/>
  <text x="703" y="190" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">HAIKU</text>
  <rect x="604" y="200" width="92" height="20" rx="8" fill="#1E5560"/>
  <text x="650" y="214" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">✗ não disponível</text>
  <text x="604" y="238" font-size="12" fill="#7C7768">posicionamento: velocidade máxima</text>
  <text x="604" y="254" font-size="11.5" fill="#256A75" font-weight="600">profundidade não é o objetivo</text>

  <!-- BOTTOM SECTION: Context window -->
  <text x="44" y="298" font-size="13" fill="#1B2A33" font-weight="700">JANELA DE CONTEXTO</text>
  <text x="44" y="316" font-size="12" fill="#7C7768">compartilhada entre input e output — os três modelos a compartilham; velocidade de processamento varia</text>

  <!-- Shared context bar -->
  <g filter="url(#sh4b)">
    <rect x="52" y="330" width="784" height="74" rx="12" fill="#FFFFFF" stroke="#CFC8B6"/>
  </g>
  <!-- input fill -->
  <rect x="62" y="342" width="500" height="50" rx="8" fill="url(#ctxGrad)" opacity="0.5"/>
  <text x="312" y="371" font-size="13" font-weight="700" fill="#1B2A33" text-anchor="middle">INPUT (system + histórico + docs + mensagem + thinking)</text>
  <!-- output fill -->
  <rect x="568" y="342" width="258" height="50" rx="8" fill="#2E7D8A" opacity="0.3"/>
  <text x="697" y="371" font-size="13" font-weight="700" fill="#1B2A33" text-anchor="middle">OUTPUT (resposta)</text>

  <text x="444" y="420" font-size="12.5" fill="#7C7768" text-anchor="middle">tamanho total corrente: Apêndice Vivo</text>

  <!-- speed labels -->
  <text x="171" y="424" font-size="11.5" fill="#9A7A2E" text-anchor="middle">velocidade: moderada</text>
  <text x="437" y="424" font-size="11.5" fill="#44525C" text-anchor="middle">velocidade: rápida</text>
  <text x="703" y="424" font-size="11.5" fill="#256A75" text-anchor="middle">velocidade: máxima</text>

  <text x="44" y="458" font-size="12.5" fill="#7C7768" font-style="italic">Opus e Sonnet com extended thinking disponível; Haiku sem. Janela ampla compartilhada entre input e output. Velocidade de processamento varia por tier.</text>
</svg>
