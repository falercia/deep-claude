<svg viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh263" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule263" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
    <marker id="arrGold263" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#C2912C"/>
    </marker>
    <marker id="arrInk263" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#44525C"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="878" height="438" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <text x="44" y="46" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 26.3 · INVARIANTE 2 — EXTREMIDADES</text>
  <text x="44" y="76" font-size="23" font-weight="700" fill="#1B2A33">Vector store: indexação e busca ANN</text>
  <rect x="44" y="88" width="86" height="3.5" rx="1.75" fill="url(#goldRule263)"/>

  <!-- Main vector space area -->
  <rect x="44" y="108" width="500" height="290" rx="12" fill="#FFFFFF" stroke="#CFC8B6"/>
  <text x="54" y="126" font-size="11" fill="#7C7768" font-style="italic">espaço vetorial indexado (simplificado 2D)</text>
  <text x="54" y="390" font-size="11" fill="#7C7768" font-style="italic">cada ponto = chunk embeddado</text>

  <!-- Random dots (indexed vectors) — distributed across space -->
  <!-- distant dots (grey) -->
  <circle cx="80" cy="160" r="4" fill="#CFC8B6"/>
  <circle cx="130" cy="180" r="4" fill="#CFC8B6"/>
  <circle cx="90" cy="220" r="4" fill="#CFC8B6"/>
  <circle cx="70" cy="280" r="4" fill="#CFC8B6"/>
  <circle cx="140" cy="310" r="4" fill="#CFC8B6"/>
  <circle cx="110" cy="355" r="4" fill="#CFC8B6"/>
  <circle cx="75" cy="355" r="4" fill="#CFC8B6"/>
  <circle cx="440" cy="150" r="4" fill="#CFC8B6"/>
  <circle cx="490" cy="175" r="4" fill="#CFC8B6"/>
  <circle cx="470" cy="230" r="4" fill="#CFC8B6"/>
  <circle cx="500" cy="280" r="4" fill="#CFC8B6"/>
  <circle cx="450" cy="340" r="4" fill="#CFC8B6"/>
  <circle cx="420" cy="370" r="4" fill="#CFC8B6"/>
  <circle cx="490" cy="370" r="4" fill="#CFC8B6"/>
  <circle cx="200" cy="160" r="4" fill="#CFC8B6"/>
  <circle cx="170" cy="360" r="4" fill="#CFC8B6"/>
  <circle cx="360" cy="355" r="4" fill="#CFC8B6"/>
  <circle cx="390" cy="170" r="4" fill="#CFC8B6"/>
  <circle cx="160" cy="250" r="4" fill="#CFC8B6"/>

  <!-- ANN search circle (centered around query) -->
  <circle cx="300" cy="255" r="85" fill="#EFF6F7" stroke="#2E7D8A" stroke-width="1.8" stroke-dasharray="6 4" opacity="0.7"/>
  <text x="300" y="162" font-size="11" fill="#2E7D8A" text-anchor="middle" font-weight="600">raio de busca ANN</text>
  <text x="300" y="177" font-size="10.5" fill="#7C7768" text-anchor="middle">(aproximado — eficiente)</text>

  <!-- Dots in ANN radius area (candidate hits) -->
  <circle cx="260" cy="230" r="5" fill="#44525C" opacity="0.75"/>
  <circle cx="330" cy="220" r="5" fill="#44525C" opacity="0.75"/>
  <circle cx="280" cy="270" r="5" fill="#44525C" opacity="0.75"/>
  <circle cx="320" cy="280" r="5" fill="#44525C" opacity="0.75"/>
  <circle cx="270" cy="295" r="4" fill="#44525C" opacity="0.6"/>
  <circle cx="340" cy="305" r="4" fill="#44525C" opacity="0.6"/>
  <circle cx="255" cy="255" r="4" fill="#44525C" opacity="0.6"/>
  <circle cx="345" cy="250" r="4" fill="#44525C" opacity="0.6"/>

  <!-- Top-3 nearest (highlighted) -->
  <circle cx="270" cy="235" r="7" fill="none" stroke="#C2912C" stroke-width="2.5"/>
  <circle cx="330" cy="225" r="7" fill="none" stroke="#C2912C" stroke-width="2.5"/>
  <circle cx="283" cy="272" r="7" fill="none" stroke="#C2912C" stroke-width="2.5"/>
  <!-- rank labels -->
  <text x="280" y="226" font-size="10" fill="#C2912C" font-weight="700">#1</text>
  <text x="338" y="218" font-size="10" fill="#C2912C" font-weight="700">#2</text>
  <text x="290" y="265" font-size="10" fill="#C2912C" font-weight="700">#3</text>

  <!-- Lines from query to top-3 -->
  <line x1="300" y1="255" x2="270" y2="235" stroke="#C2912C" stroke-width="1.8"/>
  <line x1="300" y1="255" x2="330" y2="225" stroke="#C2912C" stroke-width="1.8"/>
  <line x1="300" y1="255" x2="283" y2="272" stroke="#C2912C" stroke-width="1.8"/>

  <!-- Query point -->
  <circle cx="300" cy="255" r="10" fill="#1B2A33" stroke="#C2912C" stroke-width="2.5"/>
  <text x="300" y="246" font-size="10.5" font-weight="700" fill="#1B2A33" text-anchor="middle">consulta</text>

  <!-- Right panel -->
  <rect x="570" y="108" width="268" height="290" rx="12" fill="#FFFFFF" stroke="#E6DFC9"/>
  <rect x="570" y="108" width="268" height="36" rx="12" fill="#1B2A33"/>
  <rect x="570" y="130" width="268" height="14" fill="#1B2A33"/>
  <text x="704" y="131" font-size="13" font-weight="700" fill="#C2912C" text-anchor="middle">O que é ANN</text>

  <text x="588" y="164" font-size="12" font-weight="700" fill="#1B2A33">Approximate Nearest Neighbor</text>
  <text x="588" y="180" font-size="11.5" fill="#7C7768">Busca exata em milhões de</text>
  <text x="588" y="196" font-size="11.5" fill="#7C7768">vetores seria proibitiva.</text>
  <line x1="588" y1="206" x2="822" y2="206" stroke="#E6DFC9" stroke-width="1"/>

  <text x="588" y="224" font-size="12" font-weight="700" fill="#1B2A33">ANN troca precisão &#x2192; velocidade</text>
  <text x="588" y="240" font-size="11.5" fill="#7C7768">Algoritmos: HNSW, IVF, ScaNN</text>
  <text x="588" y="256" font-size="11.5" fill="#7C7768">Retorna vizinhos próximos,</text>
  <text x="588" y="272" font-size="11.5" fill="#7C7768">não necessariamente os k</text>
  <text x="588" y="288" font-size="11.5" fill="#7C7768">mais próximos exatos.</text>
  <line x1="588" y1="300" x2="822" y2="300" stroke="#E6DFC9" stroke-width="1"/>

  <text x="588" y="318" font-size="12" font-weight="700" fill="#2E7D8A">Na prática semântica:</text>
  <text x="588" y="334" font-size="11.5" fill="#7C7768">a diferença é irrelevante —</text>
  <text x="588" y="350" font-size="11.5" fill="#7C7768">ganho de ordens de magnitude</text>
  <text x="588" y="366" font-size="11.5" fill="#7C7768">em velocidade com perda</text>
  <text x="588" y="382" font-size="11.5" fill="#7C7768">mínima de recall.</text>

  <!-- ANN note -->
  <g filter="url(#sh263)">
    <rect x="44" y="415" width="792" height="16" rx="8" fill="#FBF6EA"/>
  </g>
  <text x="440" y="428" font-size="11.5" fill="#7C7768" font-style="italic" text-anchor="middle">Separação arquitetural: indexação (offline, em lote) e consulta (online, em tempo real) são operações distintas. Soluções de vector store no Apêndice Vivo.</text>
</svg>
