<svg viewBox="0 0 880 470" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh22c" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule22c" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
    <marker id="arrInk22c" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#44525C"/>
    </marker>
    <marker id="arrGold22c" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#C2912C"/>
    </marker>
    <marker id="arrTeal22c" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2E7D8A"/>
    </marker>
    <marker id="arrRisk22c" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#B5532F"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="878" height="468" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <!-- Kicker -->
  <text x="44" y="46" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 22.3 · INVARIANTE 6 — AUTONOMIA PROPORCIONAL</text>
  <text x="44" y="76" font-size="23" font-weight="700" fill="#1B2A33">A fronteira de execução como ponto de governança</text>
  <rect x="44" y="88" width="86" height="3.5" rx="1.75" fill="url(#goldRule22c)"/>

  <!-- CLAUDE node -->
  <g filter="url(#sh22c)"><rect x="44" y="122" width="170" height="120" rx="14" fill="#1B2A33"/></g>
  <text x="129" y="172" font-size="17" font-weight="700" fill="#FFFFFF" text-anchor="middle">Claude</text>
  <text x="129" y="193" font-size="12.5" fill="#C2912C" text-anchor="middle">raciocina</text>
  <text x="129" y="210" font-size="12.5" fill="#C2912C" text-anchor="middle">emite tool_use</text>

  <!-- Arrow: Claude -> Governance -->
  <path d="M214,182 H286" fill="none" stroke="#C2912C" stroke-width="2.4" marker-end="url(#arrGold22c)"/>
  <text x="250" y="172" font-size="11.5" fill="#C2912C" text-anchor="middle" font-weight="600">tool_use</text>
  <text x="250" y="187" font-size="11" fill="#7C7768" text-anchor="middle">pedido estruturado</text>

  <!-- GOVERNANCE panel -->
  <g filter="url(#sh22c)"><rect x="288" y="112" width="280" height="230" rx="14" fill="#F0DDD2" stroke="#B5532F" stroke-width="1.8"/></g>
  <rect x="288" y="112" width="280" height="36" rx="14" fill="#B5532F"/>
  <rect x="288" y="132" width="280" height="16" fill="#B5532F"/>
  <text x="428" y="136" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">CAMADA DE GOVERNANÇA</text>
  <text x="428" y="152" font-size="11" fill="#FFDDCC" text-anchor="middle">seu código intercepta antes de executar</text>

  <!-- Governance items -->
  <g font-size="12.5" fill="#1B2A33">
    <text x="308" y="180"><tspan font-weight="700" fill="#B5532F">✓</tspan> Valida parâmetros</text>
    <text x="308" y="200"><tspan font-weight="700" fill="#B5532F">✓</tspan> Verifica autorização</text>
    <text x="308" y="220"><tspan font-weight="700" fill="#B5532F">✓</tspan> Requer aprovação (alto impacto)</text>
    <text x="308" y="240"><tspan font-weight="700" fill="#B5532F">✓</tspan> Loga chamada + parâmetros</text>
    <text x="308" y="260"><tspan font-weight="700" fill="#B5532F">✓</tspan> Pode negar (retorna is_error)</text>
    <text x="308" y="280"><tspan font-weight="700" fill="#B5532F">✓</tspan> Dry-run para destrutivas</text>
    <text x="308" y="300"><tspan font-weight="700" fill="#B5532F">✓</tspan> Dry-run para destrutivas</text>
  </g>
  <!-- cover up extra line -->
  <rect x="308" y="290" width="250" height="16" fill="#F0DDD2"/>

  <!-- Arrow: Governance -> Execute (down right) -->
  <path d="M568,202 H632" fill="none" stroke="#44525C" stroke-width="2.4" marker-end="url(#arrInk22c)"/>
  <text x="600" y="192" font-size="11.5" fill="#44525C" text-anchor="middle" font-weight="600">executa</text>

  <!-- SYSTEMS node -->
  <g filter="url(#sh22c)"><rect x="634" y="154" width="198" height="96" rx="13" fill="#FFFFFF" stroke="#CFC8B6"/></g>
  <text x="733" y="189" font-size="15" font-weight="700" fill="#1B2A33" text-anchor="middle">Sistemas</text>
  <text x="733" y="211" font-size="12" fill="#7C7768" text-anchor="middle">banco · API · arquivo</text>
  <text x="733" y="230" font-size="12" fill="#7C7768" text-anchor="middle">e-mail · webhook</text>

  <!-- Arrow: Systems -> result back -->
  <path d="M634,222 H570" fill="none" stroke="#2E7D8A" stroke-width="2.4" marker-end="url(#arrTeal22c)"/>
  <text x="602" y="241" font-size="11.5" fill="#2E7D8A" text-anchor="middle" font-weight="600">tool_result</text>

  <!-- Arrow: result back to Claude -->
  <path d="M288,260 H214" fill="none" stroke="#2E7D8A" stroke-width="2.4" marker-end="url(#arrTeal22c)"/>
  <text x="251" y="252" font-size="11.5" fill="#2E7D8A" text-anchor="middle" font-weight="600">resultado</text>
  <text x="251" y="267" font-size="11" fill="#7C7768" text-anchor="middle">Claude continua</text>

  <!-- DENY path -->
  <path d="M428,342 V390" fill="none" stroke="#B5532F" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrRisk22c)"/>
  <g filter="url(#sh22c)"><rect x="288" y="394" width="280" height="40" rx="10" fill="#F0DDD2" stroke="#E7CDBE"/></g>
  <text x="428" y="412" font-size="12.5" font-weight="700" fill="#B5532F" text-anchor="middle">NEGAÇÃO → is_error: true</text>
  <text x="428" y="428" font-size="11.5" fill="#7C7768" text-anchor="middle">Claude recebe e decide outra abordagem</text>

  <!-- Principle callout -->
  <g filter="url(#sh22c)"><rect x="44" y="264" width="230" height="58" rx="11" fill="#EFF6F7" stroke="#BBD7DB"/></g>
  <text x="64" y="284" font-size="12.5" font-weight="700" fill="#2E7D8A">Claude pede.</text>
  <text x="64" y="302" font-size="12.5" font-weight="700" fill="#1B2A33">Você decide se executa.</text>
  <text x="64" y="316" font-size="11.5" fill="#7C7768">Não é detalhe. É o fundamento.</text>

  <!-- Footer -->
  <text x="44" y="452" font-size="12.5" fill="#7C7768" font-style="italic">O modelo nunca acessa nada diretamente. A fronteira de execução é onde validação, auditoria e reversibilidade acontecem — proporcionais ao risco.</text>
</svg>
