<svg viewBox="0 0 880 470" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh3b" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule3b" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
    <linearGradient id="attnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C2912C" stop-opacity="0.9"/>
      <stop offset="0.35" stop-color="#7C7768" stop-opacity="0.3"/>
      <stop offset="0.65" stop-color="#7C7768" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#2E7D8A" stop-opacity="0.9"/>
    </linearGradient>
    <marker id="axEnd3b" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#1B2A33"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="878" height="468" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <text x="44" y="48" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 3.2 · INVARIANTE 2 — EXTREMIDADES</text>
  <text x="44" y="78" font-size="23" font-weight="700" fill="#1B2A33">Acúmulo de contexto por turno e posições de atenção</text>
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule3b)"/>

  <!-- Chart axes -->
  <line x1="120" y1="390" x2="780" y2="390" stroke="#1B2A33" stroke-width="2" marker-end="url(#axEnd3b)"/>
  <line x1="120" y1="390" x2="120" y2="128" stroke="#1B2A33" stroke-width="2" marker-end="url(#axEnd3b)"/>

  <text x="450" y="420" font-size="12.5" fill="#1B2A33" text-anchor="middle" font-weight="600">TURNOS (N)</text>
  <text x="100" y="260" font-size="12.5" fill="#1B2A33" font-weight="600" text-anchor="middle" transform="rotate(-90 100 260)">TOKENS ACUMULADOS</text>

  <!-- system prompt horizontal line -->
  <line x1="120" y1="168" x2="776" y2="168" stroke="#C2912C" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="782" y="172" font-size="11.5" fill="#9A7A2E" font-weight="600">system</text>
  <text x="782" y="184" font-size="11" fill="#9A7A2E">sempre no início</text>

  <!-- growth curve (linear) using polyline -->
  <polyline points="120,370 200,348 280,326 360,304 440,282 520,260 600,238 680,216 760,194"
    fill="none" stroke="#1B2A33" stroke-width="2.5"/>

  <!-- Turn markers with dots -->
  <circle cx="200" cy="348" r="5" fill="#1B2A33"/>
  <circle cx="360" cy="304" r="5" fill="#1B2A33"/>
  <circle cx="520" cy="260" r="5" fill="#1B2A33"/>
  <circle cx="680" cy="216" r="5" fill="#1B2A33"/>
  <circle cx="760" cy="194" r="5" fill="#1B2A33"/>

  <text x="194" y="340" font-size="11" fill="#44525C">T1</text>
  <text x="354" y="296" font-size="11" fill="#44525C">T5</text>
  <text x="514" y="252" font-size="11" fill="#44525C">T10</text>
  <text x="674" y="208" font-size="11" fill="#44525C">T15</text>
  <text x="754" y="186" font-size="11" fill="#44525C">TN</text>

  <!-- Attention gradient band on right showing attention distribution -->
  <g filter="url(#sh3b)">
    <rect x="616" y="140" width="154" height="240" rx="10" fill="url(#attnGrad)"/>
  </g>
  <text x="693" y="162" font-size="11.5" fill="#FFFFFF" font-weight="700" text-anchor="middle">ATENÇÃO ALTA</text>
  <text x="693" y="176" font-size="10.5" fill="#FFFFFF" text-anchor="middle">início do contexto</text>
  <text x="693" y="254" font-size="11" fill="#FFFFFF" text-anchor="middle" opacity="0.75">zona de</text>
  <text x="693" y="268" font-size="11" fill="#FFFFFF" text-anchor="middle" opacity="0.75">diluição</text>
  <text x="693" y="356" font-size="11.5" fill="#FFFFFF" font-weight="700" text-anchor="middle">ATENÇÃO ALTA</text>
  <text x="693" y="370" font-size="10.5" fill="#FFFFFF" text-anchor="middle">borda final (turno atual)</text>

  <!-- Labels: strong positions -->
  <g filter="url(#sh3b)">
    <rect x="132" y="136" width="200" height="26" rx="8" fill="#FBF6EA" stroke="#E2D4AC"/>
  </g>
  <text x="232" y="153" font-size="11.5" fill="#9A7A2E" font-weight="600" text-anchor="middle">POSIÇÃO FORTE: system prompt</text>

  <g filter="url(#sh3b)">
    <rect x="132" y="370" width="200" height="26" rx="8" fill="#EFF6F7" stroke="#BBD7DB"/>
  </g>
  <text x="232" y="387" font-size="11.5" fill="#256A75" font-weight="600" text-anchor="middle">POSIÇÃO FORTE: última mensagem</text>

  <!-- context rot label -->
  <rect x="310" y="290" width="188" height="50" rx="8" fill="#F0DDD2" stroke="#E7CDBE"/>
  <text x="404" y="311" font-size="12" fill="#B5532F" font-weight="600" text-anchor="middle">CONTEXT ROT</text>
  <text x="404" y="329" font-size="11" fill="#7C7768" text-anchor="middle">recall degrada no meio</text>

  <text x="44" y="456" font-size="12.5" fill="#7C7768" font-style="italic">Eixo x: turnos. Eixo y: tokens acumulados. Gradiente de atenção: início (alta), meio (decrescente), fim de cada turno (alta). System prompt: sempre na posição inicial.</text>
</svg>
