<svg viewBox="0 0 1000 540" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="cm-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect width="1000" height="540" fill="#0d1b2a"/>
  <text x="500" y="40" fill="#fef3c7" font-size="22" font-weight="700" text-anchor="middle">CLAUDE + MCP — ARQUITETURA CORPORATIVA</text>
  <text x="500" y="64" fill="#9ca3af" font-size="13" text-anchor="middle">Como Claude conecta ao ecossistema interno e externo da empresa via servidores MCP</text>

  <!-- Claude center -->
  <rect x="400" y="220" width="200" height="100" rx="14" fill="#E97451" stroke="#fef3c7" stroke-width="3"/>
  <text x="500" y="250" fill="#fef3c7" font-size="16" font-weight="700" text-anchor="middle">CLAUDE</text>
  <text x="500" y="272" fill="#fef3c7" font-size="11" text-anchor="middle">Web · Desktop · Code</text>
  <text x="500" y="290" fill="#fef3c7" font-size="11" text-anchor="middle">com MCP integrado</text>

  <!-- Top: External SaaS -->
  <rect x="100" y="100" width="800" height="80" rx="10" fill="#1b263b" stroke="#86efac" stroke-width="2"/>
  <text x="500" y="124" fill="#86efac" font-size="13" font-weight="700" text-anchor="middle">SaaS EXTERNOS (servidores MCP oficiais)</text>
  <text x="120" y="150" fill="#e5e7eb" font-size="11">GitHub</text>
  <text x="220" y="150" fill="#e5e7eb" font-size="11">Slack</text>
  <text x="300" y="150" fill="#e5e7eb" font-size="11">Notion</text>
  <text x="390" y="150" fill="#e5e7eb" font-size="11">Linear</text>
  <text x="480" y="150" fill="#e5e7eb" font-size="11">Jira</text>
  <text x="555" y="150" fill="#e5e7eb" font-size="11">Drive</text>
  <text x="635" y="150" fill="#e5e7eb" font-size="11">Salesforce</text>
  <text x="745" y="150" fill="#e5e7eb" font-size="11">Stripe</text>
  <text x="825" y="150" fill="#e5e7eb" font-size="11">HubSpot</text>
  <text x="500" y="170" fill="#9ca3af" font-size="10" text-anchor="middle">cada um expõe Resources, Tools e Prompts próprios</text>
  <line x1="500" y1="180" x2="500" y2="215" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#cm-arr)"/>

  <!-- Left: Internal MCP -->
  <rect x="60" y="220" width="240" height="180" rx="10" fill="#1b263b" stroke="#fbbf24" stroke-width="2"/>
  <text x="180" y="246" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">MCP INTERNO</text>
  <text x="180" y="262" fill="#9ca3af" font-size="10" text-anchor="middle">construído pela sua empresa</text>
  <text x="80" y="290" fill="#e5e7eb" font-size="11">• ERP corporativo</text>
  <text x="80" y="308" fill="#e5e7eb" font-size="11">• CRM customizado</text>
  <text x="80" y="326" fill="#e5e7eb" font-size="11">• Banco interno</text>
  <text x="80" y="344" fill="#e5e7eb" font-size="11">• APIs legadas</text>
  <text x="80" y="362" fill="#e5e7eb" font-size="11">• Data warehouse</text>
  <text x="80" y="380" fill="#fbbf24" font-size="10" font-weight="700">★ infraestrutura própria</text>
  <line x1="305" y1="285" x2="395" y2="265" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#cm-arr)"/>

  <!-- Right: Filesystem MCP -->
  <rect x="700" y="220" width="240" height="180" rx="10" fill="#1b263b" stroke="#bfdbfe" stroke-width="2"/>
  <text x="820" y="246" fill="#bfdbfe" font-size="13" font-weight="700" text-anchor="middle">FILESYSTEM &amp; LOCAL</text>
  <text x="820" y="262" fill="#9ca3af" font-size="10" text-anchor="middle">na máquina do usuário</text>
  <text x="720" y="290" fill="#e5e7eb" font-size="11">• Pastas autorizadas</text>
  <text x="720" y="308" fill="#e5e7eb" font-size="11">• Apps nativos</text>
  <text x="720" y="326" fill="#e5e7eb" font-size="11">• Banco local</text>
  <text x="720" y="344" fill="#e5e7eb" font-size="11">• Ferramentas próprias</text>
  <text x="720" y="362" fill="#e5e7eb" font-size="11">• Repositórios git</text>
  <text x="720" y="380" fill="#bfdbfe" font-size="10" font-weight="700">★ Cowork mode</text>
  <line x1="695" y1="285" x2="605" y2="265" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#cm-arr)"/>

  <!-- Bottom: governance -->
  <rect x="100" y="430" width="800" height="80" rx="10" fill="#E97451"/>
  <text x="500" y="456" fill="#fef3c7" font-size="14" font-weight="700" text-anchor="middle">CAMADA DE GOVERNANÇA</text>
  <text x="120" y="482" fill="#fef3c7" font-size="11">★ Catálogo aprovado de MCPs por admin</text>
  <text x="120" y="500" fill="#fef3c7" font-size="11">★ Permissões granulares por equipe</text>
  <text x="540" y="482" fill="#fef3c7" font-size="11">★ Logs de auditoria de toda chamada</text>
  <text x="540" y="500" fill="#fef3c7" font-size="11">★ Revisão de novos servidores antes de produção</text>
</svg>
