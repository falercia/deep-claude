<svg viewBox="0 0 880 450" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh23a" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule23a" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
    <linearGradient id="thinkGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FBF6EA"/><stop offset="1" stop-color="#EAD9BD"/>
    </linearGradient>
    <marker id="arrInk23a" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#44525C"/>
    </marker>
    <marker id="arrGold23a" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#C2912C"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="878" height="448" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <!-- Kicker -->
  <text x="44" y="46" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 23.1 · INVARIANTE 1 — PLAUSIBILIDADE</text>
  <text x="44" y="76" font-size="23" font-weight="700" fill="#1B2A33">Fluxo de uma resposta com extended thinking</text>
  <rect x="44" y="88" width="86" height="3.5" rx="1.75" fill="url(#goldRule23a)"/>

  <!-- PROMPT node -->
  <g filter="url(#sh23a)"><rect x="44" y="126" width="140" height="64" rx="13" fill="#1B2A33"/></g>
  <text x="114" y="154" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">Prompt</text>
  <text x="114" y="174" font-size="11.5" fill="#C2912C" text-anchor="middle">input do usuário</text>

  <!-- Arrow: Prompt -> Thinking block -->
  <path d="M184,158 H248" fill="none" stroke="#C2912C" stroke-width="2.4" marker-end="url(#arrGold23a)"/>

  <!-- THINKING block (big central area) -->
  <g filter="url(#sh23a)"><rect x="250" y="110" width="370" height="180" rx="14" fill="url(#thinkGrad)" stroke="#C2912C" stroke-width="1.8" stroke-dasharray="6 4"/></g>
  <text x="435" y="134" font-size="13" font-weight="700" fill="#9A7A2E" text-anchor="middle" letter-spacing="1">BLOCO DE THINKING — PRIVADO</text>
  <text x="435" y="157" font-size="12.5" fill="#44525C" text-anchor="middle">exploração interna</text>
  <text x="435" y="176" font-size="12.5" fill="#44525C" text-anchor="middle">hipóteses e verificações</text>
  <text x="435" y="195" font-size="12.5" fill="#44525C" text-anchor="middle">caminhos descartados</text>
  <text x="435" y="214" font-size="12.5" fill="#44525C" text-anchor="middle">revisão de conclusões intermediárias</text>

  <!-- Budget indicator -->
  <g filter="url(#sh23a)"><rect x="256" y="230" width="358" height="36" rx="10" fill="#FBF8F1" stroke="#E2D4AC"/></g>
  <text x="288" y="248" font-size="12" fill="#9A7A2E" font-weight="700">budget_tokens </text>
  <text x="406" y="248" font-size="12" fill="#7C7768">ou</text>
  <text x="428" y="248" font-size="12" fill="#9A7A2E" font-weight="700"> effort: low · medium · high · max</text>
  <text x="435" y="262" font-size="11" fill="#7C7768" text-anchor="middle">tokens cobráveis gerados antes da primeira palavra visível</text>

  <!-- Arrow: Thinking -> Response -->
  <path d="M620,158 H680" fill="none" stroke="#44525C" stroke-width="2.4" marker-end="url(#arrInk23a)"/>

  <!-- RESPOSTA FINAL node -->
  <g filter="url(#sh23a)"><rect x="682" y="126" width="154" height="64" rx="13" fill="#FFFFFF" stroke="#CFC8B6"/></g>
  <rect x="682" y="126" width="154" height="30" rx="13" fill="#44525C"/>
  <rect x="682" y="144" width="154" height="12" fill="#44525C"/>
  <text x="759" y="147" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">Resposta final</text>
  <text x="759" y="172" font-size="12" fill="#7C7768" text-anchor="middle">visível ao usuário</text>

  <!-- COST CALLOUT -->
  <g filter="url(#sh23a)"><rect x="44" y="298" width="380" height="80" rx="13" fill="#F1ECE0" stroke="#CFC8B6"/></g>
  <text x="64" y="318" font-size="13" font-weight="700" fill="#1B2A33">Curva de retorno logarítmica</text>
  <text x="64" y="338" font-size="12" fill="#7C7768">mais tokens de raciocínio → ganhos decrescentes</text>
  <text x="64" y="356" font-size="12" fill="#7C7768">o ponto ótimo requer teste A/B — não intuição</text>
  <text x="64" y="372" font-size="12" fill="#9A7A2E" font-weight="600">budget excessivo pode piorar resultados</text>

  <!-- PLAUSIBILITY WARNING -->
  <g filter="url(#sh23a)"><rect x="450" y="298" width="386" height="80" rx="13" fill="#F0DDD2" stroke="#E7CDBE"/></g>
  <text x="470" y="318" font-size="13" font-weight="700" fill="#B5532F">Armadilha do thinking visível</text>
  <text x="470" y="338" font-size="12" fill="#7C7768">raciocínio elaborado não é garantia de verdade</text>
  <text x="470" y="356" font-size="12" fill="#7C7768">o edifício pode ser sólido sobre premissa errada</text>
  <text x="470" y="372" font-size="12" fill="#B5532F" font-weight="600">Invariante 1: plausibilidade ≠ veracidade</text>

  <!-- Footer -->
  <text x="44" y="432" font-size="12.5" fill="#7C7768" font-style="italic">O bloco de thinking é narrativa sobre o processo, não o processo em si. Verificação externa é obrigatória independentemente do budget usado.</text>
</svg>
