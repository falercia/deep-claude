<svg viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="goldRule41" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C2912C"/>
      <stop offset="100%" stop-color="#E2C879"/>
    </linearGradient>
    <filter id="sh41" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <marker id="arrInk41" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#44525C"/>
    </marker>
  </defs>

  <!-- Frame -->
  <rect x="1" y="1" width="878" height="478" rx="16" fill="#FBF8F1" stroke="#E6DFC9" stroke-width="1.5"/>

  <!-- Kicker -->
  <text x="44" y="42" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 41.1 · INVARIANTE 8 — RESPONSABILIDADE INDELEGÁVEL</text>

  <!-- Title -->
  <text x="44" y="72" font-size="23" font-weight="700" fill="#1B2A33">Controles de governança por tier</text>

  <!-- Gold rule -->
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule41)"/>

  <!-- Gradient legend bar (left=grey, right=gold) -->
  <defs>
    <linearGradient id="gradBar41" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D8D0BD"/>
      <stop offset="50%" stop-color="#CFE3E6"/>
      <stop offset="100%" stop-color="#E2C879"/>
    </linearGradient>
  </defs>

  <!-- Column headers -->
  <!-- PRO column -->
  <rect x="280" y="112" width="170" height="40" rx="10" fill="#D8D0BD" filter="url(#sh41)"/>
  <text x="365" y="137" font-size="15" font-weight="700" fill="#44525C" text-anchor="middle">PRO</text>

  <!-- TEAM column -->
  <rect x="464" y="112" width="170" height="40" rx="10" fill="#2E7D8A" filter="url(#sh41)"/>
  <text x="549" y="137" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">TEAM</text>

  <!-- ENTERPRISE column -->
  <rect x="648" y="112" width="186" height="40" rx="10" fill="#C2912C" filter="url(#sh41)"/>
  <text x="741" y="137" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">ENTERPRISE</text>

  <!-- Gradient control direction hint -->
  <rect x="280" y="158" width="554" height="5" rx="2.5" fill="url(#gradBar41)" opacity="0.5"/>
  <text x="280" y="175" font-size="11" fill="#7C7768" font-style="italic">← controle mínimo</text>
  <text x="834" y="175" font-size="11" fill="#7C7768" font-style="italic" text-anchor="end">controle total →</text>

  <!-- Row definitions: y positions -->
  <!-- Row 1: y=188, Row 2: y=228, Row 3: y=268, Row 4: y=308, Row 5: y=348, Row 6: y=388 -->

  <!-- Row labels (left side) -->
  <text x="44" y="208" font-size="13" font-weight="600" fill="#1B2A33">Admin centralizado</text>
  <text x="44" y="248" font-size="13" font-weight="600" fill="#1B2A33">Políticas aplicadas</text>
  <text x="44" y="288" font-size="13" font-weight="600" fill="#1B2A33">SSO / SAML</text>
  <text x="44" y="328" font-size="13" font-weight="600" fill="#1B2A33">SCIM / offboarding auto</text>
  <!-- Highlighted row -->
  <rect x="36" y="338" width="230" height="32" rx="6" fill="#FBF6EA" stroke="#E2C879" stroke-width="1"/>
  <text x="44" y="358" font-size="13" font-weight="700" fill="#C2912C">Accountability organizacional</text>
  <text x="44" y="398" font-size="13" font-weight="600" fill="#1B2A33">DPA contratual</text>
  <text x="44" y="438" font-size="13" font-weight="600" fill="#1B2A33">Compliance API</text>

  <!-- Row backgrounds alternating -->
  <rect x="270" y="185" width="574" height="32" rx="4" fill="#F1ECE0" opacity="0.5"/>
  <rect x="270" y="225" width="574" height="32" rx="4" fill="#EFF6F7" opacity="0.4"/>
  <rect x="270" y="265" width="574" height="32" rx="4" fill="#F1ECE0" opacity="0.5"/>
  <rect x="270" y="305" width="574" height="32" rx="4" fill="#EFF6F7" opacity="0.4"/>
  <!-- Highlight row for accountability -->
  <rect x="270" y="338" width="574" height="32" rx="4" fill="#FBF6EA" opacity="0.8"/>
  <rect x="270" y="385" width="574" height="32" rx="4" fill="#F1ECE0" opacity="0.5"/>
  <rect x="270" y="425" width="574" height="32" rx="4" fill="#EFF6F7" opacity="0.4"/>

  <!-- PRO column values (x center = 365) -->
  <!-- Admin centralizado: partial -->
  <text x="365" y="208" font-size="16" fill="#B5532F" text-anchor="middle" font-weight="700">—</text>
  <!-- Políticas aplicadas: none -->
  <text x="365" y="248" font-size="16" fill="#B5532F" text-anchor="middle" font-weight="700">—</text>
  <!-- SSO/SAML: none -->
  <text x="365" y="288" font-size="16" fill="#B5532F" text-anchor="middle" font-weight="700">—</text>
  <!-- SCIM: none -->
  <text x="365" y="328" font-size="16" fill="#B5532F" text-anchor="middle" font-weight="700">—</text>
  <!-- Accountability: EMPTY - highlight -->
  <text x="365" y="358" font-size="16" fill="#B5532F" text-anchor="middle" font-weight="700">—</text>
  <!-- DPA: none -->
  <text x="365" y="398" font-size="16" fill="#B5532F" text-anchor="middle" font-weight="700">—</text>
  <!-- Compliance API: none -->
  <text x="365" y="438" font-size="16" fill="#B5532F" text-anchor="middle" font-weight="700">—</text>

  <!-- TEAM column values (x center = 549) -->
  <!-- Admin centralizado: yes -->
  <text x="549" y="208" font-size="16" fill="#2E7D8A" text-anchor="middle" font-weight="700">✓</text>
  <!-- Políticas aplicadas: yes -->
  <text x="549" y="248" font-size="16" fill="#2E7D8A" text-anchor="middle" font-weight="700">✓</text>
  <!-- SSO/SAML: yes -->
  <text x="549" y="288" font-size="16" fill="#2E7D8A" text-anchor="middle" font-weight="700">✓</text>
  <!-- SCIM: no -->
  <text x="549" y="328" font-size="16" fill="#B5532F" text-anchor="middle" font-weight="700">—</text>
  <!-- Accountability: partial -->
  <text x="549" y="358" font-size="13" fill="#44525C" text-anchor="middle" font-style="italic">parcial</text>
  <!-- DPA: no -->
  <text x="549" y="398" font-size="16" fill="#B5532F" text-anchor="middle" font-weight="700">—</text>
  <!-- Compliance API: no -->
  <text x="549" y="438" font-size="16" fill="#B5532F" text-anchor="middle" font-weight="700">—</text>

  <!-- ENTERPRISE column values (x center = 741) -->
  <!-- Admin centralizado: yes -->
  <text x="741" y="208" font-size="16" fill="#C2912C" text-anchor="middle" font-weight="700">✓</text>
  <!-- Políticas aplicadas: yes -->
  <text x="741" y="248" font-size="16" fill="#C2912C" text-anchor="middle" font-weight="700">✓</text>
  <!-- SSO/SAML: yes -->
  <text x="741" y="288" font-size="16" fill="#C2912C" text-anchor="middle" font-weight="700">✓</text>
  <!-- SCIM: yes -->
  <text x="741" y="328" font-size="16" fill="#C2912C" text-anchor="middle" font-weight="700">✓</text>
  <!-- Accountability: yes -->
  <text x="741" y="358" font-size="16" fill="#C2912C" text-anchor="middle" font-weight="700">✓</text>
  <!-- DPA: yes -->
  <text x="741" y="398" font-size="16" fill="#C2912C" text-anchor="middle" font-weight="700">✓</text>
  <!-- Compliance API: yes -->
  <text x="741" y="438" font-size="16" fill="#C2912C" text-anchor="middle" font-weight="700">✓</text>

  <!-- Vertical column dividers -->
  <line x1="270" y1="182" x2="270" y2="458" stroke="#CFC8B6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="454" y1="182" x2="454" y2="458" stroke="#CFC8B6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="638" y1="182" x2="638" y2="458" stroke="#CFC8B6" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Caption -->
  <text x="44" y="466" font-size="12.5" fill="#7C7768" font-style="italic">"Tier certo é o menor que fecha os requisitos reais de governança — não o maior por precaução, não o menor para economizar."</text>
</svg>
