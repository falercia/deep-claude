<svg viewBox="0 0 880 500" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh12b" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule12b" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="878" height="498" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <text x="44" y="48" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 12.2 · INVARIANTE 9 — OPERADOR</text>
  <text x="44" y="78" font-size="23" font-weight="700" fill="#1B2A33">Oito casos onde Mobile entrega valor único</text>
  <rect x="44" y="90" width="86" height="3.5" rx="1.75" fill="url(#goldRule12b)"/>

  <!-- Row 1: 4 cases -->
  <!-- 1 Carro -->
  <g filter="url(#sh12b)"><rect x="44" y="116" width="188" height="100" rx="10" fill="#FFFFFF" stroke="#E2D4AC"/></g>
  <circle cx="70" cy="142" r="14" fill="#C2912C"/><text x="70" y="147" font-size="13" font-weight="700" fill="#FFF" text-anchor="middle">1</text>
  <text x="96" y="139" font-size="13" font-weight="700" fill="#9A7A2E">No carro</text>
  <text x="56" y="162" font-size="12" fill="#1B2A33">Brainstorm por voz</text>
  <text x="56" y="178" font-size="12" fill="#7C7768">antes de reunião</text>
  <text x="56" y="205" font-size="11" fill="#C2912C" font-weight="600">→ voz</text>

  <!-- 2 Exercício -->
  <g filter="url(#sh12b)"><rect x="248" y="116" width="188" height="100" rx="10" fill="#FFFFFF" stroke="#E2D4AC"/></g>
  <circle cx="274" cy="142" r="14" fill="#C2912C"/><text x="274" y="147" font-size="13" font-weight="700" fill="#FFF" text-anchor="middle">2</text>
  <text x="300" y="139" font-size="13" font-weight="700" fill="#9A7A2E">Exercício</text>
  <text x="260" y="162" font-size="12" fill="#1B2A33">Aprendizado interativo</text>
  <text x="260" y="178" font-size="12" fill="#7C7768">caminhando, pedalando</text>
  <text x="260" y="205" font-size="11" fill="#C2912C" font-weight="600">→ voz</text>

  <!-- 3 Reunião presencial -->
  <g filter="url(#sh12b)"><rect x="452" y="116" width="188" height="100" rx="10" fill="#FFFFFF" stroke="#CFE3E6"/></g>
  <circle cx="478" cy="142" r="14" fill="#2E7D8A"/><text x="478" y="147" font-size="13" font-weight="700" fill="#FFF" text-anchor="middle">3</text>
  <text x="504" y="139" font-size="13" font-weight="700" fill="#256A75">Reunião</text>
  <text x="464" y="162" font-size="12" fill="#1B2A33">Foto da lousa vira</text>
  <text x="464" y="178" font-size="12" fill="#7C7768">notas estruturadas</text>
  <text x="464" y="205" font-size="11" fill="#2E7D8A" font-weight="600">→ câmera</text>

  <!-- 4 Viagem -->
  <g filter="url(#sh12b)"><rect x="656" y="116" width="188" height="100" rx="10" fill="#FFFFFF" stroke="#CFE3E6"/></g>
  <circle cx="682" cy="142" r="14" fill="#2E7D8A"/><text x="682" y="147" font-size="13" font-weight="700" fill="#FFF" text-anchor="middle">4</text>
  <text x="708" y="139" font-size="13" font-weight="700" fill="#256A75">Viagem</text>
  <text x="668" y="162" font-size="12" fill="#1B2A33">Tradução de cardápio</text>
  <text x="668" y="178" font-size="12" fill="#7C7768">guia de local em foto</text>
  <text x="668" y="205" font-size="11" fill="#2E7D8A" font-weight="600">→ câmera + voz</text>

  <!-- Row 2: 4 cases -->
  <!-- 5 Compras -->
  <g filter="url(#sh12b)"><rect x="44" y="234" width="188" height="100" rx="10" fill="#FFFFFF" stroke="#CFE3E6"/></g>
  <circle cx="70" cy="260" r="14" fill="#2E7D8A"/><text x="70" y="265" font-size="13" font-weight="700" fill="#FFF" text-anchor="middle">5</text>
  <text x="96" y="257" font-size="13" font-weight="700" fill="#256A75">Compras</text>
  <text x="56" y="280" font-size="12" fill="#1B2A33">Foto do rótulo,</text>
  <text x="56" y="296" font-size="12" fill="#7C7768">ingredientes e comparação</text>
  <text x="56" y="323" font-size="11" fill="#2E7D8A" font-weight="600">→ câmera</text>

  <!-- 6 Decisão rápida -->
  <g filter="url(#sh12b)"><rect x="248" y="234" width="188" height="100" rx="10" fill="#FFFFFF" stroke="#CFC8B6"/></g>
  <circle cx="274" cy="260" r="14" fill="#44525C"/><text x="274" y="265" font-size="13" font-weight="700" fill="#FFF" text-anchor="middle">6</text>
  <text x="300" y="257" font-size="13" font-weight="700" fill="#44525C">Decisão rápida</text>
  <text x="260" y="280" font-size="12" fill="#1B2A33">Sanity-check antes</text>
  <text x="260" y="296" font-size="12" fill="#7C7768">de comprometer-se</text>
  <text x="260" y="323" font-size="11" fill="#44525C" font-weight="600">→ voz ou texto</text>

  <!-- 7 Escrita em trânsito -->
  <g filter="url(#sh12b)"><rect x="452" y="234" width="188" height="100" rx="10" fill="#FFFFFF" stroke="#CFC8B6"/></g>
  <circle cx="478" cy="260" r="14" fill="#44525C"/><text x="478" y="265" font-size="13" font-weight="700" fill="#FFF" text-anchor="middle">7</text>
  <text x="504" y="257" font-size="13" font-weight="700" fill="#44525C">Escrita em trânsito</text>
  <text x="464" y="280" font-size="12" fill="#1B2A33">Email ditado no Uber,</text>
  <text x="464" y="296" font-size="12" fill="#7C7768">post em fila de embarque</text>
  <text x="464" y="323" font-size="11" fill="#44525C" font-weight="600">→ voz + teclado</text>

  <!-- 8 Consulta a documento -->
  <g filter="url(#sh12b)"><rect x="656" y="234" width="188" height="100" rx="10" fill="#FFFFFF" stroke="#E2D4AC"/></g>
  <circle cx="682" cy="260" r="14" fill="#C2912C"/><text x="682" y="265" font-size="13" font-weight="700" fill="#FFF" text-anchor="middle">8</text>
  <text x="708" y="257" font-size="13" font-weight="700" fill="#9A7A2E">Consulta a documento</text>
  <text x="668" y="280" font-size="12" fill="#1B2A33">Foto de cláusula</text>
  <text x="668" y="296" font-size="12" fill="#7C7768">ou exame com pergunta</text>
  <text x="668" y="323" font-size="11" fill="#C2912C" font-weight="600">→ câmera</text>

  <!-- Bottom: key insight -->
  <g filter="url(#sh12b)"><rect x="44" y="356" width="792" height="62" rx="13" fill="#1B2A33"/></g>
  <text x="440" y="380" font-size="14" font-weight="700" fill="#C2912C" text-anchor="middle">CRITÉRIO DO OPERADOR: sessões de 5 a 20 minutos</text>
  <text x="440" y="400" font-size="12" fill="#FFFFFF" text-anchor="middle">Mobile brilha em janelas curtas de atenção onde computador não está disponível</text>
  <text x="440" y="416" font-size="11.5" fill="#7C7768" text-anchor="middle">Trabalho longo, precisão extrema e integração local → aguardar o Desktop</text>

  <text x="44" y="476" font-size="12.5" fill="#7C7768" font-style="italic">Toda agenda profissional tem dezenas de janelas curtas que somam tempo significativo. Mobile com voz transforma essas janelas em pensamento estruturado.</text>
</svg>
