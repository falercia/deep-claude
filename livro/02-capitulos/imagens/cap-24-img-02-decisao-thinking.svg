<svg viewBox="0 0 880 490" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh23b" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1B2A33" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldRule23b" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C2912C"/><stop offset="1" stop-color="#E2C879"/>
    </linearGradient>
    <marker id="arrInk23b" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#44525C"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="878" height="488" rx="16" fill="#FBF8F1" stroke="#E6DFC9"/>

  <!-- Kicker -->
  <text x="44" y="46" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#C2912C">DIAGRAMA 23.2 · INVARIANTE 1 — PLAUSIBILIDADE</text>
  <text x="44" y="76" font-size="23" font-weight="700" fill="#1B2A33">Protocolo de decisão: ativar extended thinking?</text>
  <rect x="44" y="88" width="86" height="3.5" rx="1.75" fill="url(#goldRule23b)"/>

  <!-- Q1: Multiple dependent steps? -->
  <g filter="url(#sh23b)"><rect x="264" y="116" width="352" height="58" rx="13" fill="#1B2A33"/></g>
  <text x="440" y="141" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">Tarefa tem múltiplos passos</text>
  <text x="440" y="161" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">que dependem uns dos outros?</text>

  <!-- Q1: NÃO -> left -->
  <path d="M264,145 H174 V218" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk23b)"/>
  <text x="212" y="138" font-size="12" font-weight="700" fill="#2E7D8A">NÃO</text>
  <!-- Q1: SIM -> down -->
  <path d="M440,174 V218" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk23b)"/>
  <text x="452" y="202" font-size="12" font-weight="700" fill="#B5532F">SIM</text>

  <!-- Q2: Non-trivial solution space? -->
  <g filter="url(#sh23b)"><rect x="264" y="220" width="352" height="58" rx="13" fill="#243B47"/></g>
  <text x="440" y="245" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">Espaço de soluções não trivial?</text>
  <text x="440" y="264" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">(caminhos errados plausíveis)</text>

  <!-- Q2: NÃO -> left -->
  <path d="M264,249 H174 V316" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk23b)"/>
  <text x="212" y="242" font-size="12" font-weight="700" fill="#2E7D8A">NÃO</text>
  <!-- Q2: SIM -> down -->
  <path d="M440,278 V316" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk23b)"/>
  <text x="452" y="302" font-size="12" font-weight="700" fill="#B5532F">SIM</text>

  <!-- Q3: Cost of error > cost of latency? -->
  <g filter="url(#sh23b)"><rect x="264" y="318" width="352" height="58" rx="13" fill="#243B47"/></g>
  <text x="440" y="343" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">Custo de erro maior que</text>
  <text x="440" y="362" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">custo de latência adicional?</text>

  <!-- Q3: NÃO -> left -->
  <path d="M264,347 H174 V414" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk23b)"/>
  <text x="212" y="340" font-size="12" font-weight="700" fill="#2E7D8A">NÃO</text>
  <!-- Q3: SIM -> right (ATIVAR) -->
  <path d="M616,347 H692 V414" fill="none" stroke="#44525C" stroke-width="2.2" marker-end="url(#arrInk23b)"/>
  <text x="650" y="340" font-size="12" font-weight="700" fill="#B5532F">SIM</text>

  <!-- NÃO ATIVAR (left leaf) -->
  <g filter="url(#sh23b)"><rect x="44" y="418" width="220" height="52" rx="13" fill="#FFFFFF" stroke="#BBD7DB"/></g>
  <rect x="44" y="418" width="220" height="24" rx="13" fill="#2E7D8A"/>
  <rect x="44" y="432" width="220" height="10" fill="#2E7D8A"/>
  <text x="154" y="435" font-size="13.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">NÃO ATIVAR</text>
  <text x="154" y="458" font-size="12" fill="#7C7768" text-anchor="middle">modo padrão · sem overhead</text>

  <!-- ATIVAR (right leaf) -->
  <g filter="url(#sh23b)"><rect x="616" y="418" width="220" height="52" rx="13" fill="#FFFFFF" stroke="#E2D4AC"/></g>
  <rect x="616" y="418" width="220" height="24" rx="13" fill="#C2912C"/>
  <rect x="616" y="432" width="220" height="10" fill="#C2912C"/>
  <text x="726" y="435" font-size="13.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">ATIVAR THINKING</text>
  <text x="726" y="458" font-size="12" fill="#7C7768" text-anchor="middle">comece no budget mínimo</text>

  <!-- TEST reminder pill -->
  <g filter="url(#sh23b)"><rect x="264" y="418" width="352" height="52" rx="13" fill="#F1ECE0" stroke="#CFC8B6"/></g>
  <text x="440" y="436" font-size="12.5" font-weight="700" fill="#44525C" text-anchor="middle">Antes de decidir: teste A/B</text>
  <text x="440" y="452" font-size="12" fill="#7C7768" text-anchor="middle">defina métrica antes · rode 10x cada · compare custo total</text>
  <text x="440" y="466" font-size="11.5" fill="#9A7A2E" text-anchor="middle">sem teste, a decisão é intuição</text>

  <!-- Footer -->
  <text x="44" y="484" font-size="12.5" fill="#7C7768" font-style="italic">Qualquer "NÃO" nas perguntas 1 ou 2 elimina a ativação sem teste. Os três "SIM" juntos justificam — mas o teste A/B ainda confirma o ganho real.</text>
</svg>
